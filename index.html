// ═══════════ DATA RECOVERY ═══════════
// Scans Firebase for shift data that is missing or empty in local sessions.
// Only restores; never overwrites existing non-empty shift data.
function recoverMissingShifts(){
  var statusEl=document.getElementById('recov-status');
  if(statusEl)statusEl.innerHTML='<span style="color:#1e6e3a">🔍 Scanning for missing shifts…</span>';
  if(!dbRef){
    if(statusEl)statusEl.innerHTML='<span style="color:var(--red)">❌ Firebase not connected. Cannot recover.</span>';
    return;
  }
  dbRef.once('value',function(snap){
    var remote=snap.val();
    if(!remote){
      if(statusEl)statusEl.innerHTML='<span style="color:var(--red)">❌ Firebase is empty. No data to recover.</span>';
      return;
    }
    // Restore sessions array from Firebase (same as initSync does)
    var remoteSessions=remote.sessions||[];
    if(!Array.isArray(remoteSessions)&&typeof remoteSessions==='object')remoteSessions=Object.values(remoteSessions);
    if(!Array.isArray(remoteSessions))remoteSessions=[];

    var recovered=0;
    var checked=0;
    var keysFixes=0;

    // ── Pass 1: fix misfiled NIGHT shift keys in local sessions ──
    // Bug: night shift after midnight was keyed as NIGHT_<today> instead of NIGHT_<yesterday>.
    // Symptom: a NIGHT_YYYY-MM-DD entry exists in sess.shifts[] but the date is one day ahead
    // of what it should be (the shift actually started the day before).
    // Detection: a NIGHT shift whose date matches a DAY shift date in the same session
    // — meaning both the night and following day were filed under the same date, leaving
    // the previous night slot absent.
    ST.sessions.forEach(function(sess,si){
      if(!sess||!sess.shifts||!sess.shifts.length)return;
      var shiftsByKey={};
      sess.shifts.forEach(function(sh){if(sh&&sh.key)shiftsByKey[sh.key]=sh;});

      sess.shifts.forEach(function(sh){
        if(!sh||!sh.key)return;
        var parts=sh.key.split('_');
        if(parts[0]!=='NIGHT')return;
        var shDate=parts.slice(1).join('_'); // YYYY-MM-DD
        // Check: is there also a DAY shift on this same date?
        var sameDayKey='DAY_'+shDate;
        if(!shiftsByKey[sameDayKey])return; // no conflict — skip
        // There IS a DAY shift on the same date as this NIGHT shift.
        // Check: is the CORRECT night key (date - 1 day) missing?
        var dateParts=shDate.split('-');
        if(dateParts.length<3)return;
        var d=new Date(parseInt(dateParts[0]),parseInt(dateParts[1])-1,parseInt(dateParts[2]));
        d.setDate(d.getDate()-1);
        var correctDate=d.toLocaleDateString('en-CA');
        var correctKey='NIGHT_'+correctDate;
        if(shiftsByKey[correctKey])return; // correct key already exists — skip
        // Only fix if this shift actually has hourly data worth keeping
        if(!sh.hourly||Object.keys(sh.hourly).length===0)return;
        // Rename: change key from wrong date to correct date
        sh.key=correctKey;
        sh.date=correctDate;
        keysFixes++;
        checked++;
      });
      if(keysFixes>0){
        ST.sessions[si]=JSON.parse(JSON.stringify(sess));
      }
    });

    // ── Pass 2: restore from Firebase (missing or empty shifts) ──
    remoteSessions.forEach(function(remSess){
      if(!remSess||!remSess.id)return;
      var localIdx=ST.sessions.findIndex(function(s){return s.id===remSess.id;});
      if(localIdx<0)return;

      var localSess=ST.sessions[localIdx];
      if(!localSess.shifts)localSess.shifts=[];

      var remShifts=remSess.shifts||[];
      if(!Array.isArray(remShifts)&&typeof remShifts==='object')remShifts=Object.values(remShifts);
      if(!Array.isArray(remShifts))remShifts=[];

      remShifts.forEach(function(remSh){
        if(!remSh||!remSh.key)return;
        checked++;
        var remHourly=remSh.hourly||{};
        var remHourlyCount=Object.keys(remHourly).length;
        if(remHourlyCount===0)return;

        var localSh=localSess.shifts.find(function(sh){return sh.key===remSh.key;});
        var localHourlyCount=localSh?Object.keys(localSh.hourly||{}).length:0;

        if(!localSh){
          localSess.shifts.push(JSON.parse(JSON.stringify(remSh)));
          recovered++;
        } else if(localHourlyCount===0&&remHourlyCount>0){
          localSh.hourly=JSON.parse(JSON.stringify(remHourly));
          if(remSh.delays&&Object.keys(remSh.delays).length>0&&Object.keys(localSh.delays||{}).length===0){
            localSh.delays=JSON.parse(JSON.stringify(remSh.delays));
          }
          recovered++;
        }
      });

      // Sort shifts chronologically
      localSess.shifts.sort(function(a,b){
        function ts(key){
          var p=key.split('_'),t=p[0],dp=(p[1]||'').split('-');
          if(dp.length<3)return 0;
          var hr=t==='DAY'?6:18;
          return new Date(parseInt(dp[0]),parseInt(dp[1])-1,parseInt(dp[2]),hr,0,0).getTime();
        }
        return ts(a.key)-ts(b.key);
      });
      ST.sessions[localIdx]=JSON.parse(JSON.stringify(localSess));
    });

    var totalFixed=recovered+keysFixes;
    if(totalFixed>0){
      _myLastSave=Date.now();
      _saveProtectUntil=Date.now()+8000;
      sv();
      var msg='✅ ';
      if(keysFixes>0)msg+=keysFixes+' misfiled shift key(s) corrected. ';
      if(recovered>0)msg+=recovered+' missing shift(s) restored from Firebase. ';
      msg+='Data saved.';
      if(statusEl)statusEl.innerHTML='<span style="color:#1e6e3a">'+msg+'</span>';
      logActivity('Data Recovery',msg);
      if(RT.tab==='results')renderResults();
      if(RT.tab==='history')renderHistory();
    } else if(checked>0){
      if(statusEl)statusEl.innerHTML='<span style="color:#555">✅ Checked '+checked+' shifts — nothing missing or misfiled. All data is present.</span>';
    } else {
      if(statusEl)statusEl.innerHTML='<span style="color:#888">ℹ️ No shift data found for the active session.</span>';
    }
  }).catch(function(e){
    if(statusEl)statusEl.innerHTML='<span style="color:var(--red)">❌ Recovery failed: '+e.message+'</span>';
  });
}

// ═══════════ ETC CALCULATOR ═══════════
function calcETC(){
  var sess=getSess();if(!sess)return null;
  var now=new Date();
  var g=calcGlobalTotals(sess);
  var done=g.total12; // Use current shift moves only — totalDone includes past shifts and inflates the rate
  var rem=g.remaining;
  if(rem<=0)return{done:true,remaining:0,hoursLeft:0,eta:null,rate:done,reasoning:'All units completed.'};
  if(done===0)return null;
  var nc=sess.numCranes||1;

  // Delay minutes: use MAX per-crane delay (they run in parallel, not sequential)
  var maxCraneDelay=0;
  if(ST.delayRowIds){for(var c=1;c<=nc;c++){var rk=sess.id+'_c'+c;var craneDMin=0;(ST.delayRowIds[rk]||[0]).forEach(function(r){var d=ST.delays[sess.id+'_'+c+'_'+r];if(d&&d.from&&d.to){var fh=parseInt(d.from)||0,fm=parseInt((d.from.split(':')[1])||0),th=parseInt(d.to)||0,tm=parseInt((d.to.split(':')[1])||0);var diff=(th*60+tm)-(fh*60+fm);if(diff<0)diff+=1440;craneDMin+=diff;}});if(craneDMin>maxCraneDelay)maxCraneDelay=craneDMin;}}
  var dMins=maxCraneDelay;

  // Active hours: use firstLift if set, else earliest CMT crane firstLift, else shift start time
  var aHrs=1;
  var _shiftStartMins=isDay()?6*60:18*60;
  var _nowMins=now.getHours()*60+now.getMinutes();
  // Determine best firstLift source: session > CMT crane fl_1 > shift start
  var _flSource=sess.firstLift||'';
  if(!_flSource&&ST.perfTargets&&ST.perfTargets.craneLifts){
    // Use earliest crane first lift
    var _earliest=null;
    for(var _fc=1;_fc<=nc;_fc++){
      var _fcv=ST.perfTargets.craneLifts['fl_'+_fc]||'';
      if(_fcv){
        var _fcp=_fcv.split(':'),_fch=parseInt(_fcp[0]||0),_fcm=parseInt(_fcp[1]||0);
        var _fcMins=_fch*60+_fcm;
        if(!isDay()&&_fch<12)_fcMins+=24*60;
        if(_earliest===null||_fcMins<_earliest){_earliest=_fcMins;_flSource=_fcv;}
      }
    }
  }
  if(_flSource){
    var _flp=_flSource.split(':'),_flh=parseInt(_flp[0]||0),_flm=parseInt(_flp[1]||0);
    var _flMins=_flh*60+_flm;
    if(!isDay()&&_flh<12)_flMins+=24*60;
    var _nowMins2=_nowMins<6*60?_nowMins+24*60:_nowMins; // handle after-midnight
    var el2=_nowMins2-_flMins;
    if(el2<0)el2+=24*60;
    aHrs=Math.max((el2-dMins)/60,0.25);
  } else {
    // No firstLift at all — use elapsed time since shift start
    var _elapsedMins=_nowMins-_shiftStartMins;
    if(_elapsedMins<0)_elapsedMins+=24*60;
    aHrs=Math.max((_elapsedMins-dMins)/60,0.25);
  }
  var overallRate=done/aHrs;

  // Rate calculation: each hourly slot represents exactly 1 hour of work.
  // Moves entered in a slot are the full-hour figure regardless of when in the hour they're entered.
  // So rate = total moves in completed past slots / number of those slots (moves per hour).
  // We ignore the current in-progress slot and wall-clock elapsed time entirely.
  var sl=shiftSlots();
  var nowSlot=currSlot();
  var nowIdx=sl.indexOf(nowSlot);

  var completedMoves=0,completedSlots=0;
  for(var ri=0;ri<nowIdx;ri++){
    var s2=sl[ri];var slotTotal=0;
    for(var ci=1;ci<=nc;ci++)slotTotal+=(ST.hourly[hk(sess.id,s2,ci,'discharge')]||0)+(ST.hourly[hk(sess.id,s2,ci,'load')]||0);
    if(slotTotal>0){completedMoves+=slotTotal;completedSlots++;}
  }

  var rate=0;
  if(completedSlots>0){
    // Rate = moves per completed hour slot
    rate=completedMoves/completedSlots;
  } else {
    // No completed slots yet — use the current slot's entered moves as the rate estimate
    var curSlotTotal=0;
    for(var ci2=1;ci2<=nc;ci2++)curSlotTotal+=(ST.hourly[hk(sess.id,nowSlot,ci2,'discharge')]||0)+(ST.hourly[hk(sess.id,nowSlot,ci2,'load')]||0);
    rate=curSlotTotal>0?curSlotTotal:0;
  }
  if(rate<=0)return null;

  var hrs=rem/rate;
  var etaD=new Date(now.getTime()+hrs*3600000);
  var etaStr=etaD.toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit',hour12:false});
  var etaDate=etaD.toLocaleDateString('en-ZA',{day:'2-digit',month:'short'});
  var note=dMins>0?' (excl. '+Math.round(dMins/60*10)/10+'hr delays)':'';
  var rateNote=completedSlots>0?' [avg over '+completedSlots+' completed hr'+(completedSlots>1?'s':'')+']':' [current slot]';
  return{done:false,remaining:Math.max(0,Math.round(rem)),hoursLeft:hrs,eta:etaStr,etaDate:etaDate,rate:rate.toFixed(1),reasoning:'Rate: '+rate.toFixed(1)+' moves/hr'+rateNote+note+'. Remain: '+Math.max(0,Math.round(rem))+'.'};
}

// ═══════════ VESSEL ABBREV RESOLVER ═══════════
function resolveVesselAbbrev(raw){
  if(!raw)return raw;
  const s=raw.toString();
  // Extract abbrev after 4 leading digits: "2610anaetc" -> "ana"
  const match=s.toLowerCase().match(/^\d{4}([a-z]+)/);
  if(!match)return s;
  const full=match[1]; // e.g. "anaza613a" or "anacam001"
  // Try known abbrevs — find longest matching prefix
  const abbrevs=ST.vesselAbbrevs||[];
  let foundEntry=null,bestLen=0;
  abbrevs.forEach(function(v){
    const a=v.abbrev.toLowerCase();
    if(full.startsWith(a)&&a.length>bestLen){foundEntry=v;bestLen=a.length;}
  });
  let vessel,voyage;
  if(foundEntry){
    vessel=foundEntry.full;
    // Everything after the abbrev is the voyage (e.g. "za613a" or "cam001")
    voyage=full.substring(bestLen).toUpperCase()||'';
  } else {
    // No known abbrev - use full string, no voyage
    vessel=full.toUpperCase();
    voyage='';
  }
  return {vessel,voyage};
}

// ═══════════ ISO TYPE HELPERS ═══════════
function getIsoCategory(iso){
  if(!iso)return{type:'other',label:'Unknown',fcl:'unknown'};
  const s=iso.toString().toLowerCase();
  const isReefer=s.includes('r')&&(s.endsWith('r1')||s.endsWith('r0')||s.includes('reefer')||/\dr/.test(s));
  const isGP=s.endsWith('g1')||s.endsWith('g0')||s.includes('gp')||/\dg/.test(s);
  // FCL vs Empty: common patterns — 'e' suffix or 'empty' in field
  return{
    type:isReefer?'reefer':isGP?'gp':'other',
    label:isReefer?'Reefer':isGP?'GP':'Other'
  };
}

function classifyUnit(row){
  // Look through all cell values for ISO type clues
  const values=Object.values(row).map(v=>String(v||'').toLowerCase());
  const combined=values.join(' ');
  // ISO type — look for patterns like 45r1, 45g1, 4510, 4530
  let isoType='other',isoLabel='Other';
  const isoMatch=combined.match(/\b(4[0-9][rg][01]|4[0-9][0-9][0-9])\b/);
  if(isoMatch){
    const iso=isoMatch[1];
    const cat=getIsoCategory(iso);
    isoType=cat.type;isoLabel=cat.label;
  }
  // FCL vs Empty
  const isEmpty=combined.includes('empty')||combined.includes('mty');
  // Vessel name
  let vessel='Unknown';
  const vesselMatch=combined.match(/\b\d{4}([a-z]+)/);
  if(vesselMatch)vessel=resolveVesselAbbrev(vesselMatch[0]);
  // Inbound vs Yard
  const isInbound=combined.includes('inbound')||combined.includes('in transit')||combined.includes('eta');
  return{isoType,isoLabel,isEmpty,vessel,isInbound};
}

// ═══════════ YARD STATUS SCREEN ═══════════
let yardActiveReport=null,yardSearch='';

function renderYard(){
  let h=`<div class="ph"><div class="ph-row"><h2>🏗️ Yard Status</h2><span class="pill pblue">${ST.yardReports.length} Report${ST.yardReports.length!==1?'s':''}</span></div></div>`;
  // Upload + manual entry options
  h+=`<div style="padding:8px 10px 6px">
    <div id="yDZ" ondragenter="event.preventDefault();event.stopPropagation();this.style.borderColor='#2980b9';this.style.background='#e8f4ff'" ondragover="event.preventDefault();event.stopPropagation();this.style.borderColor='#2980b9';this.style.background='#e8f4ff'"
      ondragleave="event.preventDefault();event.stopPropagation();this.style.borderColor='var(--navy)';this.style.background='white'"
      ondrop="event.preventDefault();event.stopPropagation();this.style.borderColor='var(--navy)';this.style.background='white';uploadYardExcelMulti({files:event.dataTransfer.files})"
      style="border:2px dashed var(--navy);border-radius:12px;padding:16px;text-align:center;background:white;margin-bottom:8px">
      <div style="font-size:24px;margin-bottom:5px">📂</div>
      <div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:3px">Drag &amp; drop Excel here</div>
      <div style="font-size:11px;color:#888;margin-bottom:8px">Multiple files supported · drag on PC</div>
      <label style="display:inline-block;padding:7px 18px;background:var(--navy);color:white;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer">Browse<input type="file" accept=".xlsx,.xls,.csv" multiple style="display:none" onchange="uploadYardExcelMulti(this)"/></label>
    </div>
    <button onclick="addManualYardReport()" style="width:100%;padding:9px;background:white;border:2px solid var(--navy);border-radius:10px;font-size:12px;font-weight:700;color:var(--navy);cursor:pointer">✏️ Create Manual Report</button>
  </div>`;
  // ── Generator Management (operator adds here) ──
  h+=`<div style="background:white;border-radius:12px;margin:8px 10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-size:13px;font-weight:800;color:var(--navy)">⛽ Generators</div>
      <button onclick="addGeneratorFromYard()" style="background:var(--navy);color:white;border:none;border-radius:7px;padding:6px 12px;font-size:11px;font-weight:800;cursor:pointer">+ Add</button>
    </div>
    ${(function(){
      const gs=ST.generators||[];
      if(!gs.length)return'<div style="font-size:12px;color:#aaa">No generators added. Tap + Add.</div>';
      return gs.map(function(g,gi){
        const pct=g.capacity>0?Math.round(g.current/g.capacity*100):0;
        const fc=pct>=50?'#27ae60':pct>=25?'#f39c12':'#c0392b';
        return '<div style="margin-bottom:10px;padding:10px;background:#f6f8fc;border-radius:9px;border-left:4px solid '+fc+'">'
          +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
          +'<div><div style="font-size:13px;font-weight:800;color:var(--navy)">'+g.name+'</div>'
          +'<div style="font-size:11px;color:#666">Capacity: '+g.capacity+'L &nbsp;·&nbsp; Remaining: '+g.current+'L</div></div>'
          +'<button onclick="removeGenerator('+g.id+')" style="background:#fff0f0;color:var(--red);border:1px solid var(--red);border-radius:5px;padding:3px 8px;font-size:11px;cursor:pointer">✕</button>'
          +'</div>'
          +'<div style="background:#e5e9f0;border-radius:5px;height:20px;overflow:hidden;margin-bottom:4px">'
          +'<div style="width:'+Math.min(pct,100)+'%;height:100%;background:'+fc+';display:flex;align-items:center;justify-content:flex-end;padding-right:6px">'
          +'<span style="font-size:10px;font-weight:900;color:white">'+pct+'%</span></div></div>'
          +'<div style="display:flex;align-items:center;gap:8px">'
          +'<span style="font-size:11px;color:#666">Update fuel %:</span>'
          +'<input type="number" value="'+pct+'" min="0" max="100" style="width:60px;padding:4px 7px;border:1.5px solid #ddd;border-radius:6px;font-size:12px" '
          +'oninput="updateGenFuel('+g.id+',this.value,true);renderYard()"/>'
          +'<span style="font-size:11px;color:#888">'+g.current+'L / '+g.capacity+'L</span>'
          +(pct<25?'<span style="font-size:11px;font-weight:800;color:var(--red)">⚠️ LOW</span>':'')
          +'</div></div>';
      }).join('');
    })()}
  </div>`;

  if(!ST.yardReports.length){
    h+=noSess('📦','No yard reports yet. If another user added a report, tap Yard again in a moment.');
    $('sc-yard').innerHTML=h;
    // Force-fetch from Firebase — catches case where listener fired before login
    if(window._yardRef){
      window._yardRef.once('value',function(snap){
        var rv=snap.val();
        if(!rv)return;
        var arr=Array.isArray(rv)?rv:Object.values(rv);
        if(arr&&arr.length){
          // Restore nested arrays Firebase also converts to keyed objects
          arr.forEach(function(r){
            if(r.vessels&&!Array.isArray(r.vessels))r.vessels=Object.values(r.vessels);
            if(r.customTypes&&!Array.isArray(r.customTypes))r.customTypes=Object.values(r.customTypes);
            if(r.customCols&&!Array.isArray(r.customCols))r.customCols=Object.values(r.customCols);
          });
          // Restore sanitized keys: __S__ back to /
          arr.forEach(function(r){
            if(r.vessels)r.vessels.forEach(function(v){
              if(v.data){Object.keys(v.data).forEach(function(k){
                if(k.indexOf('__S__')>=0){var rk=k.replace(/__S__/g,'/');v.data[rk]=v.data[k];delete v.data[k];}
              });}
            });
          });
          ST.yardReports=arr;try{localStorage.setItem(SK,JSON.stringify(ST));}catch(e){}
          var _openForm2=document.querySelector('[id^="_avName_"],[id="_myrInput"]');
          if(!_openForm2)renderYard();}
      });
    }
    return;
  }
  // Report selector
  if(yardActiveReport===null||yardActiveReport>=ST.yardReports.length)yardActiveReport=0;
  // Report list with delete buttons (always shown)
  h+=`<div style="padding:0 10px 8px">
    <div style="font-size:11px;font-weight:700;color:var(--navy);margin-bottom:6px">REPORTS (${ST.yardReports.length})</div>
    ${ST.yardReports.map(function(r,i){
      return '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">'
        +'<button onclick="yardActiveReport='+i+';renderYard()" style="flex:1;text-align:left;padding:8px 11px;background:'+(i===yardActiveReport?'var(--navy)':'white')+';color:'+(i===yardActiveReport?'white':'var(--navy)')+';border:1.5px solid var(--navy);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+r.name+'</button>'
        +'<button data-delyard="'+r.id+'" onclick="deleteYardReport('+r.id+')" style="flex-shrink:0;background:#fff0f0;color:var(--red);border:1.5px solid var(--red);border-radius:8px;padding:7px 10px;font-size:14px;cursor:pointer;font-weight:800" title="Delete report">🗑️</button>'
        +'</div>';
    }).join('')}
  </div>`;
  const report=ST.yardReports[yardActiveReport];
  if(!report){$('sc-yard').innerHTML=h;return;}
  h+=renderYardReport(report);
  h+=`<div style="height:20px"></div>`;
  $('sc-yard').innerHTML=h;
}

function renderYardReport(report){
  const now=new Date();
  const dateStr=now.toLocaleDateString('en-ZA',{year:'numeric',month:'2-digit',day:'2-digit'}).split('/').join('-');
  const timeStr=now.toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit',hour12:false});
  const slot=currSlot();
  const tn=ST.settings.term||'';
  const fuel=report.fuel!=null?report.fuel:null;
  const fuelLow=fuel!=null&&fuel<25;
  const fuelColor=fuel>=50?'#1e8449':fuel>=25?'#f39c12':'#c0392b';

  var _yHdrStyle='background:linear-gradient(rgba(31,56,100,.88),rgba(31,56,100,.88)),url('+HARDCODED_BG+') center/cover';
  var _podHtml=renderPodChart(report);
  let h=`<div id="ycap_${report.id}">`;

  // ── Report Header (matches template) ──
  h+=`<div style="background:white;margin:8px 10px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden">
    <div style="${_yHdrStyle};padding:14px 16px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <div style="width:100px;height:60px;border-radius:8px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:white;overflow:hidden;flex-shrink:0;border:1px solid rgba(255,255,255,.25)">
          <img src="${HARDCODED_LOGO}" alt="AGL" style="width:100%;height:100%;object-fit:contain;"/>
        </div>
        <div style="flex:1">
          <div style="font-size:16px;font-weight:900;color:white">${_adminLbl('yrd_title','YARD STATUS REPORT',true)}</div>
          <div style="font-size:12px;color:rgba(255,255,255,.8)">${tn}</div>
        </div>
        <button class="rh-share" onclick="shareYardReport(${report.id})" style="background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.3);color:white;padding:8px 14px;border-radius:9px;font-size:12px;font-weight:800;cursor:pointer">📤 Share</button>
      </div>
      <div style="font-size:13px;font-weight:700;color:rgba(255,255,255,.9)">${dateStr}</div>
      <div style="font-size:12px;color:rgba(255,255,255,.75)">${fs(slot)}</div>
      ${fuelLow?`<div style="background:#ffebee;border-left:4px solid var(--red);border-radius:6px;padding:8px 12px;margin-top:8px;font-size:12px;font-weight:700;color:var(--red)">⚠️ LOW FUEL WARNING — ${fuel}% remaining</div>`:''}
          </div>`;

  // Generator card (below header, part of shared image)
  const gs=ST.generators||[];
  if(gs.length){
    h+=`<div style="background:white;margin:8px 10px;border-radius:10px;padding:12px 14px;box-shadow:0 2px 8px rgba(0,0,0,.06)">`;
    h+=`<div style="font-size:11px;font-weight:800;color:var(--navy);margin-bottom:8px;letter-spacing:.5px">⛽ GENERATOR FUEL STATUS</div>`;
    gs.forEach(function(g){
      const pct=g.capacity>0?Math.round(g.current/g.capacity*100):0;
      const fc=pct>=50?'#27ae60':pct>=25?'#f39c12':'#c0392b';
      h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:8px 10px;background:#f6f8fc;border-radius:8px;border-left:4px solid ${fc}">`;
      h+=`<div style="min-width:70px"><div style="font-size:12px;font-weight:800;color:var(--navy)">${g.name}</div><div style="font-size:10px;color:#666">${g.capacity}L capacity</div></div>`;
      h+=`<div style="flex:1"><div style="background:#e5e9f0;border-radius:5px;height:18px;overflow:hidden"><div style="width:${Math.min(pct,100)}%;height:100%;background:${fc};display:flex;align-items:center;justify-content:flex-end;padding-right:5px"><span style="font-size:9px;font-weight:900;color:white">${pct}%</span></div></div></div>`;
      h+=`<div style="font-size:11px;font-weight:700;color:${fc};white-space:nowrap">${g.current}L</div>`;
      if(pct<25)h+=`<div style="font-size:10px;font-weight:800;color:var(--red)">⚠️</div>`;
      h+=`</div>`;
    });
    if(gs.some(function(g){return g.capacity>0?Math.round(g.current/g.capacity*100)<25:false;})){
      h+=`<div style="background:#ffebee;border-radius:7px;padding:7px 10px;font-size:11px;font-weight:800;color:var(--red)">⚠️ LOW FUEL — Refuel required</div>`;
    }
    h+=`</div>`;
  }


  // ── Vessel × Type grid (like template) ──
  const vessels=report.vessels||[];
  const types=(report.customTypes&&report.customTypes.length)?report.customTypes:['GP/DRY','REEFER','EMPTY','OOG'];
  // Vessel name + voyage edit inputs
  // Types management (hidden in share)
  var curTypes=(report.customTypes&&report.customTypes.length)?report.customTypes:['GP/DRY','REEFER','EMPTY','OOG'];
  h+='<div class="no-share" style="padding:8px 10px;background:#f6f8fc;border-bottom:1px solid #eee">';
  h+='<div style="font-size:10px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Container Types</div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">';
  curTypes.forEach(function(tp,ti){
    h+='<span style="background:var(--navy);color:white;border-radius:5px;padding:3px 8px;font-size:10px;font-weight:700;display:flex;align-items:center;gap:4px">'+tp;
    if(ti>=4)h+='<button onclick="removeYardType('+report.id+','+ti+')" style="background:none;border:none;color:rgba(255,255,255,.8);cursor:pointer;font-size:13px;padding:0">×</button>';
    h+='</span>';
  });
  h+='</div>';
  h+='<input id="nt_'+report.id+'" placeholder="New type e.g. HAZMAT" style="display:block;width:100%;box-sizing:border-box;padding:8px 10px;border:1.5px solid #ccc;border-radius:8px;font-size:12px;margin-bottom:6px">';
  h+='<button onclick="addYardType('+report.id+')" style="display:block;width:100%;padding:8px;background:var(--navy);color:white;border:none;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;box-sizing:border-box">+ Add Container Type</button>';
  // Custom columns management (between EXPORT and IMPORT)
  var customCols=report.customCols||[];
  h+='<div style="margin-top:12px;padding-top:10px;border-top:1px solid #ddd">';
  h+='<div style="font-size:10px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Extra Columns (between Export &amp; Import)</div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">';
  customCols.forEach(function(col,ci){
    h+='<span style="background:#2d6a8a;color:white;border-radius:5px;padding:3px 8px;font-size:10px;font-weight:700;display:flex;align-items:center;gap:4px">'+col.label;
    h+='<button onclick="removeYardCol('+report.id+','+ci+')" style="background:none;border:none;color:rgba(255,255,255,.8);cursor:pointer;font-size:13px;padding:0">×</button>';
    h+='</span>';
  });
  h+='</div>';
  h+='<input id="nc_'+report.id+'" placeholder="Column name e.g. STORAGE" style="display:block;width:100%;box-sizing:border-box;padding:8px 10px;border:1.5px solid #ccc;border-radius:8px;font-size:12px;margin-bottom:6px">';
  h+='<button onclick="addYardCol('+report.id+')" style="display:block;width:100%;padding:8px;background:#2d6a8a;color:white;border:none;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;box-sizing:border-box">+ Add Column</button>';
  h+='</div>';
  h+='</div></div>';
  h+=`<div class="yard-twrap">
    <table style="font-size:11px;">
      <thead>
        <tr>
          <th style="background:var(--navy);color:white;padding:8px 10px;text-align:left;font-size:11px;width:38%">${_adminLbl('yrd_col_vessels','VESSELS',true)}</th>
          <th style="background:var(--navy);color:white;padding:8px 4px;text-align:center;width:8%">${_adminLbl('yrd_col_type','TYPE',true)}</th>
          <th style="background:var(--navy);color:white;padding:8px 4px;text-align:center;width:15%">${_adminLbl('yrd_col_export','EXPORT',true)}</th>
          ${(report.customCols||[]).map(c=>`<th style="background:var(--navy);color:white;padding:8px 4px;text-align:center">${c.label}</th>`).join('')}
          <th style="background:var(--navy);color:white;padding:8px 4px;text-align:center;width:15%">${_adminLbl('yrd_col_import','IMPORT',true)}</th>
          <th style="background:#c0392b;color:white;padding:8px 4px;text-align:center;font-weight:800;width:15%">${_adminLbl('yrd_col_departed','DEPARTED',true)}</th>
        </tr>
      </thead>
      <tbody>`;
  let grandEx=0,grandIm=0,grandDep=0;
  vessels.forEach((v,vi)=>{
    types.forEach((t,ti)=>{
      const data=v.data[t]||{export:0,import:0,departed:0};
      grandEx+=data.export||0;grandIm+=data.import||0;grandDep+=data.departed||0;
      const isFirst=ti===0;
      const isLast=ti===types.length-1;
      const rowBg=vi%2===0?'#f8f9fc':'white';
      h+=`<tr style="background:${rowBg}">
        ${isFirst?`<td rowspan="${types.length}" style="font-weight:800;color:var(--navy);padding:6px 10px;border-right:1px solid var(--lb);vertical-align:top;min-width:120px;word-break:break-word">
          <div style="display:flex;align-items:baseline;gap:4px;flex-wrap:wrap">
            <input class="vessel-inline-edit vessel-name" value="${v.name}" oninput="editYardField(${report.id},${vi},'name',this.value)" style="border:none;outline:none;font-weight:800;font-size:11px;color:var(--navy);background:transparent;padding:0;min-width:40px;width:auto"/>
            ${v.voyage?`<span style="color:#999;font-size:10px">|</span><input class="vessel-inline-edit vessel-voyage" value="${v.voyage}" oninput="editYardField(${report.id},${vi},'voyage',this.value)" style="border:none;outline:none;font-size:10px;color:#c0392b;font-weight:700;background:transparent;padding:0;min-width:30px;width:auto"/>`:''}
          </div>
        </td>`:''}
        <td style="padding:5px 6px;text-align:center;color:#555;font-size:10.5px;border-bottom:1px solid #f0f0f0">${t}</td>
        <td style="padding:5px 6px;text-align:center;border-bottom:1px solid #f0f0f0">
          <input type="number" value="${data.export||''}" placeholder="-" oninput="updateYardCell(${report.id},${vi},'${t}','export',this.value)" class="yard-input"/>
        </td>
        ${(report.customCols||[]).map(c=>`<td style="padding:5px 6px;text-align:center;border-bottom:1px solid #f0f0f0"><input type="number" value="${data[c.key]||''}" placeholder="-" oninput="updateYardCell(${report.id},${vi},'${t}','${c.key}',this.value)" class="yard-input"/></td>`).join('')}
        <td style="padding:5px 6px;text-align:center;border-bottom:1px solid #f0f0f0">
          <input type="number" value="${data.import||''}" placeholder="-" oninput="updateYardCell(${report.id},${vi},'${t}','import',this.value)" class="yard-input"/>
        </td>
        <td style="padding:5px 6px;text-align:center;background:#fff5f5;border-bottom:1px solid #f0f0f0">
          <input type="number" value="${data.departed||''}" placeholder="-" oninput="updateYardCell(${report.id},${vi},'${t}','departed',this.value)" class="yard-input"/>
        </td>
      </tr>`;
    });
    // Vessel total row
    let vEx=0,vIm=0,vDep=0;
    types.forEach(t=>{const d=v.data[t]||{};vEx+=d.export||0;vIm+=d.import||0;vDep+=d.departed||0;});
    let vCustom=(report.customCols||[]).map(c=>{let s=0;types.forEach(t=>{const d=v.data&&v.data[t]?v.data[t]:{};s+=d[c.key]||0;});return s;});
    h+=`<tr style="background:var(--yellow)">
      <td colspan="2" style="padding:5px 10px;font-weight:800;font-size:11px;color:#000">TOTAL</td>
      <td style="text-align:center;font-weight:800">${vEx||0}</td>
      ${(report.customCols||[]).map((c,ci)=>`<td style="text-align:center;font-weight:800">${vCustom[ci]||0}</td>`).join('')}
      <td style="text-align:center;font-weight:800">${vIm||0}</td>
      <td style="text-align:center;font-weight:800">${vDep||0}</td>
    </tr>`;
    // Add vessel button row
    var _remColspan=3+(report.customCols||[]).length+2; // TYPE+EXPORT+customCols+IMPORT+DEPARTED
    h+=`<tr class="no-share"><td colspan="${_remColspan}" style="padding:4px 8px">
      <button onclick="removeYardVessel(${report.id},${vi})" style="background:#fff0f0;color:var(--red);border:1px solid var(--red);border-radius:5px;padding:3px 10px;font-size:10px;cursor:pointer;font-weight:700">Remove ${v.name}</button>
    </td></tr>`;
  });
  h+=`</tbody></table></div>`;

  // ── Add vessel ──
  h+=`<div id="addVesselWrap_${report.id}" style="padding:10px 12px;border-top:1px solid var(--lb)">
    <button id="addVesselBtn_${report.id}" onclick="addYardVessel(${report.id})" style="background:var(--navy);color:white;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:800;cursor:pointer">+ Add Vessel</button>
  </div>`;

  // ── Summary totals (matches template bottom section) ──
  let totalGP=0,totalReef=0,totalMty=0,totalInYard=0;
  vessels.forEach(v=>{
    if(!v||!v.data)return;
    totalGP+=(v.data['GP/DRY']?.export||0)+(v.data['GP/DRY']?.import||0);
    totalReef+=(v.data['REEFER']?.export||0)+(v.data['REEFER']?.import||0);
    totalMty+=(v.data['EMPTY']?.export||0)+(v.data['EMPTY']?.import||0);
  });
  // IN YARD = export + import + all custom columns (not departed)
  var grandCustomTotal=0;
  (report.customCols||[]).forEach(function(col){
    vessels.forEach(function(v){
      types.forEach(function(t){
        grandCustomTotal+=(v.data&&v.data[t]&&v.data[t][col.key])||0;
      });
    });
  });
  totalInYard=grandEx+grandIm+grandCustomTotal;

  h+=`<div style="padding:12px;border-top:2px solid var(--lb)">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="background:var(--yellow);border-radius:8px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:11px;font-weight:800">${_adminLbl('yrd_sum_exports','TOTAL EXPORTS',false)}</span>
        <span style="font-size:16px;font-weight:900">${grandEx}</span>

function resolveFullVesselName(abbrev){
  // Try exact match first
  const abbrevs=ST.vesselAbbrevs||[];
  const s=abbrev.toLowerCase();
  // Exact match
  const exact=abbrevs.find(function(v){return v.abbrev.toLowerCase()===s;});
  if(exact)return exact.full;
  // Partial match - abbrev starts with known key
  const partial=abbrevs.find(function(v){return s.startsWith(v.abbrev.toLowerCase())||v.abbrev.toLowerCase().startsWith(s);});
  if(partial)return partial.full;
  // Return as-is
  return abbrev;
}

function parseVesselRef(val){
  const s=String(val||'').trim();
  // Accept: 4 digits + vessel abbrev letters + any voyage suffix (ZA613A style OR CAM001 etc)
  const m=s.match(/^(\d{4})([A-Za-z]+?)([A-Za-z0-9]+)$/i);
  if(!m)return null;
  const afterDigits=m[2]+m[3]; // full string after 4 digits
  // Find longest matching known abbrev prefix
  const abbrevs=ST.vesselAbbrevs||[];
  let foundEntry=null,bestLen=0;
  abbrevs.forEach(function(v){
    const a=v.abbrev.toLowerCase();
    if(afterDigits.toLowerCase().startsWith(a)&&a.length>bestLen){foundEntry=v;bestLen=a.length;}
  });
  if(!foundEntry){
    // Try strict ZA pattern as fallback
    const m2=s.match(/^(\d{4})([A-Za-z]+?)(Z[A-BCDS]\d{3}[A-Z])$/i);
    if(!m2)return null;
    const abbrevRaw=m2[2].toLowerCase();
    const voyage=m2[3].toUpperCase();
    const found2=(ST.vesselAbbrevs||[]).find(v=>abbrevRaw.toLowerCase().startsWith(v.abbrev.toLowerCase()));
    return{vessel:found2?found2.full:abbrevRaw.toUpperCase(),voyage};
  }
  const vessel=foundEntry.full;
  const voyage=afterDigits.substring(bestLen).toUpperCase()||'';
  return{vessel,voyage};
}
function classifyUnit2(iso,frgt,power){
  var I=String(iso||'').toUpperCase();
  var F=String(frgt||'').toUpperCase();
  var P=String(power||'').toUpperCase();
  var isEmpty=F.includes('EMPTY')||F.includes('MTY');
  var isOOG=/^(22U|42U|22P|42P)/i.test(I);
  var isReefer=(I.length>=3&&I[2]==='R')||I.includes('R1')||I.includes('R0');
  if(isEmpty)return'EMPTY';
  if(isOOG)return'OOG';
  if(isReefer&&P==='YES')return'REEFER';
  return'GP/DRY';
}
function uploadYardExcelMulti(input){
  var files=input.files;if(!files||!files.length)return;
  var fileArr=Array.from(files);
  var pending=fileArr.length,allRows=[];
  var rName=fileArr.length===1?fileArr[0].name.replace(/\.(xlsx|xls|csv)$/i,''):fileArr.length+' files combined';
  function doFile(file,cb){
    var rdr=new FileReader();
    rdr.onload=function(e){
      try{
        if(typeof XLSX==='undefined'){cb([]);return;}
        var wb=XLSX.read(e.target.result,{type:'array'});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        var hRow=-1;
        for(var i=0;i<Math.min(10,raw.length);i++){var r=raw[i].map(function(v){return String(v||'').trim();});if(r.indexOf('Unit Nbr')>=0||r.indexOf('Last Move')>=0){hRow=i;break;}}
        if(hRow===-1){cb([]);return;}
        var hdrs=raw[hRow].map(function(v){return String(v||'').trim();});
        var col={};hdrs.forEach(function(h,i){col[h]=i;});
        var rows=[];
        raw.slice(hRow+1).forEach(function(row){
          if(!row||row.every(function(c){return !c;}))return;
          var uNbr=String(row[col['Unit Nbr']]||'').trim();if(!uNbr)return;
          var ib=String(row[col['I/B Actual Visit']]||'').trim();
          var ob=String(row[col['O/B Actual Visit']]||'').trim();
          var iso=String(row[col['Type ISO']]||'').trim();
          var frgt=String(row[col['Frght Kind']]||'').trim();
          var pwr=String(row[col['Reqs Power']]||'').trim();
          var cat=String(row[col['Category']]||'').toUpperCase().trim();
          var pod=String(row[col['POD']]||'').trim();
          var tst=String(col['T-State']!=null?row[col['T-State']]||'':'').trim().toUpperCase();
          if(tst==='INBOUND'||cat.includes('LOADED'))return;
          var isImp=cat.includes('IMPORT'),isExp=cat.includes('EXPORT');
          var isSto=cat.includes('STORAGE'),isTrans=cat.includes('TRANSSHIP')||cat.includes('TRANSHIP'),isThru=cat.includes('THROUGH');
          var vRef='',fE=false,fI=false;
          if(isImp)vRef=ib;
          else if(isExp)vRef=ob;
          else if(isSto){var p1=parseVesselRef(ib),p2=parseVesselRef(ob);if(p1){vRef=ib;fI=true;}else if(p2){vRef=ob;fE=true;}else return;}
          else if(isTrans){var p3=parseVesselRef(ob),p4=parseVesselRef(ib);if(p3){vRef=ob;fE=true;}else if(p4){vRef=ib;fI=true;}else return;}
          else if(isThru){if(tst==='YARD'){vRef=ob||ib;fE=true;}else return;}
          else return;
          var parsed=parseVesselRef(vRef);
          // Non-standard format — include row anyway with raw ref so user can edit
          var vessel=parsed?resolveFullVesselName(parsed.vessel):'';
          var voyage=parsed?parsed.voyage:vRef;
          var typeKey=classifyUnit2(iso,frgt,pwr);
          var dir=tst==='DEPARTED'?'departed':(fI||isImp?'import':'export');
          rows.push({uNbr:uNbr,typeKey:typeKey,dir:dir,vessel:vessel,voyage:voyage,pod:pod});
        });
        cb(rows);
      }catch(ex){console.log('parse err:',ex.message);cb([]);}
    };
    rdr.readAsArrayBuffer(file);
  }
  fileArr.forEach(function(f){doFile(f,function(rows){allRows=allRows.concat(rows);pending--;if(pending===0)merge();});});
  function merge(){
    // Keep one occurrence per unit number
    var seen={};
    var deduped=allRows.filter(function(r){if(seen[r.uNbr])return false;seen[r.uNbr]=true;return true;});
    var dupeCount=allRows.length-deduped.length;
    // Group by vessel+voyage key
    var vmap={};
    deduped.forEach(function(r){
      var vkey=r.vessel+'__'+r.voyage;
      if(!vmap[vkey])vmap[vkey]={name:r.vessel,voyage:r.voyage,pods:{},data:{'GP/DRY':{export:0,import:0,departed:0},'REEFER':{export:0,import:0,departed:0},'EMPTY':{export:0,import:0,departed:0},'OOG':{export:0,import:0,departed:0}}};
      vmap[vkey].data[r.typeKey][r.dir]++;
      if(r.pod){vmap[vkey].pods[r.pod]=(vmap[vkey].pods[r.pod]||0)+1;}
    });
    var vessels=Object.values(vmap);
    ST.yardReports.unshift({id:Date.now(),name:rName,uploadedAt:new Date().toISOString(),vessels:vessels,fuel:null});
    yardActiveReport=0;sv();renderYard();
    var msg='Parsed '+deduped.length+' units across '+vessels.length+' vessel(s) from '+fileArr.length+' file(s).';
    if(dupeCount>0)msg+='\n'+dupeCount+' duplicate unit number(s) removed (kept one each).';
    alert(msg);
  }
}

async function shareReport(capId){
  const el=document.getElementById(capId);
  if(!el){alert('Nothing to capture.');return;}
  if(typeof html2canvas==='undefined'){alert('html2canvas not loaded.');return;}

  const PORTRAIT_W=420;

  // ── 1. Clone and clean ──────────────────────────────────────────────
  const clone=el.cloneNode(true);

  // Stamp live input values (cloneNode doesn't carry live .value)
  var liveInputs=el.querySelectorAll('input,select,textarea');
  var cloneInputs=clone.querySelectorAll('input,select,textarea');
  liveInputs.forEach(function(live,idx2){if(cloneInputs[idx2])cloneInputs[idx2].value=live.value;});

  // Remove share buttons and UI controls
  clone.querySelectorAll('.rh-share').forEach(function(b){b.parentNode&&b.parentNode.removeChild(b);});
  clone.querySelectorAll('button,.add-row-btn').forEach(function(b){b.parentNode&&b.parentNode.removeChild(b);});
  clone.querySelectorAll('datalist').forEach(function(dl){dl.parentNode&&dl.parentNode.removeChild(dl);});

  // Replace inputs with plain text spans
  clone.querySelectorAll('input,select,textarea').forEach(function(inp){
    var span=document.createElement('span');
    span.textContent=inp.value||'';
    span.style.cssText='font-size:11px;font-weight:700;';
    if(inp.parentNode)inp.parentNode.replaceChild(span,inp);
  });

  // ── 2. Mount clone in DOM FIRST (off-screen) so getComputedStyle works ─
  // We MUST be in the live DOM before reading computed styles.
  // Class-based CSS (like .card{overflow:hidden}, .twrap{overflow-x:auto})
  // is invisible to node.style — only getComputedStyle reveals it.
  var RENDER_W=Math.max(el.scrollWidth, el.offsetWidth, 500);
  const wrapper=document.createElement('div');
  wrapper.style.cssText=[
    'position:fixed',
    'left:-'+(RENDER_W+200)+'px',
    'top:0',
    'width:'+RENDER_W+'px',
    'background:#f0f2f7',
    'font-family:Segoe UI,Arial,sans-serif',
    'box-sizing:border-box',
    'overflow:visible',
    'z-index:-1'
  ].join(';');
  wrapper.appendChild(clone);
  document.body.appendChild(wrapper);

  try{
    // First paint — computed styles now available
    await new Promise(function(r){requestAnimationFrame(function(){requestAnimationFrame(r);});});
    await new Promise(function(r){setTimeout(r,200);});

    // ── 3. Fix ALL overflow clipping using getComputedStyle ─────────────
    // .card{overflow:hidden} and .twrap{overflow-x:auto} are class rules —
    // they only show up in getComputedStyle, not node.style.
    // Force every element that clips to overflow:visible via inline style.
    Array.from(wrapper.querySelectorAll('*')).forEach(function(node){
      try{
        var cs=window.getComputedStyle(node);
        if(cs.overflow!=='visible'||cs.overflowX!=='visible'||cs.overflowY!=='visible'){
          node.style.overflow='visible';
          node.style.overflowX='visible';
          node.style.overflowY='visible';
        }
        if(cs.transform&&cs.transform!=='none'){
          node.style.transform='none';
        }
        // Remove any fixed/max heights that could clip content
        if(cs.maxHeight&&cs.maxHeight!=='none'&&cs.maxHeight!=='0px'){
          node.style.maxHeight='none';
        }
      }catch(e){}
    });
    wrapper.style.height='auto';
    wrapper.style.overflow='visible';

    // ── 4. Reflow after style changes ────────────────────────────────────
    await new Promise(function(r){requestAnimationFrame(function(){requestAnimationFrame(r);});});
    await new Promise(function(r){setTimeout(r,150);});

    // ── 5. Measure full height (no transforms = scrollHeight is accurate) ─
    var captureH=wrapper.scrollHeight;
    if(captureH<100){captureH=800;}
    wrapper.style.height=captureH+'px';
    await new Promise(function(r){setTimeout(r,50);});

    // ── 6. Render: scale canvas to portrait width ─────────────────────────
    var scaleFactor=(PORTRAIT_W/RENDER_W)*2;
    const canvas=await html2canvas(wrapper,{
      scale:scaleFactor,
      useCORS:true,
      backgroundColor:'#f0f2f7',
      width:RENDER_W,
      height:captureH,
      windowWidth:RENDER_W,
      windowHeight:captureH,
      scrollX:0,
      scrollY:0,
      allowTaint:true,
      logging:false
    });

    canvas.toBlob(async function(blob){
      if(!blob){alert('Failed to create image.');return;}
      const file=new File([blob],'Report.png',{type:'image/png'});
      var shared=false;
      try{
        if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
          await navigator.share({files:[file],title:'Terminal Report'});
          shared=true;
        }
      }catch(shareErr){shared=false;}
      if(!shared){
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download='Report.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function(){URL.revokeObjectURL(a.href);},2000);
      }
    },'image/png',0.96);

  }catch(e){alert('Share failed: '+e.message);}
  finally{if(wrapper.parentNode)document.body.removeChild(wrapper);}
}

function fuelColor(pct){return pct>=50?'#1e8449':pct>=25?'#f39c12':'#c0392b';}
function renderGenerators(){
  // Called inline in admin and supervisor dashboard
  const gens=ST.generators||[];
  if(!gens.length)return'<div style="font-size:12px;color:#aaa;padding:8px 0">No generators added yet.</div>';
  let h='';
  const lowGens=gens.filter(g=>{const pct=g.capacity>0?Math.round(g.current/g.capacity*100):0;return pct<25;});
  if(lowGens.length){
    h+=`<div class="gen-low-warn" style="margin:0 0 10px">⚠️ LOW FUEL: ${lowGens.map(g=>g.name).join(', ')}</div>`;
  }
  gens.forEach(g=>{
    const pct=g.capacity>0?Math.round(g.current/g.capacity*100):0;
    const fc=fuelColor(pct);
    h+=`<div class="gen-row">
      <div class="gen-name">Gen ${g.name}</div>
      <div class="gen-bar-wrap">
        <div class="gen-bar" style="width:${Math.min(pct,100)}%;background:${fc}">
          <span class="gen-pct" style="color:white">${pct}%</span>
        </div>
      </div>
      <div class="gen-cap">${g.current||0}L / ${g.capacity||0}L</div>
    </div>`;

function addGenerator(){
  const name=prompt('Generator name/number (e.g. GEN-1):');if(!name)return;
  const cap=parseFloat(prompt('Capacity in litres (e.g. 1000):'));if(!cap||isNaN(cap))return;
  const pct=parseFloat(prompt('Current fuel percentage (0-100):'));
  const cur=(!isNaN(pct)&&pct>=0)?Math.round(cap*pct/100):cap;
  if(!ST.generators)ST.generators=[];
  ST.generators.push({id:Date.now(),name,capacity:cap,current:cur});
  sv();renderAdmin();
}
function updateGenFuel(id,val,isPercent){
  const g=ST.generators.find(x=>x.id===id);if(!g)return;
  if(isPercent){const pct=parseFloat(val)||0;g.current=Math.round(g.capacity*pct/100);}
  else{g.current=parseFloat(val)||0;}
  sv();
}

}

function generateAIAnalysis(resultId,loadingId){
  resultId=resultId||'aiResult';loadingId=loadingId||'aiLoading';
  const data=buildAnalysisData();
  const sess=getSess();
  if(!data){$(resultId)&&($(resultId).innerHTML='<div class="ai-result">No data available yet.</div>');return;}
  $(loadingId)&&($(loadingId).style.display='flex');$(resultId)&&($(resultId).innerHTML='');
  setTimeout(function(){
    $(loadingId)&&($(loadingId).style.display='none');
    const avgPct=data.sessions.length?Math.round(data.sessions.reduce(function(a,s){return a+s.pct;},0)/data.sessions.length):0;
    const topDelay=Object.entries(data.delayPatterns).sort(function(a,b){return b[1]-a[1];})[0];
    const peakHour=Object.entries(data.hourlyPerformance).sort(function(a,b){return b[1]-a[1];})[0];
    const sorted=[...data.sessions].sort(function(a,b){return b.pct-a.pct;});
    const best=sorted[0],worst=sorted[sorted.length-1];

    // Crane productivity per session
    const craneStats=data.sessions.map(function(s){return{vessel:s.vessel,movesPerCrane:s.cranes>0?Math.round(s.total/s.cranes):0,cranes:s.cranes,total:s.total,pct:s.pct};});
    const avgMPC=craneStats.length?Math.round(craneStats.reduce(function(a,s){return a+s.movesPerCrane;},0)/craneStats.length):0;

    // Delay time analysis
    var totalDelayMins=0,delayCount=0;
    ST.sessions.forEach(function(s){for(var c=1;c<=s.numCranes;c++){var rk=s.id+'_c'+c;(ST.delayRowIds&&ST.delayRowIds[rk]||[0]).forEach(function(r){var d=ST.delays[s.id+'_'+c+'_'+r];if(d&&d.from&&d.to){var f=d.from.split(':'),t=d.to.split(':');var diff=(parseInt(t[0])*60+parseInt(t[1]||0))-(parseInt(f[0])*60+parseInt(f[1]||0));if(diff<0)diff+=1440;totalDelayMins+=diff;delayCount++;}});}});
    var avgDelayMins=delayCount>0?Math.round(totalDelayMins/delayCount):0;

    // ETC accuracy
    const etc=calcETC();

    // Hourly rate breakdown for active session
    var hourlyBreakdown='';
    if(sess){
      var slotRates=shiftSlots().map(function(s2){
        var t=0;for(var ci=1;ci<=sess.numCranes;ci++)t+=(ST.hourly[hk(sess.id,s2,ci,'discharge')]||0)+(ST.hourly[hk(sess.id,s2,ci,'load')]||0);
        return{slot:fs(s2),total:t};
      }).filter(function(x){return x.total>0;});
      if(slotRates.length){
        var maxSlot=slotRates.reduce(function(a,b){return b.total>a.total?b:a;});
        var minSlot=slotRates.reduce(function(a,b){return b.total<a.total?b:a;});
        var avgRate=Math.round(slotRates.reduce(function(a,b){return a+b.total;},0)/slotRates.length);
        hourlyBreakdown='\n📈 ACTIVE SESSION HOURLY BREAKDOWN\nAvg moves/hr: '+avgRate+'\nPeak hour: '+maxSlot.slot+' ('+maxSlot.total+' moves)\nLowest hour: '+minSlot.slot+' ('+minSlot.total+' moves)\n';
        if(maxSlot.total>avgRate*1.5)hourlyBreakdown+='⚡ Strong peak — ensure crane operators are rotating to sustain this rate.\n';
        if(minSlot.total<avgRate*0.5)hourlyBreakdown+='⚠️ Low hour detected — check for unreported delays during '+minSlot.slot+'.\n';
      }
    }

    var analysis='📊 TERMINAL PERFORMANCE ANALYSIS\n';
    analysis+='─────────────────────────────────\n';
    analysis+='Sessions Analysed: '+data.sessions.length+'\n';
    analysis+='Overall Target Achievement: '+avgPct+'%  '+(avgPct>=90?'🟢 Excellent':avgPct>=70?'🟡 On Track':'🔴 Needs Attention')+'\n';
    analysis+='Avg Moves per Crane: '+avgMPC+'\n';
    if(best)analysis+='🏆 Best Session: '+best.vessel+' — '+best.pct+'% ('+best.total+' moves, '+best.cranes+' cranes)\n';
    if(worst&&data.sessions.length>1)analysis+='📉 Lowest: '+worst.vessel+' — '+worst.pct+'% ('+worst.total+' moves)\n';

    analysis+='\n⏱️ DELAY INTELLIGENCE\n';
    analysis+='─────────────────────────────────\n';
    analysis+='Total Delay Events: '+delayCount+'\n';
    if(avgDelayMins>0)analysis+='Avg Delay Duration: '+avgDelayMins+' min\n';
    if(topDelay)analysis+='Most Common: '+topDelay[0]+' ('+topDelay[1]+'x)\n';
    if(peakHour)analysis+='Peak Delay Hour: '+peakHour[0]+':00 ('+peakHour[1]+' events)\n';

    var delayEntries=Object.entries(data.delayPatterns).sort(function(a,b){return b[1]-a[1];});
    if(delayEntries.length>1){
      analysis+='\nDelay Breakdown:\n';
      delayEntries.slice(0,5).forEach(function(e){analysis+='  • '+e[0]+': '+e[1]+'x\n';});
    }

    if(etc&&!etc.done&&etc.eta){
      analysis+='\n⏳ ETC (CURRENT SESSION)\n';
      analysis+='─────────────────────────────────\n';
      analysis+='ETA: '+etc.eta+(etc.hoursLeft>12?' ('+etc.etaDate+')':'')+'\n';
      analysis+='Remaining: '+etc.remaining+' units\n';
      analysis+='Current Rate: '+etc.rate+' moves/hr\n';
      if(parseFloat(etc.rate)<avgMPC*0.8)analysis+='⚠️ Rate is below terminal average — investigate unreported delays.\n';
      if(parseFloat(etc.rate)>avgMPC*1.2)analysis+='✅ Above average rate — maintain current pace.\n';
    }

    if(hourlyBreakdown)analysis+=hourlyBreakdown;

    analysis+='\n💡 KEY OBSERVATIONS\n';
    analysis+='─────────────────────────────────\n';
    if(avgPct<70)analysis+='• Target achievement critically low. Review crane allocation strategy and pre-shift planning protocols.\n';
    else if(avgPct<85)analysis+='• Performance within acceptable range. Focus on reducing '+( topDelay?topDelay[0]:'operational')+' delays.\n';
    else analysis+='• Strong overall performance. Document current procedures as standard SOPs for all shifts.\n';
    if(delayCount>data.sessions.length*3)analysis+='• High delay frequency ('+(Math.round(delayCount/data.sessions.length*10)/10)+' avg/session). Pre-shift equipment checks recommended.\n';
    if(data.sessions.length>=3){var variance=Math.max(...sorted.map(function(s){return s.pct;}))-Math.min(...sorted.map(function(s){return s.pct;}));if(variance>30)analysis+='• High performance variance ('+variance+'%) between sessions — consistency improvement needed.\n';}

    $(resultId)&&($(resultId).innerHTML='<div class="ai-result" style="white-space:pre-wrap;font-family:monospace;font-size:11px;line-height:1.7">'+analysis+'</div>');
  },1800);
}

function generateSuggestions(resultId,loadingId){
  resultId=resultId||'aiSugg';loadingId=loadingId||'suggLoading';
  const data=buildAnalysisData();
  const sess=getSess();
  if(!data){$(resultId)&&($(resultId).innerHTML='<div class="ai-insight">No data yet.</div>');return;}
  $(loadingId)&&($(loadingId).style.display='flex');$(resultId)&&($(resultId).innerHTML='');
  setTimeout(function(){
    $(loadingId)&&($(loadingId).style.display='none');
    const avgPct=data.sessions.length?Math.round(data.sessions.reduce(function(a,s){return a+s.pct;},0)/data.sessions.length):0;
    const topDelay=Object.entries(data.delayPatterns).sort(function(a,b){return b[1]-a[1];})[0];
    const peakHour=Object.entries(data.hourlyPerformance).sort(function(a,b){return b[1]-a[1];})[0];
    const etc=calcETC();
    var suggestions=[];

    // Target performance
    if(avgPct<70)suggestions.push({ico:'🚨',txt:'Critical: '+avgPct+'% average achievement. Immediate review of crane allocation and shift planning required. Consider splitting load more evenly across cranes.'});
    else if(avgPct<85)suggestions.push({ico:'📈',txt:'Performance at '+avgPct+'%. Closing the gap: focus on reducing idle time between gang changes and during meal breaks.'});
    else if(avgPct<95)suggestions.push({ico:'✅',txt:'Good performance at '+avgPct+'%. Fine-tune by pre-positioning equipment before each slot starts to reduce ramp-up time.'});
    else suggestions.push({ico:'🏆',txt:'Excellent '+avgPct+'% achievement. Capture current workflows as SOPs and use as benchmark for all shifts.'});

    // Delay-specific recommendations
    if(topDelay){
      var delayRec={
        'Weather Delay':'Weather delays cannot be avoided but minimize impact by having contingency tasks ready (restow, paperwork, equipment checks).',
        'Equipment Delay':'Implement a mandatory pre-shift equipment inspection checklist. Log all defects before shift starts.',
        'Operational Delay':'Review gang communication protocols. Most operational delays are preventable with better pre-planning.',
        'FPT Delay':'Coordinate with FPT supervisor at shift start. Ensure forklift positions are pre-assigned before first lift.',
        'Non productive':'Structured break schedule with staggered timing prevents all cranes stopping simultaneously.'
      };
      var rec=delayRec[topDelay[0]]||('Address '+topDelay[0]+' — occurring '+topDelay[1]+'x across sessions.');
      suggestions.push({ico:'⚠️',txt:'Top delay: '+topDelay[0]+' ('+topDelay[1]+'x). '+rec});
    }

    // Peak delay hour
    if(peakHour){
      var h=parseInt(peakHour[0]);
      var shiftContext=h>=6&&h<9?'start-of-shift ramp-up':h>=10&&h<12?'mid-morning — possible break overlap':h>=12&&h<14?'lunch period':h>=14&&h<16?'afternoon fatigue window':'end-of-shift pressure period';
      suggestions.push({ico:'🕐',txt:'Most delays cluster at '+peakHour[0]+':00 ('+shiftContext+'). Add supervisor presence during this window. '+peakHour[1]+' events recorded.'});
    }

    // ETC-specific suggestion
    if(etc&&!etc.done&&etc.eta){
      var rate=parseFloat(etc.rate);
      var avgRate=data.sessions.length?data.sessions.reduce(function(a,s){return a+(s.total/(s.cranes||2));},0)/data.sessions.length:0;
      if(rate<avgRate*0.8)suggestions.push({ico:'⏳',txt:'Current rate ('+etc.rate+' moves/hr) is below terminal average. ETA: '+etc.eta+'. Investigate unreported delays — check if all cranes are active.'});
      else suggestions.push({ico:'⏱️',txt:'On track for '+etc.eta+' completion at '+etc.rate+' moves/hr. Maintain current pace — '+etc.remaining+' units remaining.'});
    }

    // Multi-crane balance
    if(sess&&sess.numCranes>1){
      var craneLoads=[];
      for(var ci=1;ci<=sess.numCranes;ci++){
        var cTotal=shiftSlots().reduce(function(a,s2){return a+(ST.hourly[hk(sess.id,s2,ci,'discharge')]||0)+(ST.hourly[hk(sess.id,s2,ci,'load')]||0);},0);
        craneLoads.push({crane:craneName(ci),total:cTotal});
      }
      var maxLoad=Math.max.apply(null,craneLoads.map(function(x){return x.total;}));
      var minLoad=Math.min.apply(null,craneLoads.map(function(x){return x.total;}));
      if(maxLoad>0&&minLoad<maxLoad*0.6)suggestions.push({ico:'⚖️',txt:'Crane imbalance detected. '+craneLoads.reduce(function(a,x){return a+(x.total===maxLoad?x.crane:'');},'')+ ' has significantly more moves. Rebalance splits at next shift change.'});
    }

    suggestions.push({ico:'📋',txt:'Log delays in real-time, not end-of-shift. Real-time logging improves ETC accuracy by up to 40% and gives management live visibility.'});
    suggestions.push({ico:'🔄',txt:'Use History collapsibles to compare shift performance. Identify which shift type (Day/Night) consistently underperforms and investigate root cause.'});

    $(resultId)&&($(resultId).innerHTML=suggestions.map(function(x){return'<div class="ai-insight"><strong>'+x.ico+'</strong> '+x.txt+'</div>';}).join(''));
  },1400);
}

function addGeneratorFromYard(){
  const name=prompt('Generator name/number (e.g. GEN-1, 1, 2):');
  if(!name)return;
  const cap=parseFloat(prompt('Capacity in litres (e.g. 1000):'));
  if(!cap||isNaN(cap)){alert('Please enter a valid capacity.');return;}
  const pct=parseFloat(prompt('Current fuel percentage (0-100):'));
  const cur=(!isNaN(pct)&&pct>=0&&pct<=100)?Math.round(cap*pct/100):cap;
  if(!ST.generators)ST.generators=[];
  ST.generators.push({id:Date.now(),name:name,capacity:cap,current:cur});
  sv();renderYard();
}

async function shareYardReport(reportId){
  var el=document.getElementById('ycap_'+reportId);
  if(!el){alert('Nothing to capture.');return;}
  if(typeof html2canvas==='undefined'){alert('html2canvas not loaded.');return;}
  var numColor=ST.settings.reportNumColor||'#000000';
  // Portrait render: lay out at 480px wide (phone portrait width).
  // Table columns are percentage-based so they fill 100% of this width.
  // Capture at scale:3 for sharp output (~1440px wide retina-ready portrait image).
  var W=480;

  // ── Clone the element ──
  var clone=el.cloneNode(true);

  // ── Remove all UI-only elements ──
  clone.querySelectorAll('.no-share').forEach(function(ns){ns.parentNode&&ns.parentNode.removeChild(ns);});
  clone.querySelectorAll('button').forEach(function(b){if(!b.closest('td')&&!b.closest('th'))b.parentNode&&b.parentNode.removeChild(b);});
  clone.querySelectorAll('.rh-share').forEach(function(b){b.parentNode&&b.parentNode.removeChild(b);});
  clone.querySelectorAll('[id^="pod_"] button').forEach(function(b){b.parentNode&&b.parentNode.removeChild(b);});

  // ── Handle POD charts ──
  clone.querySelectorAll('[id^="pod_"]').forEach(function(pod){
    if(pod.getAttribute('data-share')==='0'){pod.parentNode&&pod.parentNode.removeChild(pod);}
    else{pod.style.overflow='visible';}
  });

  // ── Convert vessel name inputs to plain text ──
  clone.querySelectorAll('.vessel-name').forEach(function(inp){
    var span=document.createElement('span');
    span.textContent=inp.value||'';
    span.style.cssText='font-weight:800;font-size:12px;color:#1F3864;';
    inp.parentNode.replaceChild(span,inp);
  });
  clone.querySelectorAll('.vessel-voyage').forEach(function(inp){
    var span=document.createElement('span');
    span.textContent=inp.value||'';
    span.style.cssText='font-size:10px;font-weight:700;color:#c0392b;';
    inp.parentNode.replaceChild(span,inp);
  });

  // ── Convert all number inputs to plain text ──
  clone.querySelectorAll('input').forEach(function(inp){
    var div=document.createElement('div');
    var v=inp.value||'';
    div.textContent=(v&&v!=='0')?v:'—';
    div.style.cssText='font-size:13px;font-weight:800;text-align:center;color:'+numColor+';';
    inp.parentNode.replaceChild(div,inp);
  });

  // ── Force table to fill 100% of portrait width, no overflow scroll ──
  clone.querySelectorAll('.yard-twrap,.twrap,.table-wrapper').forEach(function(tw){
    tw.style.overflow='visible';
    tw.style.width='100%';
    tw.style.maxWidth='none';
    tw.style.minWidth='unset';
  });
  clone.querySelectorAll('.yard-twrap table, .twrap table').forEach(function(tbl){
    tbl.style.width='100%';
    tbl.style.minWidth='unset';
    tbl.style.tableLayout='fixed';
  });
  // Keep original cell padding and font sizes - no overrides
  // Summary grid: keep original 2-column layout (yellow/blue pairs side by side)

  // ── Mount off-screen at portrait width ──
  var wrapper=document.createElement('div');
  wrapper.style.cssText='position:fixed;left:-9999px;top:0;width:'+W+'px;background:#f0f2f7;z-index:-1;font-family:Segoe UI,Arial,sans-serif;box-sizing:border-box;overflow:visible;';
  wrapper.appendChild(clone);
  document.body.appendChild(wrapper);

  // ── Wait for full layout paint ──
  await new Promise(function(r){requestAnimationFrame(function(){requestAnimationFrame(r);});});
  await new Promise(function(r){setTimeout(r,400);});

  // Use bounding-rect walk for true height (CSS transform doesn't affect scrollHeight)
  var wrapperTopY=wrapper.getBoundingClientRect().top;
  var trueBottomY=0;
  wrapper.querySelectorAll('*').forEach(function(node){
    var rect=node.getBoundingClientRect();
    var bottom=rect.bottom-wrapperTopY;
    if(bottom>trueBottomY)trueBottomY=bottom;
  });
  var captureH=Math.max(trueBottomY+20,wrapper.scrollHeight);
  wrapper.style.height=captureH+'px';
  await new Promise(function(r){setTimeout(r,100);});

  try{
    var canvas=await html2canvas(wrapper,{
      scale:3,
      useCORS:true,
      backgroundColor:'#f0f2f7',
      width:W,
      height:captureH,
      windowWidth:W,
      windowHeight:captureH,
      scrollX:0,
      scrollY:0,
      allowTaint:true,
      logging:false
    });
    canvas.toBlob(async function(blob){
      if(!blob)return;
      var file=new File([blob],'Yard-Status.png',{type:'image/png'});
      var shared=false;
      try{
        if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
          await navigator.share({files:[file],title:'Yard Status'});
          shared=true;
        }
      }catch(shareErr){shared=false;}
      if(!shared){
        var a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download='Yard-Status.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
      }
    },'image/png',0.96);
  }catch(e){alert('Share failed: '+e.message);}
  finally{if(wrapper.parentNode)document.body.removeChild(wrapper);}
}

function importData(){
  var txt=prompt('Paste exported data:');if(!txt)return;
  try{
    var data=JSON.parse(decodeURIComponent(escape(atob(txt.trim()))));
    var cu=ST.users.slice();

// Professional POD chart colours - muted, data-viz palette
var POD_COLORS=['#1a3a5c','#2d6a8a','#2d8a6e','#5a7a3a','#7a5230','#5c3878','#7a3a3a','#3a5c7a','#6b5a1e','#3a6b5a'];
function podColorFor(str){var h=0;for(var i=0;i<str.length;i++)h=((h<<5)-h+str.charCodeAt(i))|0;return POD_COLORS[Math.abs(h)%POD_COLORS.length];}

function renderPodChart(report){
  if(!report||!report.vessels||!report.vessels.length)return'';
  var podData={};
  report.vessels.forEach(function(v){
    var vname=v.name+(v.voyage?' / '+v.voyage:'');
    if(!v.pods||!Object.keys(v.pods).length)return;
    Object.entries(v.pods).forEach(function(e2){
      var pod=e2[0],cnt=e2[1];
      if(!pod||pod==='undefined')return;
      if(!podData[vname])podData[vname]={};
      podData[vname][pod]=(podData[vname][pod]||0)+cnt;
    });
  });
  if(!Object.keys(podData).length)return'';
  var rid=report.id;
  var podIncluded=(_podShareState[rid]!==false);
  var html='<div id="pod_'+rid+'" data-share="'+(podIncluded?'1':'0')+'" style="background:white;margin:8px 10px;border-radius:12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.08)">';
  html+='<div style="background:#1a3a5c;padding:12px 14px;display:flex;align-items:center;justify-content:space-between">';
  html+='<div style="color:white;font-size:13px;font-weight:700;letter-spacing:.3px">PORT OF DISCHARGE</div>';
  html+='<button onclick="togglePodShare(this)" data-id="'+rid+'" style="background:'+(podIncluded?'rgba(255,255,255,.15)':'rgba(220,50,50,.4)')+';border:1px solid rgba(255,255,255,.3);color:white;border-radius:6px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer">'+(podIncluded?'📊 Include in Share':'📊 Excluded from Share')+'</button>';
  html+='</div>';
  html+='<div style="padding:14px">';
  var viIdx=0;
  Object.entries(podData).forEach(function(vEntry){
    var vname=vEntry[0],pods=vEntry[1];
    var total=Object.values(pods).reduce(function(a,b){return a+b;},0);
    var sorted=Object.entries(pods).sort(function(a,b){return b[1]-a[1];});
    var maxCnt=sorted.length>0?sorted[0][1]:1;
    if(viIdx>0)html+='<div style="border-top:1px solid #f0f0f0;margin:12px 0 10px"></div>';
    html+='<div style="font-size:11px;font-weight:800;color:#1a3a5c;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">'+vname+'</div>';
    sorted.forEach(function(entry){
      var pod=entry[0],cnt=entry[1];
      var pct=total>0?Math.round(cnt/total*100):0;
      var barW=maxCnt>0?Math.round(cnt/maxCnt*100):0;
      var color=podColorFor(pod);
      html+='<div style="margin-bottom:8px">';
      html+='<div style="display:flex;justify-content:space-between;margin-bottom:3px">';
      html+='<span style="font-size:11px;font-weight:600;color:#333">'+pod+'</span>';
      html+='<span style="font-size:11px;color:#666">'+cnt+' &nbsp;'+pct+'%</span>';
      html+='</div>';
      html+='<div style="background:#f0f2f5;border-radius:3px;height:12px;overflow:hidden">';
      html+='<div style="width:'+barW+'%;height:100%;background:'+color+';border-radius:3px"></div>';
      html+='</div>';
      html+='</div>';
    });

    viIdx++;
  });
  html+='</div></div>';
  return html;
}

function markVesselComplete(){
  var sess=getSess();
  if(!sess){alert('No active session.');return;}
  if(!confirm('Mark this vessel as COMPLETE?\n\nThis will save it to history and clear the active session so you can start a new vessel.'))return;
  // Deep clone to avoid mutation
  var savedSess=JSON.parse(JSON.stringify(sess));
  savedSess.completed=true;
  savedSess.completedAt=new Date().toISOString();
  // Snapshot final results from all slots (full vessel)
  var sl_=ALL;savedSess._results={hourly:{},delays:{}};
  sl_.forEach(function(slot){for(var ci=1;ci<=savedSess.numCranes;ci++){['discharge','load'].forEach(function(t){var k=hk(savedSess.id,slot,ci,t);var sk=slot+'_'+ci+'_'+t;if(ST.hourly[k])savedSess._results.hourly[sk]=ST.hourly[k];});}});
  var idx=ST.sessions.findIndex(function(x){return x.id===savedSess.id;});
  if(idx>=0) ST.sessions[idx]=savedSess;
  else ST.sessions.unshift(savedSess);
  // Clear active session cleanly
  ST.activeId=null;
  ST.hourly={};ST.delays={};ST.delayRowIds={};
  sv();
  logActivity('Vessel Complete',savedSess.vesselName+' — marked complete and archived');
  try{localStorage.setItem(SK,JSON.stringify(ST));}catch(e){}
  alert('Vessel '+savedSess.vesselName+' saved to history. Start a new vessel in Input.');
  switchTab('input');
}

var _podShareState={};// persistent toggle state: reportId -> true(include)/false(exclude)
function togglePodShare(btn){
  var id=btn.getAttribute('data-id');
  // Toggle: default is included (true), flip it
  var wasIncluded=(_podShareState[id]!==false);// default true
  _podShareState[id]=!wasIncluded;
  var nowIncluded=_podShareState[id];
  var pod=document.getElementById('pod_'+id);
  if(pod) pod.setAttribute('data-share',nowIncluded?'1':'0');
  btn.textContent=nowIncluded?'📊 Include in Share':'📊 Excluded from Share';
  btn.style.background=nowIncluded?'rgba(255,255,255,.15)':'rgba(220,50,50,.4)';
}

function addYardType(reportId){
  var inp=document.getElementById('nt_'+reportId);
  if(!inp||!inp.value.trim())return;
  var rpt=ST.yardReports.find(function(r){return r.id===reportId;});
  if(!rpt)return;
  if(!rpt.customTypes||!rpt.customTypes.length)rpt.customTypes=['GP/DRY','REEFER','EMPTY','OOG'];
  var nt=inp.value.trim().toUpperCase();
  if(rpt.customTypes.indexOf(nt)<0){
    rpt.customTypes.push(nt);
    (rpt.vessels||[]).forEach(function(v){
      if(v.data&&!v.data[nt])v.data[nt]={export:0,import:0,departed:0};
    });
    sv();
    renderYard();
  }
  inp.value='';
}
function removeYardType(reportId,ti){
  var rpt=ST.yardReports.find(function(r){return r.id===reportId;});
  if(!rpt||!rpt.customTypes||ti<4)return;
  rpt.customTypes.splice(ti,1);
  sv();
  renderYard();
}

// Update yard summary totals without full re-render (fast, no lag)
function updateYardSummary(reportId){
  var rpt=ST.yardReports.find(function(r){return r.id===reportId;});
  if(!rpt)return;
  // Recalc totals
  var grandEx=0,grandIm=0,grandDep=0;
  var totalGP=0,totalReef=0,totalMty=0;
  (rpt.vessels||[]).forEach(function(v){
    var types=rpt.customTypes&&rpt.customTypes.length?rpt.customTypes:['GP/DRY','REEFER','EMPTY','OOG'];
    types.forEach(function(t){
      var d=v.data&&v.data[t]?v.data[t]:{};
      grandEx+=(d.export||0);grandIm+=(d.import||0);grandDep+=(d.departed||0);
    });
    var gpd=v.data&&v.data['GP/DRY']?v.data['GP/DRY']:{};
    var rfd=v.data&&v.data['REEFER']?v.data['REEFER']:{};
    var mty=v.data&&v.data['EMPTY']?v.data['EMPTY']:{};
    totalGP+=(gpd.export||0)+(gpd.import||0);
    totalReef+=(rfd.export||0)+(rfd.import||0);
    totalMty+=(mty.export||0)+(mty.import||0);
  });
  // Update summary elements if they exist in DOM
  var cap=document.getElementById('ycap_'+reportId);
  if(!cap)return;
  var sums=cap.querySelectorAll('[data-sum]');
  sums.forEach(function(el){
    var key=el.getAttribute('data-sum');
    if(key==='ex')el.textContent=grandEx;
    else if(key==='im')el.textContent=grandIm;
    else if(key==='dep')el.textContent=grandDep;
    else if(key==='gp')el.textContent=totalGP;
    else if(key==='reef')el.textContent=totalReef;
    else if(key==='mty')el.textContent=totalMty;
    else if(key==='yard')el.textContent=grandEx+grandIm;
  });
}

function addYardCol(reportId){

// ═══════════ EMERGENCY REPORT ═══════════
function _emgSv(){if(!ST.emergency)ST.emergency={};sv();}
function _emgInit(){
  if(!ST.emergency)ST.emergency={};
  var e=ST.emergency;
  if(!e.title)e.title='HOURLY REPORT';
  if(!e.rows)e.rows={};           // key: ci+'_'+type+'_'+slot  → number
  if(!e.splits)e.splits={};       // key: ci+'_'+type           → number
  if(!e.ob)e.ob={};               // key: ci+'_'+type           → number
  if(!e.target)e.target=0;
  if(e.numCranes===undefined)e.numCranes=2;
  if(!e.slots)e.slots=['0600-0700','0700-0800','0800-0900','0900-1000','1000-1100','1100-1200','1200-1300','1300-1400','1400-1500','1500-1600','1600-1700','1700-1800'];
  if(!e.craneNames)e.craneNames={};
  // Pre-fill vessel info from active session once
  if(!e._prefilled){
    var sess=getSess();
    if(sess){
      if(!e.vesselName)e.vesselName=sess.vesselName||'';
      if(!e.dockedOn)e.dockedOn=sess.dockedOn||'';
      if(!e.firstLift)e.firstLift=sess.firstLift||'';
      if(!e.lastLift)e.lastLift=sess.lastLift||'';
      // Copy splits from session craneBalances
      var nc=parseInt(e.numCranes)||2;
      for(var i=1;i<=nc;i++){
        var cb=sess.craneBalances&&sess.craneBalances[i]||{};
        if(e.splits[i+'_discharge']===undefined)e.splits[i+'_discharge']=cb.dischargeSplit||0;
        if(e.splits[i+'_load']===undefined)e.splits[i+'_load']=cb.loadSplit||0;
        if(e.ob[i+'_discharge']===undefined&&cb.dischargeOB!=null&&cb.dischargeOB!=='')e.ob[i+'_discharge']=parseFloat(cb.dischargeOB)||0;
        if(e.ob[i+'_load']===undefined&&cb.loadOB!=null&&cb.loadOB!=='')e.ob[i+'_load']=parseFloat(cb.loadOB)||0;
      }
      if(!e.target)e.target=sess.target||0;
      e._prefilled=true;
    }
  }
  return e;
}
function _emgCraneName(ci){
  var e=ST.emergency||{};
  return(e.craneNames&&e.craneNames[ci])||('MHC'+ci);
}
function _emgEffSplit(ci,type){
  var e=ST.emergency||{};
  var ob=e.ob&&e.ob[ci+'_'+type];
  if(ob!=null&&ob!==''&&!isNaN(ob))return parseFloat(ob);
  return parseFloat((e.splits&&e.splits[ci+'_'+type])||0);
}
function _emgDone(ci,type){
  var e=ST.emergency||{};
  var tot=0;
  (e.slots||[]).forEach(function(s,si){
    tot+=parseFloat((e.rows&&e.rows[ci+'_'+type+'_'+si])||0);
  });
  return tot;
}
function _emgUpdateLive(ci,type,si){
  var e=_emgInit();
  var nc=parseInt(e.numCranes)||2;
  // Update row total
  var rt=0;
  for(var i=1;i<=nc;i++)rt+=parseFloat(e.rows[i+'_'+type+'_'+si]||0);
  var rtEl=document.getElementById('emg_rt_'+type+'_'+si);
  if(rtEl)rtEl.textContent=rt||'';
  // Update crane done/remain
  var done=_emgDone(ci,type);
  var split=_emgEffSplit(ci,type);
  var rem=split-done;
  var dcEl=document.getElementById('emg_done_'+type+'_'+ci);
  if(dcEl)dcEl.textContent=done;
  var rcEl=document.getElementById('emg_rem_'+type+'_'+ci);
  if(rcEl){rcEl.textContent=rem;rcEl.style.color=rem<0?'var(--red)':'';}
  // Update column totals
  var dTot=0,rTot=0;
  for(var i=1;i<=nc;i++){
    var d=_emgDone(i,type);
    var s2=_emgEffSplit(i,type);
    dTot+=d;rTot+=s2-d;
  }
  var dtEl=document.getElementById('emg_done_'+type+'_tot');if(dtEl)dtEl.textContent=dTot;
  var rtEl2=document.getElementById('emg_rem_'+type+'_tot');if(rtEl2){rtEl2.textContent=rTot;rtEl2.style.color=rTot<0?'var(--red)':'';}
  // Update summary bar
  var totalDone=0;
  var nc2=parseInt(e.numCranes)||2;
  ['discharge','load'].forEach(function(tp){for(var i=1;i<=nc2;i++)totalDone+=_emgDone(i,tp);});
  var tgt=parseInt(e.target)||0;
  var mx=Math.max(totalDone,tgt,1);
  var mp=Math.max(totalDone/mx*100,totalDone>0?5:0);
  var tp2=Math.max(tgt/mx*100,tgt>0?5:0);
  var bf=document.getElementById('emg_bfill');var bsp=document.getElementById('emg_bspan');
  if(bf){bf.style.width=mp+'%';if(bsp)bsp.textContent=totalDone;}
}
function renderEmergency(){
  var e=_emgInit();
  var nc=parseInt(e.numCranes)||2;

    var cname=_emgCraneName(ci);

    rows+='<td class="crane-cell"><span contenteditable="true" style="outline:none;border-bottom:1px dashed #aaa;cursor:text;font-weight:800;display:inline-block;min-width:30px" oninput="if(!ST.emergency)ST.emergency={};if(!ST.emergency.craneNames)ST.emergency.craneNames={};ST.emergency.craneNames['+ci+']=this.textContent.trim();_emgSv()">'+cname+'</span></td>';
    // Splits editable
    rows+='<td><input type="number" value="'+sd+'" placeholder="-" class="ci" oninput="if(!ST.emergency)ST.emergency={};if(!ST.emergency.splits)ST.emergency.splits={};ST.emergency.splits[\''+ci+'_discharge\']=parseFloat(this.value)||0;_emgSv()"/></td>';
