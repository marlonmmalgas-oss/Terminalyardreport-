<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Terminal Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
:root{--navy:#1F3864;--navyL:#2a4a80;--yellow:#FFFF00;--lb:#BDD7EE;--red:#c0392b;--green:#1e8449;--gray:#f0f2f7;--border:#dde2ea;--bg:#ffffff;--txt:#1a1a2e;--card:#ffffff;}
body.dark{--gray:#181c24;--border:#2e3650;--bg:#1e2230;--txt:#e4e8f0;--card:#252a3a;--lb:#2e3650;}
body.dark #appShell{background:#181c24;}
body.dark .swrap{background:var(--gray);}
body.dark .card{background:var(--card);border-color:var(--border);}
body.dark .card-hd{background:#111828;}
body.dark input[type=number],body.dark input[type=text],body.dark input[type=email],body.dark input[type=password],body.dark select{background:var(--bg);color:var(--txt);border-color:var(--border);}
body.dark table{color:var(--txt);}
body.dark tr.e{background:#1e2230;}
body.dark tr.o{background:#252a3a;}
body.dark .twrap{background:var(--card);}
body.dark .ph{background:var(--navy);}
body.dark .asec{background:var(--card);border-color:var(--border);}
body.dark .atitle{color:#90a8d0;}
body.dark p,body.dark label,body.dark td,body.dark th.sub{color:var(--txt);}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--gray);min-height:100vh;-webkit-text-size-adjust:100%;}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}

/* ── LOGIN ── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1F3864,#2c5282);padding:20px;}
.lcard{background:white;border-radius:16px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.35);}
.llogo{display:flex;align-items:center;justify-content:center;width:76px;height:76px;background:var(--navy);border-radius:14px;font-weight:900;font-size:16px;color:white;overflow:hidden;margin:0 auto 16px;}
.llogo img{width:100%;height:100%;object-fit:contain;}
.lh{text-align:center;font-size:22px;font-weight:800;color:var(--navy);}
.ls{text-align:center;font-size:13px;color:#999;margin-bottom:26px;margin-top:3px;}
.fg{margin-bottom:15px;}
.fg label{display:block;font-size:10px;font-weight:800;color:#444;text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;}
.fi{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;outline:none;transition:border .2s;}
.fi:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(31,56,100,.08);}
.credit{margin-top:16px;text-align:center;font-size:12px;color:#aaa;line-height:1.6;}

/* ── BUTTONS ── */
.btn{display:block;width:100%;padding:13px;background:var(--navy);color:white;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.3px;}
.btn:hover{background:var(--navyL);}
.btn-red{background:var(--red)!important;}
.btn-red:hover{background:#a93226!important;}
.btn-out{background:white!important;color:var(--navy)!important;border:2px solid var(--navy)!important;}
.btn-sm{padding:6px 13px!important;font-size:11px!important;width:auto!important;border-radius:7px!important;display:inline-block!important;}
.err{color:var(--red);font-size:12px;text-align:center;margin-top:8px;}

/* ── SHELL ── */
#appShell{display:none;flex-direction:column;height:100vh;max-width:520px;margin:0 auto;background:white;overflow:hidden;}
.abanner{background:var(--yellow);color:#000;font-size:12px;font-weight:800;text-align:center;padding:7px;cursor:pointer;flex-shrink:0;}

/* ── NAV ── */
.bnav{display:flex;background:var(--navy);border-top:2px solid #162852;flex-shrink:0;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 1px 5px;cursor:pointer;border:none;background:none;color:rgba(255,255,255,.5);font-size:8px;gap:2px;min-width:0;}
.ni.active{color:var(--yellow);}
.ni .ico{font-size:16px;}
.ni span{font-weight:700;}

/* ── SCREENS ── */
.swrap{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--gray);}
.sc{display:none;}
.sc.active{display:block;}

/* ── PAGE HEADER ── */
.ph{background:var(--navy);padding:14px 16px;position:sticky;top:0;z-index:20;}
.ph h2{color:white;font-size:16px;font-weight:800;}
.ph p{color:rgba(255,255,255,.6);font-size:11px;margin-top:2px;}
.ph-row{display:flex;align-items:center;justify-content:space-between;}

/* ── REPORT HEADER ── */
.rh{padding:12px 14px;}
.rh1{display:flex;align-items:center;gap:12px;}
.rh-logo{width:100px;height:60px;border-radius:10px;background:white;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:var(--navy);overflow:hidden;flex-shrink:0;border:2px solid rgba(255,255,255,.25);}
.rh-logo img{width:100%;height:100%;object-fit:contain;}
.rh-txt{flex:1;}
.rh-txt h2{color:white;font-size:16px;font-weight:900;letter-spacing:.4px;}
.rh-txt p{color:rgba(255,255,255,.65);font-size:12px;}
/* Share button — hidden during capture */
.rh-share{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.3);color:white;padding:8px 14px;border-radius:9px;font-size:13px;font-weight:800;cursor:pointer;}
.rh-share.hide-for-capture{display:none!important;}
/* Yard table wrapper - scrolls on mobile */
.yard-twrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.yard-twrap table{width:100%;min-width:520px;border-collapse:collapse;}
.yard-twrap th,.yard-twrap td{white-space:nowrap;}
.yard-twrap td:first-child{min-width:150px;text-align:left;}
/* Yard cell inputs */
.yard-input{width:44px;text-align:center;border:1px solid #ddd;border-radius:4px;padding:3px 2px;font-size:11px;background:#f9f9f9;box-sizing:border-box;}
.yard-input:focus{outline:none;border-color:var(--navy);background:#fff;}
.rh2{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap;}
.rh-vessel{color:#ff5252;font-weight:900;font-size:15px;}
.rh-date{color:#ff8080;font-size:12px;}
.rh-slot{background:var(--yellow);color:#000;font-weight:900;font-size:13px;padding:4px 12px;border-radius:7px;}

/* ── CARDS ── */
.card{background:white;border-radius:12px;margin:8px 10px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden;}
.card-hd{background:var(--navy);color:white;font-weight:800;font-size:11px;padding:9px 13px;text-transform:uppercase;letter-spacing:.6px;}
.twrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}

/* ── REPORT TABLE (grouped headers) ── */
.rt{width:100%;border-collapse:collapse;font-size:11px;min-width:360px;}
.rt th.grp{background:var(--navy);color:white;text-align:center;padding:7px 4px;font-size:10.5px;font-weight:900;border:1px solid rgba(255,255,255,.12);}
.rt th.sub{background:#243f6e;color:rgba(255,255,255,.88);padding:5px 4px;font-size:9.5px;font-weight:700;border:1px solid rgba(255,255,255,.08);}
.rt th.sub-hl{background:#1a4a7a;}
/* Crane column — fixed width so it never overlaps */
.rt th.grp.crane-col{min-width:48px;width:48px;}
.rt td.crane-cell{font-weight:800;color:var(--navy);min-width:48px;width:48px;text-align:center;white-space:nowrap;}
.rt td{padding:6px 4px;text-align:center;border-bottom:1px solid #edf0f5;font-size:11px;}
.rt tr.e td{background:var(--lb);}
.rt tr.o td{background:white;}
.rt tr.ry td{background:var(--yellow)!important;font-weight:800;color:#000;}
.rt td.lbl{text-align:left;padding-left:9px;}
.rt td.hl{background:#fffde7!important;font-weight:800;}
.rt td.neg{color:var(--red);font-weight:700;}
.rt td.bold{font-weight:800;}

/* ── RESULTS TABLE ── */
.gt{width:100%;border-collapse:collapse;font-size:11px;min-width:300px;}
.gt th{background:var(--navy);color:white;padding:8px 5px;text-align:center;font-size:10px;font-weight:800;}
.gt td{padding:6px 5px;text-align:center;border-bottom:1px solid #edf0f5;}
.gt tr.e td{background:var(--lb);}
.gt tr.o td{background:white;}
.gt tr.ry td{background:var(--yellow)!important;font-weight:800;}
.gt td.lbl{text-align:left;padding-left:9px;font-size:10px;}
.ci{width:46px;padding:3px 2px;border:1px solid #bbb;border-radius:5px;font-size:11px;text-align:center;background:white;}
.ci:focus{border-color:var(--navy);outline:none;}

/* ── INPUT FORM ── */
.sec{background:white;border-radius:12px;margin:8px 10px;padding:15px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.st{font-size:11px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.6px;margin-bottom:13px;padding-bottom:7px;border-bottom:2px solid var(--lb);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.f{display:flex;flex-direction:column;gap:4px;}
.f label{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.4px;}
.f input,.f select{padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;width:100%;}
.f input:focus,.f select:focus{border-color:var(--navy);}
.crblk{background:#f6f8fc;border:1.5px solid var(--lb);border-radius:10px;padding:12px;margin-bottom:10px;}
.crtag{background:var(--yellow);color:#000;font-weight:800;font-size:11px;display:inline-block;padding:2px 10px;border-radius:5px;margin-bottom:10px;}
.suc{background:#eafaf1;color:#1e8449;border-radius:9px;padding:11px;text-align:center;font-size:13px;font-weight:700;margin-bottom:8px;}

/* ── DELAYS ── */
.dblk{background:white;border-radius:12px;margin:8px 10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.dchd{background:var(--yellow);color:#000;font-weight:900;font-size:13px;padding:10px 13px;display:flex;align-items:center;justify-content:space-between;}
/* Add row button — hidden during capture */
.add-row-btn{background:var(--navy);color:white;border:none;padding:6px 14px;font-size:11px;font-weight:800;border-radius:8px;cursor:pointer;}
.add-row-btn.hide-for-capture{display:none!important;}
/* Delay table — larger cells so text is readable */
.dt{width:100%;border-collapse:collapse;}
.dt th{background:var(--navy);color:white;padding:8px 6px;text-align:center;font-size:11px;font-weight:800;white-space:nowrap;}
.dt td{padding:6px 5px;border-bottom:1px solid #edf0f5;vertical-align:top;}
.dt tr:nth-child(even) td{background:#f5f8fc;}
.dt input[type=time]{border:1.5px solid #ccc;border-radius:6px;padding:5px 6px;font-size:12px;width:82px;}
/* Type and description — wrap text, show full content */
.dt input[type=text]{border:1.5px solid #ccc;border-radius:6px;padding:5px 7px;font-size:12px;width:100%;min-width:100px;white-space:normal;word-break:break-word;}
.dt .dur{font-weight:800;color:var(--navy);text-align:center;font-size:12px;white-space:nowrap;padding-top:7px;}
.dt td.type-col{min-width:120px;}
.dt td.desc-col{min-width:150px;}

/* ── CHART ── */
.chcard{background:white;border-radius:12px;margin:8px 10px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.cht{font-weight:900;font-size:13px;color:var(--navy);text-align:center;margin-bottom:16px;text-transform:uppercase;letter-spacing:.5px;}
.brow{display:flex;align-items:center;margin-bottom:12px;gap:9px;}
.blbl{font-size:11px;font-weight:700;color:#333;width:68px;text-align:right;flex-shrink:0;line-height:1.3;}
.btrack{flex:1;background:#e5e9f0;border-radius:6px;height:32px;overflow:hidden;}
.bfill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;min-width:32px;}
.bn{background:var(--navy);color:white;}
.by{background:var(--yellow);color:#000;}

/* ── HISTORY ── */
.hi{background:white;border-radius:12px;margin:8px 10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid var(--navy);}
.hi-vessel{font-weight:900;color:var(--navy);font-size:15px;}
.hi-meta{font-size:11px;color:#777;margin-top:4px;line-height:1.7;}
.hi-moves{font-size:12px;font-weight:700;color:var(--green);margin-top:5px;}
.fbar{background:white;padding:10px 12px;border-bottom:1px solid #eee;position:sticky;top:0;z-index:5;}
.fbar input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;outline:none;}

/* ── ADMIN ── */
.asec{background:white;border-radius:12px;padding:16px;margin-bottom:11px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.atitle{font-size:13px;font-weight:800;color:var(--navy);margin-bottom:13px;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sbox{background:var(--navy);border-radius:10px;padding:14px;text-align:center;}
.snum{font-size:28px;font-weight:900;color:var(--yellow);}
.slbl{font-size:11px;color:rgba(255,255,255,.75);margin-top:2px;}
.uarea{border:2px dashed var(--navy);border-radius:10px;padding:20px;text-align:center;cursor:pointer;display:block;margin-bottom:10px;}
.urow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #edf0f5;}
.urow:last-child{border:none;}
.badge{padding:2px 9px;border-radius:5px;font-size:10px;font-weight:800;}
.ba{background:var(--navy);color:white;}
.bo{background:var(--lb);color:var(--navy);}
.bv{background:#eee;color:#666;}
.bs{background:#e8f5e9;color:#1e8449;}

/* ── AI ANALYSIS ── */
.ai-card{background:linear-gradient(135deg,#1F3864,#2a4a80);border-radius:12px;padding:16px;margin-bottom:11px;color:white;}
.ai-title{font-size:13px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.ai-result{background:rgba(255,255,255,.12);border-radius:9px;padding:13px;font-size:12px;line-height:1.7;margin-top:10px;white-space:pre-wrap;}
.ai-insight{background:rgba(255,255,0,.15);border-left:3px solid var(--yellow);padding:10px 12px;border-radius:6px;margin-bottom:8px;font-size:12px;line-height:1.6;}
.ai-btn{background:var(--yellow);color:#000;border:none;border-radius:8px;padding:10px 16px;font-size:12px;font-weight:800;cursor:pointer;width:100%;margin-top:8px;}
.ai-btn:hover{background:#e6e600;}
.ai-loading{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.7);font-size:12px;margin-top:10px;}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:var(--yellow);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOGGLE ── */
.tog{display:flex;align-items:center;gap:8px;}
.tgl{position:relative;width:46px;height:26px;flex-shrink:0;cursor:pointer;}
.tgl input{opacity:0;width:0;height:0;}
.tsl{position:absolute;inset:0;background:#ccc;border-radius:26px;transition:.3s;}
.tsl::before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:white;border-radius:50%;transition:.3s;}
.tgl input:checked+.tsl{background:var(--yellow);}
.tgl input:checked+.tsl::before{transform:translateX(20px);}

/* ── MISC ── */
.nosess{text-align:center;padding:50px 20px;color:#bbb;}
.nosess .ico{font-size:46px;margin-bottom:10px;}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.pblue{background:var(--lb);color:var(--navy);}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
@media(max-width:380px){.rt td,.rt th{font-size:9.5px;padding:4px 2px;}.dt input[type=time]{width:70px;}}

/* ── YARD STATUS ── */
.yd-upload{border:2px dashed var(--navy);border-radius:12px;padding:24px;text-align:center;cursor:pointer;background:white;margin:10px;transition:background .2s;}
.yd-upload:hover{background:#f0f4ff;}
.yd-upload p{color:#888;font-size:13px;margin-top:8px;}
.yd-report{background:white;border-radius:12px;margin:8px 10px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden;}
.yd-report-hd{background:var(--navy);color:white;padding:10px 13px;display:flex;align-items:center;justify-content:space-between;}
.yd-report-title{font-size:13px;font-weight:800;}
.yd-report-meta{font-size:10px;opacity:.7;margin-top:2px;}
.yd-tabs{display:flex;border-bottom:2px solid var(--lb);background:#f8f9fc;overflow-x:auto;}
.yd-tab{padding:8px 14px;font-size:11px;font-weight:700;color:#888;cursor:pointer;white-space:nowrap;border:none;background:none;}
.yd-tab.active{color:var(--navy);border-bottom:2.5px solid var(--navy);margin-bottom:-2px;}
.yd-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);}
.yd-stat{background:white;padding:10px 8px;text-align:center;}
.yd-stat-num{font-size:18px;font-weight:900;color:var(--navy);}
.yd-stat-lbl{font-size:9px;color:#888;margin-top:2px;text-transform:uppercase;letter-spacing:.4px;}
.yd-vessel-tag{display:inline-block;background:var(--lb);color:var(--navy);font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin:1px;}
.iso-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9.5px;font-weight:800;margin:1px;}
.iso-reefer{background:#ffebee;color:#c0392b;}
.iso-gp{background:#e8f5e9;color:#1e8449;}
.iso-other{background:#f3e5f5;color:#6a1b9a;}
.fcl-badge{background:#e3f2fd;color:#1565c0;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;}
.empty-badge{background:#fff8e1;color:#f57f17;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;}
.yd-table{width:100%;border-collapse:collapse;font-size:10.5px;}
.yd-table th{background:var(--navy);color:white;padding:7px 6px;text-align:left;font-size:10px;font-weight:800;}
.yd-table td{padding:6px;border-bottom:1px solid #edf0f5;vertical-align:middle;}
.yd-table tr:nth-child(even) td{background:#f8f9fc;}
.yd-search{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;outline:none;margin:10px 0 0;}

/* ── ETC CARD ── */
.etc-card{background:linear-gradient(135deg,#0f2744,#1F3864);border-radius:12px;padding:16px;margin-bottom:11px;color:white;}
.etc-title{font-size:13px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.etc-time{font-size:32px;font-weight:900;color:var(--yellow);margin:8px 0 4px;letter-spacing:.5px;}
.etc-meta{font-size:11px;opacity:.75;line-height:1.7;}
.etc-summary{background:rgba(255,255,255,.1);border-radius:8px;padding:10px 12px;margin-top:10px;font-size:11px;line-height:1.8;}

/* ── GENERATORS ── */
.gen-card{background:white;border-radius:12px;margin:8px 10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.gen-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px;background:#f6f8fc;border-radius:9px;border:1.5px solid var(--lb);}
.gen-name{font-size:13px;font-weight:800;color:var(--navy);min-width:60px;}
.gen-bar-wrap{flex:1;background:#e5e9f0;border-radius:6px;height:22px;overflow:hidden;}
.gen-bar{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;transition:width .4s;}
.gen-pct{font-size:10px;font-weight:900;}
.gen-cap{font-size:10px;color:#888;white-space:nowrap;}
.gen-low-warn{background:#ffebee;border-left:4px solid var(--red);border-radius:7px;padding:9px 12px;margin:8px 10px;font-size:12px;font-weight:700;color:var(--red);}
.shift-block{margin-bottom:4px;}
.shift-header{background:#1F3864;color:white;font-weight:900;font-size:12px;padding:9px 13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-radius:6px;}
.shift-header:hover{background:#2a4a80;}
.shift-header .sh-icon{font-size:13px;transition:transform .2s;}
.shift-body{overflow:hidden;transition:max-height .25s ease;}

/* ── EXPORT MODAL ── */
.xmod-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:900;display:flex;align-items:flex-end;justify-content:center;}
.xmod-box{background:white;width:100%;max-width:520px;max-height:88vh;border-radius:18px 18px 0 0;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 -8px 32px rgba(0,0,0,.2);}
.xmod-hd{background:var(--navy);padding:14px 16px;flex-shrink:0;}
.xmod-hd h3{color:white;font-size:15px;font-weight:900;}
.xmod-hd p{color:rgba(255,255,255,.65);font-size:11px;margin-top:2px;}
.xmod-body{flex:1;overflow-y:auto;padding:12px 14px;}
.xmod-vessel{margin-bottom:14px;}
.xmod-vhd{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f0f4ff;border-radius:8px;margin-bottom:6px;cursor:pointer;}
.xmod-vhd input[type=checkbox]{width:16px;height:16px;accent-color:var(--navy);flex-shrink:0;}
.xmod-vname{font-size:13px;font-weight:800;color:var(--navy);}
.xmod-vmeta{font-size:10px;color:#888;margin-left:auto;}
.xmod-shifts{padding-left:10px;}
.xmod-shift{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;margin-bottom:4px;cursor:pointer;}
.xmod-shift:nth-child(odd){background:#f8f9fc;}
.xmod-shift input[type=checkbox]{width:15px;height:15px;accent-color:var(--navy);flex-shrink:0;}
.xmod-slbl{font-size:12px;font-weight:700;color:#333;flex:1;}
.xmod-smeta{font-size:10px;color:#999;}
.xmod-ft{padding:12px 14px;border-top:1px solid #eee;display:flex;gap:8px;flex-shrink:0;}
.xmod-cancel{flex:1;padding:11px;background:white;border:2px solid var(--border);border-radius:9px;font-size:13px;font-weight:800;cursor:pointer;color:#555;}
.xmod-go{flex:2;padding:11px;background:#1e6e3a;border:none;border-radius:9px;font-size:13px;font-weight:800;cursor:pointer;color:white;}
.xmod-go:disabled{background:#aaa;cursor:not-allowed;}

</style>

// sv() - saves to Firebase (source of truth) AND localStorage (cache)
var _myLastSave=0;
var _saveProtectUntil=0; // blocks session overwrite from Firebase for N ms after save
var _myLastYardSave=0;    // timestamp of last yard save — used to skip own yard echo
var _pendingDeleteSave=0; // set to future timestamp during delSess
var _saveGen=0;           // monotonic counter — written into payload as _gen
var _lastSaveGen=-1;      // gen of last sv() call — compared to echo._gen
var _recentSaveGens={}; // {gen: timestamp} — evict by age not count, so hourly keystrokes don't push out session saves
var _hadRemoteUpdate=false; // true once we've received a non-own Firebase update
function sv(){
  // Save EVERYTHING to localStorage (images stay here permanently)
  try{localStorage.setItem(SK,JSON.stringify(ST));}catch(e){}
  if(dbRef){
    // Push to Firebase - strip base64 images (too large, kept in localStorage)
    var payload=JSON.parse(JSON.stringify(ST));
    // Use future timestamp during delete so listener won't restore deleted data
    var ts=(_pendingDeleteSave&&_pendingDeleteSave>Date.now())?_pendingDeleteSave:Date.now();
    _pendingDeleteSave=0;
    payload._ts=ts;
    _myLastSave=ts;
    // Embed generation counter — lets listener detect own echo without timestamp ambiguity
    _saveGen=(_saveGen+1)%999999;
    _lastSaveGen=_saveGen;
    // Store gen with timestamp — evict entries older than 30s so hourly keystrokes
    // never push out a session-save gen before its echo arrives
    var _now30=Date.now();
    _recentSaveGens[_saveGen]=_now30;
    // Clean up gens older than 30 seconds
    Object.keys(_recentSaveGens).forEach(function(g){if(_now30-_recentSaveGens[g]>30000)delete _recentSaveGens[g];});
    payload._gen=_saveGen;
    // Strip base64 images - each device loads its own from localStorage
    if(payload.settings){
      ['logo','bg','bgHourly','bgFour','bgDelay','bgYard'].forEach(function(k){
        if(payload.settings[k]&&payload.settings[k].startsWith&&payload.settings[k].startsWith('data:')){
          delete payload.settings[k];
        }
      });
    }
    // yardReports go to a separate path to avoid large main node
    var yardBackup=(payload.yardReports||[]).map(function(r){
      // Clean report before saving to Firebase
      var clean=JSON.parse(JSON.stringify(r));
      // Remove any base64 that might be in report
      if(clean.fuel&&typeof clean.fuel==='string'&&clean.fuel.startsWith('data:'))clean.fuel=null;
      return clean;
    });
    payload.yardReports=[];
    dbRef.set(payload).catch(function(e){console.log('sync err:',e.message);});
    if(window._yardRef){
      _myLastYardSave=Date.now();
      // Sanitize keys: Firebase forbids '/' in keys — replace with __S__
      var yardForFb=JSON.parse(JSON.stringify(yardBackup));
      yardForFb.forEach(function(r){
        if(r.vessels)r.vessels.forEach(function(v){
          if(v.data){
            Object.keys(v.data).forEach(function(k){
              if(k.indexOf('/')>=0){var sk=k.replace(/\//g,'__S__');v.data[sk]=v.data[k];delete v.data[k];}
            });
          }
        });
      });
      window._yardRef.set(yardForFb).catch(function(e){console.log('yard sync err:',e.message);});
    }
  }
}

// initSync() - initializes Firebase and sets up real-time listener
// Called automatically on app load - no user action required
function initSync(){
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    var db=firebase.database();
    dbRef=db.ref(DB_PATH);
    window._yardRef=db.ref('agl-terminal/yard');
    dbRef.on('value',function(snap){
      var remote=snap.val();
      // Step 1: always preserve local users before doing anything
      var localUsers=Array.isArray(ST.users)?ST.users.slice():JSON.parse(JSON.stringify(DEF.users));
      if(!remote){
        // Firebase empty — push local data up, but ensure users exist first
        if(!ST.users||ST.users.length===0){
          ST.users=JSON.parse(JSON.stringify(DEF.users));
        }
        dbRef.set(JSON.parse(JSON.stringify(ST)));
        return;
      }
      // Step 2: apply remote data - NEVER overwrite users or local images
      // Images are device-local (base64 in localStorage), not in Firebase
      var localImages={};
      if(ST.settings){
        ['logo','bg','bgHourly','bgFour','bgDelay','bgYard'].forEach(function(k){
          if(ST.settings[k]&&ST.settings[k].startsWith&&ST.settings[k].startsWith('data:')){
            localImages[k]=ST.settings[k];
          }
        });
      }
      // Only apply remote data if it came from another device
      // Use generation counter (_gen) for reliable own-echo detection — timestamp window is unreliable
      var isOwnSave2=(typeof remote._gen!=='undefined')?(remote._gen in _recentSaveGens):((remote._ts||0)>=(_myLastSave-500)&&(remote._ts||0)<=(_myLastSave+500));
      // Track that we've received a real remote update (not our own echo)
      if(!isOwnSave2&&remote)_hadRemoteUpdate=true;
      // Preserve local activityLog before remote overwrite — merge after
      var _localLog=Array.isArray(ST.activityLog)?ST.activityLog.slice():[];
      Object.keys(remote).forEach(function(k){
        if(k!=='_ts'&&k!=='_gen'&&k!=='users'&&k!=='activityLog'){
          if(k==='yardReports'&&(!remote[k]||!remote[k].length))return;
          // Skip sessions/hourly/delays if this is our own save — prevents delete reverting
          // Also skip if we're within the save-protection window (handles mobile Firebase timing)
          if((isOwnSave2||Date.now()<_saveProtectUntil)&&(k==='sessions'||k==='activeId'||k==='activeId2'||k==='vesselSlot'||k==='hourly'||k==='delays'||k==='delayRowIds'))return;
          // REMOVED: the block that prevented hourly/delay sync when active session exists
          // That caused cross-device hourly data to NOT appear on other devices.
          // Deep clone to prevent Firebase object mutation bleeding into ST
          try{ST[k]=JSON.parse(JSON.stringify(remote[k]));}catch(e){ST[k]=remote[k];}
        }
      });
      // Firebase converts JS arrays to keyed objects — restore them back to arrays
      // e.g. sessions: {"0":{...},"1":{...}} must become [{...},{...}]
      ['sessions','yardReports','generators','vesselAbbrevs'].forEach(function(k){
        if(ST[k]&&!Array.isArray(ST[k])&&typeof ST[k]==='object'){
          ST[k]=Object.values(ST[k]);
        }
        if(!Array.isArray(ST[k]))ST[k]=[];
      });
      // Restore nested arrays inside yardReports that Firebase also converts to objects
      if(Array.isArray(ST.yardReports)){
        ST.yardReports.forEach(function(report){
          if(!report)return;
          // vessels array
          if(report.vessels&&!Array.isArray(report.vessels)&&typeof report.vessels==='object'){
            report.vessels=Object.values(report.vessels);
          }
          if(!Array.isArray(report.vessels))report.vessels=[];
          // data object inside each vessel (Firebase converts {'GP/DRY':{...}} fine but
          // if the vessel itself was array-converted, restore each vessel's data)
          report.vessels.forEach(function(v){
            if(!v)return;
            if(!v.data||typeof v.data!=='object')v.data={};
            // customTypes array
          });
          // customTypes
          if(report.customTypes&&!Array.isArray(report.customTypes)&&typeof report.customTypes==='object'){
            report.customTypes=Object.values(report.customTypes);
          }
          // customCols
          if(report.customCols&&!Array.isArray(report.customCols)&&typeof report.customCols==='object'){
            report.customCols=Object.values(report.customCols);
          }
        });
      }
      // Merge remote activityLog with local (so cross-device logs are combined)
      var _remoteLog=Array.isArray(remote.activityLog)?remote.activityLog:(remote.activityLog&&typeof remote.activityLog==='object'?Object.values(remote.activityLog):[]);
      var _mergedLog=_localLog.concat(_remoteLog.filter(function(re){return!_localLog.find(function(le){return le.ts===re.ts&&le.user===re.user&&le.action===re.action;});}));
      _mergedLog.sort(function(a,b){return(b.ts||'')>(a.ts||'')?1:-1;});
      ST.activityLog=_mergedLog.slice(0,_ACT_MAX);
      // Null-guard scalar and object fields that Firebase may return as null
      if(!ST.hourly||typeof ST.hourly!=='object'||Array.isArray(ST.hourly))ST.hourly={};
      if(!ST.delays||typeof ST.delays!=='object'||Array.isArray(ST.delays))ST.delays={};
      if(!ST.delayRowIds||typeof ST.delayRowIds!=='object'||Array.isArray(ST.delayRowIds))ST.delayRowIds={};
      if(!ST.settings||typeof ST.settings!=='object')ST.settings=Object.assign({},DEF.settings);
      if(!ST.timing||typeof ST.timing!=='object')ST.timing=Object.assign({},DEF.timing);
      if(!ST.craneNames||typeof ST.craneNames!=='object')ST.craneNames=Object.assign({},DEF.craneNames);
      // Restore local images after remote data applied
      if(Object.keys(localImages).length){
        if(!ST.settings)ST.settings={};
        Object.keys(localImages).forEach(function(k){ST.settings[k]=localImages[k];});
      }
      // Apply logos from synced settings
      if(ST.settings&&ST.settings.logo){
        updateLogos();
      }
      // Step 3: restore users — merge local into ST.users (keep all accounts)
      if(!Array.isArray(ST.users)) ST.users=[];
      localUsers.forEach(function(u){
        if(!ST.users.find(function(x){
          return x.email&&x.email.toLowerCase()===u.email.toLowerCase();
        })) ST.users.push(u);
      });

// allSlots: ALL moves across the vessel for the active session
// Returns array of {slot, disc, load} aggregated across all cranes
function getAllSlots(sess){
  if(!sess)return[];
  var nc=sess.numCranes;
  var isActive=sess.id===ST.activeId||sess.id===ST.activeId2;
  // For completed (non-active) sessions: aggregate from stored shift data only
  // This prevents a new vessel's live ST.hourly from contaminating old session totals
  if(!isActive){
    // Merge all stored shift hourly data into one flat object
    var merged={};
    if(sess.shifts&&sess.shifts.length){
      sess.shifts.forEach(function(sh){
        var shData=sh.hourly||{};
        Object.keys(shData).forEach(function(k){merged[k]=(merged[k]||0)+(shData[k]||0);});
      });
    }
    // Fallback to _results.hourly if no shifts stored
    if(!Object.keys(merged).length&&sess._results&&sess._results.hourly){
      Object.assign(merged,sess._results.hourly);
    }
    return ALL.map(function(s){
      var disc=0,load=0;
      for(var i=1;i<=nc;i++){
        disc+=merged[s+'_'+i+'_discharge']||0;
        load+=merged[s+'_'+i+'_load']||0;
      }
      return{slot:s,disc:disc,load:load};
    });
  }
  // Active session: merge ALL stored shifts + current live ST.hourly
  // This ensures done/remain never reset mid-vessel even after 3+ days
  var liveMerged={};
  // Compute current shift key so we skip its snapshot (same logic as getCraneTotal)
  var _as_now=new Date(),_as_h=_as_now.getHours(),_as_m=_as_now.getMinutes();
  var _as_grace=(ST.timing&&ST.timing.shiftRolloverGrace!=null?ST.timing.shiftRolloverGrace:15);
  var _as_totalMins=_as_h*60+_as_m;
  var _as_isDay=_as_totalMins>=(6*60+_as_grace)&&_as_totalMins<(18*60+_as_grace);
  var _as_csd;
  if(_as_isDay){_as_csd=_as_now.toLocaleDateString('en-CA');}
  else if(_as_totalMins<(6*60+_as_grace)){var _as_y=new Date(_as_now);_as_y.setDate(_as_y.getDate()-1);_as_csd=_as_y.toLocaleDateString('en-CA');}
  else{_as_csd=_as_now.toLocaleDateString('en-CA');}
  var _as_curKey=(_as_isDay?'DAY':'NIGHT')+'_'+_as_csd;

  // Skip the current shift's snapshot — live ST.hourly is always the authority for it
  var _snapshotedSlotKeys={};
  if(sess.shifts&&sess.shifts.length){
    sess.shifts.forEach(function(sh){
      if(sh.key===_as_curKey)return; // current shift: live ST.hourly wins
      var shData=sh.hourly||{};
      Object.keys(shData).forEach(function(k){
        liveMerged[k]=(liveMerged[k]||0)+(shData[k]||0);
        _snapshotedSlotKeys[k]=true;
      });
    });
  }
  // Step 2: add current live ST.hourly (current shift not yet snapshotted)
  // SKIP any key already covered by sess.shifts[] to prevent double-counting
  // Strip session prefix: '{sessId}_{slot}_{ci}_{type}' -> '{slot}_{ci}_{type}'
  var _pfx=sess.id+'_';
  Object.keys(ST.hourly).forEach(function(k){
    if(k.indexOf(_pfx)===0){
      var sk=k.slice(_pfx.length);
      if(!_snapshotedSlotKeys[sk]){
        liveMerged[sk]=(liveMerged[sk]||0)+(ST.hourly[k]||0);
      }
    }
  });
  return ALL.map(function(s){
    var disc=0,load=0;
    for(var i=1;i<=nc;i++){
      disc+=liveMerged[s+'_'+i+'_discharge']||0;
      load+=liveMerged[s+'_'+i+'_load']||0;
    }
    return{slot:s,disc:disc,load:load};
  });
}


// Per-crane all-time total: merges stored shifts[] + live ST.hourly
// This is the correct source for "Total Done" and "Remaining" per crane
function getCraneTotal(sess, craneIdx, type){
  if(!sess)return 0;
  var total=0;
  var pfx=sess.id+'_';

  // Compute the current shift key so we never let a stale partial snapshot
  // of the CURRENT shift block the live ST.hourly values for those same slots.
  // Only PAST shift snapshots should claim _snapKeys.
  var _now=new Date(),_nh=_now.getHours(),_nm=_now.getMinutes();
  var _grace=(ST.timing&&ST.timing.shiftRolloverGrace!=null?ST.timing.shiftRolloverGrace:15);
  var _totalMins=_nh*60+_nm;
  var _isDayNow=_totalMins>=(6*60+_grace)&&_totalMins<(18*60+_grace);
  var _csd;
  if(_isDayNow){_csd=_now.toLocaleDateString('en-CA');}
  else if(_totalMins<(6*60+_grace)){var _y=new Date(_now);_y.setDate(_y.getDate()-1);_csd=_y.toLocaleDateString('en-CA');}
  else{_csd=_now.toLocaleDateString('en-CA');}
  var _curShiftKey=(_isDayNow?'DAY':'NIGHT')+'_'+_csd;

  // Step 1: sum from PAST shift snapshots only (skip current shift snapshot).
  // Build _snapKeys only from past shifts so step 2 live values are never blocked.
  var _snapKeys={};
  if(sess.shifts&&sess.shifts.length){
    sess.shifts.forEach(function(sh){
      // Skip the current shift's snapshot — live ST.hourly is the authority for it
      if(sh.key===_curShiftKey)return;
      var shData=sh.hourly||{};
      Object.keys(shData).forEach(function(k){
        _snapKeys[k]=true;
        var parts=k.split('_');
        if(parts.length>=3){
          var ci=parseInt(parts[parts.length-2]);
          var t=parts[parts.length-1];
          if(ci===craneIdx&&t===type)total+=shData[k]||0;
        }
      });
    });
  }
  // Step 2: add live ST.hourly — for current shift this is always the authority.
  // For past shifts, _snapKeys prevents double-counting.
  Object.keys(ST.hourly).forEach(function(k){
    if(k.indexOf(pfx)===0){
      var sk=k.slice(pfx.length);
      if(_snapKeys[sk])return;
      var parts=sk.split('_');
      if(parts.length>=3){
        var ci=parseInt(parts[parts.length-2]);
        var t=parts[parts.length-1];
        if(ci===craneIdx&&t===type)total+=ST.hourly[k]||0;
      }
    }
  });
  return total;
}

// shiftSlots: FILTERED to current 12-hour window (06-18 day / 18-06 night)
// Auto-resets at shift boundary — NO manual reset
function getShiftSlots(sess){
  if(!sess)return[];
  // Fall back to sess.id (Date.now() number) or savedAt if created not set
  var startMs=sess.created||sess.id||(sess.savedAt?new Date(sess.savedAt).getTime():null);
  if(!startMs)return[];
  var start=new Date(startMs);
  var now=new Date();
  // Snap to standard 06:00/18:00 shift boundaries
  var startHour=start.getHours();
  var isDayShiftAtStart=startHour>=6&&startHour<18;
  // Use exact 06:00/18:00 boundaries — no grace period here.
  // Grace only affects which SLOT is displayed (currSlot), not which SHIFT we're in.
  var nowHour=now.getHours();
  var nowMins=now.getHours()*60+now.getMinutes();
  var isDayShiftNow=nowMins>=6*60&&nowMins<18*60;
  // Shift window is always 06-18 (day) or 18-06 (night) — snap to these boundaries
  var shiftStart=new Date(now);
  shiftStart.setMinutes(0,0,0);
  if(isDayShiftNow){
    shiftStart.setHours(6,0,0,0);
  } else {
    // Night shift: started at 18:00 today, or 18:00 yesterday if after midnight
    if(nowHour<6){
      shiftStart.setDate(shiftStart.getDate()-1);
    }
    shiftStart.setHours(18,0,0,0);
  }
  var shiftEnd=new Date(shiftStart.getTime()+(12*60*60*1000));
  var nc=sess.numCranes;
  var result=[];
  ALL.forEach(function(s){
    var h=parseInt(s.substring(0,2));
    var slotTime=new Date(shiftStart);
    slotTime.setHours(h,0,0,0);
    if(slotTime<shiftStart)slotTime.setDate(slotTime.getDate()+1);
    if(slotTime>=shiftStart&&slotTime<shiftEnd){
      var disc=0,load=0;
      for(var i=1;i<=nc;i++){
        disc+=ST.hourly[hk(sess.id,s,i,'discharge')]||0;
        load+=ST.hourly[hk(sess.id,s,i,'load')]||0;
      }
      result.push({slot:s,disc:disc,load:load});
    }
  });
  return result;
}

// periodSlots: FILTERED to a specific set of slot-keys (hourly or 4hr window)
function getPeriodSlots(sess,slotKeys){
  if(!sess||!slotKeys||!slotKeys.length)return[];
  const nc=sess.numCranes;
  return slotKeys.map(function(s){
    let disc=0,load=0;
    for(let i=1;i<=nc;i++){
      disc+=ST.hourly[hk(sess.id,s,i,'discharge')]||0;
      load+=ST.hourly[hk(sess.id,s,i,'load')]||0;
    }

  });
}

// ─── SHIFT GROUPING (Step 3+4) ───
// Returns "DAY" or "NIGHT" for a given Date/timestamp
function getShiftType(date){
  var d=new Date(date);
  var h=d.getHours(),m=d.getMinutes();
  var grace=(ST.timing&&ST.timing.shiftRolloverGrace!=null?ST.timing.shiftRolloverGrace:15);
  var totalMins=h*60+m;
  var dayStart=6*60+grace;
  var dayEnd=18*60+grace;
  return(totalMins>=dayStart&&totalMins<dayEnd)?'DAY':'NIGHT';
}

// Ensure session has a shifts array (non-destructive extension)
function ensureShifts(sess){
  if(!sess.shifts)sess.shifts=[];

// Insert a slot reading into the correct shift bucket
function recordSlotInShift(slotKey,disc,load){
  const raw=ST.sessions.find(function(x){return x.id===ST.activeId;});
  if(!raw)return;
  if(!raw.shifts)raw.shifts=[];
  const now=new Date().toISOString();
  const shiftType=getShiftType(now);
  let shift=raw.shifts.find(function(s){return s.type===shiftType;});
  if(!shift){
    shift={type:shiftType,start:now,end:now,slots:[]};
    raw.shifts.push(shift);
  }
  shift.end=now;
  // Prevent duplicate slot entries
  const exists=shift.slots.find(function(s){return s.key===slotKey;});
  if(!exists){
    shift.slots.push({key:slotKey,time:now,disc:disc||0,load:load||0});
  } else {
    // Update existing slot values
    exists.disc=disc||0;exists.load=load||0;exists.time=now;
  }
}
function currSlot(){
  const h=new Date().getHours(),m=new Date().getMinutes(),sl=shiftSlots();
  const grace=ST.timing?.hourlyGrace??30;
  for(let i=0;i<sl.length;i++){
    const sh=parseInt(sl[i].substring(0,2));
    if(h===sh){
      // Within grace window: show previous slot — but if this IS the first slot (i=0),
      // don't wrap backwards to the last slot of the shift (that would show 1700-1800 at 06:15)
      if(m<grace&&i>0) return sl[i-1];
      return sl[i];
    }
  }
  // Hour not found in current shift slots (e.g. hour 6 on a night shift ending at 06:00)
  // Return the last slot of the shift
  return sl[sl.length-1]||sl[0];
}
function curr4Slot(){
  const mins=new Date().getHours()*60+new Date().getMinutes();
  const s4=[{l:'0600-1000',s:360,e:600},{l:'1000-1400',s:600,e:840},{l:'1400-1800',s:840,e:1080},{l:'1800-2200',s:1080,e:1320},{l:'2200-0200',s:1320,e:1560},{l:'0200-0600',s:120,e:360}];
  for(const x of s4){const am=mins<120?mins+1440:mins,as_=x.s<120?x.s+1440:x.s,ae=(x.e<120?x.e+1440:x.e)+90;if(am>=as_&&am<ae)return x.l;}
  return '0600-1000';
}
function fs(s){return s.replace('-',' – ');}
function dur(f,t){
  if(!f||!t)return'0:00';
  const[fh,fm]=f.split(':').map(Number),[th,tm]=t.split(':').map(Number);
  let d=(th*60+tm)-(fh*60+fm);if(d<0)d+=1440;
  return Math.floor(d/60)+':'+String(d%60).padStart(2,'0');
}

function formatDateTime(dt){

  const d=new Date(dt);
  if(isNaN(d.getTime()))return dt;
  return d.toLocaleString('en-ZA',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:false});
}
function formatDate(dt){
  if(!dt)return'—';
  const d=new Date(dt);
  if(isNaN(d.getTime()))return dt;
  return d.toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'numeric'});
}
function getActiveId(){return(ST.vesselSlot===2&&ST.activeId2)?ST.activeId2:ST.activeId;}
function getSess(){

function role(){if(!RT.user)return null;if(RT.user.role==='admin'&&!RT.adminOp)return'admin';return RT.user.role==='admin'?'operator':RT.user.role;}
function isSupervisor(){return RT.user&&RT.user.role==='supervisor';}
function hk(id,slot,c,t){return id+'_'+slot+'_'+c+'_'+t;}
function he(id,slot,c,t){return ST.hourly[hk(id,slot,c,t)]||0;}
function effSplit(sess,c,t){const cb=sess.craneBalances[c]||{};const ob=cb[`${t}OB`];return(ob!=null&&ob!=='')?parseFloat(ob)||0:cb[`${t}Split`]||0;}
function noSess(ico,msg){return`<div class="nosess"><div class="ico">${ico}</div><p>${msg}</p></div>`;}

// ═══════════ LOGIN ═══════════
function doLogin(){
  const e=($('liE').value||'').trim().toLowerCase();
  const p=($('liP').value||'');
  if(!e||!p){$('liErr').textContent='Please enter email and password.';return;}
  $('liErr').textContent='';
  // ST.users is always a proper independent array (never a DEF reference)
  const u=ST.users.find(function(u){
    return u.email&&u.email.toLowerCase()===e&&u.password===p&&u.active;
  });
  if(!u){$('liErr').textContent='Incorrect email or password.';return;}
  RT.user=u;
  $('loginScreen').style.display='none';
  $('appShell').style.display='flex';
  if(!ST.activityLog)ST.activityLog=[];
  logActivity('User Login','User: '+u.name+' ('+u.role+')');
  try{localStorage.setItem(SK,JSON.stringify(ST));}catch(e){}
  initApp();
}
function toggleDark(){
  var d=document.body.classList.toggle('dark');
  ST.settings.darkMode=d;
  try{localStorage.setItem(SK,JSON.stringify(ST));}catch(e){}
  sv();
}
function applyDark(){
  var d=ST.settings&&ST.settings.darkMode;
  document.body.classList.toggle('dark',!!d);
}
function doLogout(){logActivity('User Logout','Signed out');try{localStorage.setItem(SK,JSON.stringify(ST));}catch(e){}RT.user=null;RT.adminOp=false;$('loginScreen').style.display='flex';$('appShell').style.display='none';if(RT.timer)clearInterval(RT.timer);}
function initApp(){
  applyDark();
  // Prevent browser from opening dragged files
  document.addEventListener('dragover',function(e){e.preventDefault();});
  document.addEventListener('drop',function(e){e.preventDefault();});
  // Reload images from localStorage (they don't come from Firebase)
  try{
    var saved=JSON.parse(localStorage.getItem(SK)||'{}');
    if(saved&&saved.settings){
      ['logo','bg','bgHourly','bgFour','bgDelay','bgYard'].forEach(function(k){
        if(saved.settings[k]&&saved.settings[k].startsWith('data:')){
          if(!ST.settings)ST.settings={};
          ST.settings[k]=saved.settings[k];
        }
      });
    }
  }catch(e){}
  updateLogos();buildNav();
  // initSync already called on page load - just refresh watcher if needed
  const r=role();
  const startTab=r==='admin'?'admin':r==='supervisor'?'analysis':'input';
  switchTab(startTab);
  RT.timer=setInterval(()=>{if(RT.tab==='hourly')renderHourly();if(RT.tab==='4hourly')renderFour();},300000);
  // Shift rollover — runs every minute, saves results+delays at 06:00/18:00
  RT.lastShiftType=isDay()?'DAY':'NIGHT';
  // Track the shift start date: for night shift after midnight, use yesterday's date as the shift start date
  function _shiftStartDate(){
    var now=new Date();
    var h=now.getHours();
    if(h>=6&&h<18){
      // Day shift — starts today
      return now.toLocaleDateString('en-CA');
    } else if(h<6){
      // Night shift that started yesterday at 18:00
      var y=new Date(now);y.setDate(y.getDate()-1);
      return y.toLocaleDateString('en-CA');
    } else {
      // Night shift that starts today at 18:00
      return now.toLocaleDateString('en-CA');
    }
  }
  RT.lastShiftDate=_shiftStartDate();
  // ── Missed-rollover detection ──
  // If app was closed when shift boundary passed, ST.hourly has stale data.
  // Detect by comparing stored hourlyShiftKey to the current shift.
  var _curShiftKey=(isDay()?'DAY':'NIGHT')+'_'+_shiftStartDate();
  if(ST.hourlyShiftKey && ST.hourlyShiftKey !== _curShiftKey){
    // Shift boundary(s) were crossed while app was closed.
    // 1. Snapshot the one stale shift (if not already saved).
    // 2. Delete from ST.hourly ALL keys belonging to ANY already-snapshotted shift.
    //    This handles the case where multiple boundaries were missed and ST.hourly
    //    still contains data from several old shifts — all of which are already in
    //    sess.shifts[] — causing double-counting in getAllSlots step 2.
    var _missedType=ST.hourlyShiftKey.split('_')[0];
    var _missedDate=ST.hourlyShiftKey.split('_').slice(1).join('_');
    var _activeIds=[ST.activeId,ST.activeId2].filter(Boolean);
    _activeIds.forEach(function(aid){
      var _raw=ST.sessions.find(function(x){return x.id===aid;});
      if(!_raw)return;
      if(!_raw.shifts)_raw.shifts=[];
      var _mNc=_raw.numCranes||2;
      // Step A: snapshot the stale shift if not already stored
      var _mKey=_missedType+'_'+_missedDate;
      if(!_raw.shifts.find(function(sh){return sh.key===_mKey;})){
        var _mSlots=_missedType==='DAY'?ALL.slice(0,12):ALL.slice(12);
        var _mEntry={key:_mKey,type:_missedType,date:_missedDate,start:new Date().toISOString(),end:new Date().toISOString(),hourly:{},delays:{}};
        _mSlots.forEach(function(slot){
          for(var ci=1;ci<=_mNc;ci++){['discharge','load'].forEach(function(t){
            var k=hk(aid,slot,ci,t);var sk=slot+'_'+ci+'_'+t;
            if(ST.hourly[k])_mEntry.hourly[sk]=ST.hourly[k];
          });}
        });
        for(var ci=1;ci<=_mNc;ci++){
          var rk=aid+'_c'+ci;
          (ST.delayRowIds&&ST.delayRowIds[rk]||[0]).forEach(function(r){
            var dk=aid+'_'+ci+'_'+r;
            if(ST.delays[dk])_mEntry.delays[dk]=Object.assign({},ST.delays[dk]);
          });
        }
        _raw.shifts.push(_mEntry);
        var _sidx=ST.sessions.findIndex(function(x){return x.id===aid;});
        if(_sidx>=0)ST.sessions[_sidx]=JSON.parse(JSON.stringify(_raw));
      }
      // Step B: remove from ST.hourly ALL keys whose slot belongs to ANY saved shift.
      // This cleans up data from multiple missed boundaries, not just the one stale shift.
      // Only the current shift's slot keys are kept.
      var _curSlots=isDay()?ALL.slice(0,12):ALL.slice(12);
      var _curSlotsSet={};
      _curSlots.forEach(function(s){_curSlotsSet[s]=true;});
      Object.keys(ST.hourly).forEach(function(k){
        if(k.indexOf(aid+'_')!==0)return;
        var sk=k.slice((aid+'_').length);
        // Extract slot portion: sk = 'HHMM-HHMM_ci_type'
        // First dash is within the slot (e.g. '0600-0700'), find the underscore after it
        var slotEnd=sk.indexOf('_',sk.indexOf('-')+1);
        var slotPart=slotEnd>=0?sk.substring(0,slotEnd):sk;
        if(!_curSlotsSet[slotPart])delete ST.hourly[k];
      });
    });
    ST.delays={};ST.delayRowIds={};
    // Reset per-crane first/last lifts (they belong to the shift, not the vessel)
    if(ST.perfTargets&&ST.perfTargets.craneLifts){ST.perfTargets.craneLifts={};}
    ST.hourlyShiftKey=_curShiftKey;
    // Always save — the shift snapshot we just built MUST reach Firebase.
    // We delay 3 s so the Firebase listener can merge remote state first,
    // but we never skip this save: the snapshot only exists here and must
    // be persisted or that shift's data is lost forever.
    setTimeout(function(){sv();},3000);
  } else if(!ST.hourlyShiftKey){
    // First ever load — stamp the current shift key
    ST.hourlyShiftKey=_curShiftKey;
    sv();
  }
  RT.shiftRollTimer=setInterval(function(){
    var cShift=isDay()?'DAY':'NIGHT';
    var cDate=_shiftStartDate();
    if(cShift===RT.lastShiftType&&cDate===RT.lastShiftDate)return;
    var outType=RT.lastShiftType,outDate=RT.lastShiftDate;
    RT.lastShiftType=cShift;RT.lastShiftDate=cDate;
    // Snapshot both active vessels
    var activeIds=[ST.activeId,ST.activeId2].filter(Boolean);
    activeIds.forEach(function(aid){
      var raw=ST.sessions.find(function(x){return x.id===aid;});
      if(!raw)return;
      if(!raw.shifts)raw.shifts=[];
      var sKey=outType+'_'+outDate;
      var se=raw.shifts.find(function(sh){return sh.key===sKey;});
      if(!se){
        se={key:sKey,type:outType,date:outDate,start:new Date().toISOString(),end:new Date().toISOString(),hourly:{},delays:{}};
        raw.shifts.push(se);
        var nc=raw.numCranes||2;
        var isDaySlots=outType==='DAY';
        var slotKeys=isDaySlots?ALL.slice(0,12):ALL.slice(12);
        slotKeys.forEach(function(slot){for(var ci=1;ci<=nc;ci++){['discharge','load'].forEach(function(t){var k=hk(aid,slot,ci,t);var sk=slot+'_'+ci+'_'+t;if(ST.hourly[k])se.hourly[sk]=ST.hourly[k];});}});
        for(var ci=1;ci<=nc;ci++){var rk=aid+'_c'+ci;(ST.delayRowIds&&ST.delayRowIds[rk]||[0]).forEach(function(r){var dk=aid+'_'+ci+'_'+r;var _dd=ST.delays[dk];if(!_dd)return;// Only snapshot delays whose 'from' time falls within the outgoing shift window
if(_dd.from){var _dfh=parseInt((_dd.from||'00:00').split(':')[0],10);var _inShift=isDaySlots?(_dfh>=6&&_dfh<18):(_dfh>=18||_dfh<6);if(!_inShift)return;}se.delays[dk]=Object.assign({},_dd);});}
        // Snapshot CMT data for Excel export (not shown in history display)
        try{
          var _cmtActuals={};
          slotKeys.forEach(function(slot){
            var tot=0;
            for(var ci=1;ci<=nc;ci++){tot+=(ST.hourly[hk(aid,slot,ci,'discharge')]||0)+(ST.hourly[hk(aid,slot,ci,'load')]||0);}
            _cmtActuals[slot]=tot;
          });
          // Combined target per hour = sum of all crane targets
          var _tPerHr=0;
          for(var _tci=1;_tci<=nc;_tci++){
            var _tKey='cmtTarget'+((_tci===1)?'':''+_tci);
            _tPerHr+=(ST.perfTargets&&ST.perfTargets[_tKey])||0;
          }
          if(!_tPerHr)_tPerHr=(ST.perfTargets&&ST.perfTargets['cmtTarget'])||0; // fallback
          var _fl=raw.firstLift||'';
          var _cmtTargets={};
          slotKeys.forEach(function(slot){_cmtTargets[slot]=cmtSlotTarget(_tPerHr,slot,_fl);});
          var _totMoves=Object.values(_cmtActuals).reduce(function(a,b){return a+b;},0);
          var _deductMins=0;
          for(var ci=1;ci<=nc;ci++){
            (ST.delayRowIds&&ST.delayRowIds[aid+'_c'+ci]||[0]).forEach(function(r){
              var _dd=ST.delays[aid+'_'+ci+'_'+r]||{};
              if(_dd.from&&_dd.to){
                var _fp=_dd.from.split(':'),_tp=_dd.to.split(':');
                var _fm=parseInt(_fp[0]||0)*60+parseInt(_fp[1]||0);
                var _tm=parseInt(_tp[0]||0)*60+parseInt(_tp[1]||0);
                if(_tm<_fm)_tm+=1440;
                _deductMins+=Math.max(0,_tm-_fm);
              }
            });
          }
          var _totalCraneHrs=nc*12;
          var _grossTPH=_totalCraneHrs>0?Math.round(_totMoves/_totalCraneHrs*10)/10:0;
          var _netCraneHrs=Math.max(0,(_totalCraneHrs*60-_deductMins))/60;
          var _netTPH=_netCraneHrs>0?Math.round(_totMoves/_netCraneHrs*10)/10:0;
          se.cmt={actuals:_cmtActuals,targets:_cmtTargets,totalMoves:_totMoves,totalCraneHrs:_totalCraneHrs,grossTPH:_grossTPH,deductMins:_deductMins,netCraneHrs:Math.round(_netCraneHrs*100)/100,netTPH:_netTPH};
        }catch(e2){}        se.end=new Date().toISOString();
        var sidx=ST.sessions.findIndex(function(x){return x.id===aid;});
        if(sidx>=0)ST.sessions[sidx]=JSON.parse(JSON.stringify(raw));
      }
    });
    ST.hourly={};ST.delays={};ST.delayRowIds={};
    // Reset First Lift and Last Lift on all active sessions at shift boundary
    [ST.activeId,ST.activeId2].filter(Boolean).forEach(function(aid){
      var _rs=ST.sessions.find(function(x){return x.id===aid;});
      if(_rs){_rs.firstLift='';_rs.lastLift='';}
    });
    // Reset per-crane first/last lifts in CMT (they belong to the shift, not the vessel)
    if(ST.perfTargets&&ST.perfTargets.craneLifts){ST.perfTargets.craneLifts={};}
    // Stamp the new shift key so app-restart can detect missed rollovers
    ST.hourlyShiftKey=cShift+'_'+cDate;
    logActivity('Shift Rollover','New shift: '+cShift+' starting '+cDate,'Previous: '+outType+' '+outDate);
    sv();
    if(RT.tab==='delays')renderDelays();
    if(RT.tab==='results')renderResults();
    if(RT.tab==='hourly')renderHourly();
    if(RT.tab==='4hourly')renderFour();
    if(RT.tab==='input')renderInput();
    if(RT.tab==='history')renderHistory();
    if(RT.tab==='performance')renderPerformance();
  },60000);
}

  const r=role();
  if(r==='admin')return[{id:'admin',ico:'⚙️',l:'Admin'},{id:'yard',ico:'🏗️',l:'Yard'},{id:'performance',ico:'📊',l:'CMT'},{id:'history',ico:'🗂️',l:'History'},{id:'activitylog',ico:'📝',l:'Log'},{id:'emergency',ico:'🚨',l:'Emergency'}];
  if(r==='operator')return[{id:'input',ico:'📋',l:'Input'},{id:'results',ico:'📊',l:'Results'},{id:'hourly',ico:'🕐',l:'Hourly'},{id:'4hourly',ico:'📅',l:'4-Hr'},{id:'delays',ico:'⏸️',l:'Delays'},{id:'yard',ico:'🏗️',l:'Yard'},{id:'performance',ico:'📊',l:'CMT'},{id:'history',ico:'🗂️',l:'History'},{id:'emergency',ico:'🚨',l:'Emergency'}];
  if(r==='supervisor')return[{id:'hourly',ico:'🕐',l:'Hourly'},{id:'4hourly',ico:'📅',l:'4-Hr'},{id:'yard',ico:'🏗️',l:'Yard'},{id:'performance',ico:'📊',l:'CMT'},{id:'history',ico:'🗂️',l:'History'},{id:'analysis',ico:'📈',l:'Analysis'},{id:'emergency',ico:'🚨',l:'Emergency'}];

function buildNav(){$('bnav').innerHTML=tabs().map(t=>`<button class="ni${RT.tab===t.id?' active':''}" onclick="switchTab('${t.id}')"><div class="ico">${t.ico}</div><span>${t.l}</span></button>`).join('');}
function switchTab(t){
  RT.tab=t;document.querySelectorAll('.sc').forEach(s=>s.classList.remove('active'));$('sc-'+t).classList.add('active');buildNav();$('swrap').scrollTop=0;
  ({input:renderInput,results:renderResults,hourly:renderHourly,'4hourly':renderFour,delays:renderDelays,yard:renderYard,performance:renderPerformance,history:renderHistory,admin:renderAdmin,analysis:renderAnalysis,activitylog:renderActivityLog,emergency:renderEmergency})[t]?.();
}

  document.querySelectorAll('.rh-logo').forEach(function(el){

// ═══════════ INPUT ═══════════

function craneName(n){return (ST.craneNames&&ST.craneNames[n])||('CR'+n);}

function renderInput(){
  const sess=getSess(),locked=sess&&sess.locked;
  // Read crane count from DOM if form visible, else from session
  let nc=2;
  if(sess) nc=sess.numCranes;
  const f=sess||{vesselName:'',numCranes:2,target:'',dockedOn:'',firstLift:'',lastLift:''};
  const slot=currSlot(),vn=ST.sel.vessels||[];
  let h=`<div class="ph"><h2>📋 Vessel Input</h2><p>Enter vessel details for this shift</p></div>`;
  h+=`<div class="sec"><div class="st">Vessel Information</div>
    <div class="g2">
      <div class="f"><label>Vessel Name</label>
        <input list="vnl" id="fv" value="${f.vesselName||''}" ${locked?'disabled':''}/>
        <datalist id="vnl">${vn.map(v=>`<option value="${v}"/>`).join('')}</datalist>
      </div>
      <div class="f"><label>No. of Cranes</label>
        <select id="fc" ${locked?'disabled':''} onchange="onCraneChange()">
          ${[1,2,3,4].map(n=>`<option value="${n}"${nc==n?' selected':''}>${n}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="g2">
      <div class="f"><label>Target (moves)</label><input type="number" id="ft" value="${f.target||''}" ${locked?'disabled':''}/></div>
      <div class="f"><label>Docked On</label><input type="datetime-local" id="fd" value="${f.dockedOn||''}" ${locked?'disabled':''}/></div>
    </div>
    <div class="g2">
      <div class="f"><label>First Lift</label><input type="time" id="ffl" value="${f.firstLift||''}" ${locked?'disabled':''}/></div>
      <div class="f"><label>Last Lift</label><input type="time" id="fll" value="${f.lastLift||''}" ${locked?'disabled':''}/></div>
    </div></div>`;

  h+=`<div class="sec" id="craneBalanceSection"><div class="st" style="font-size:14px;color:#0891b2;border-bottom-color:#0891b2;letter-spacing:.3px">📋 Splits &amp; Opening Balance</div>
    <p style="font-size:11px;color:#888;margin-bottom:12px">Enter the planned split per crane. Opening Balance overrides the split in totals — leave blank to use split only.</p>`;
  for(let i=1;i<=nc;i++){
    const cb=(sess?.craneBalances||{})[i]||{};
    h+=`<div class="crblk"><div class="crtag">${craneName(i)}</div>
      <div class="g2">
        <div class="f"><label>Discharge Split</label><input type="number" id="dst${i}" value="${cb.dischargeSplit!=null?cb.dischargeSplit:''}" ${locked?'disabled':''}/></div>
        <div class="f"><label>Load Split</label><input type="number" id="lst${i}" value="${cb.loadSplit!=null?cb.loadSplit:''}" ${locked?'disabled':''}/></div>
      </div>
      <div class="g2">
        <div class="f"><label>Discharge Opening Bal <span style="font-size:9px;font-weight:400;text-transform:none">(overrides split if set)</span></label>
          <input type="number" id="dob${i}" value="${cb.dischargeOB!=null?cb.dischargeOB:''}" ${locked?'disabled':''} placeholder="Leave blank"/></div>
        <div class="f"><label>Load Opening Bal <span style="font-size:9px;font-weight:400;text-transform:none">(overrides split if set)</span></label>
          <input type="number" id="lob${i}" value="${cb.loadOB!=null?cb.loadOB:''}" ${locked?'disabled':''} placeholder="Leave blank"/></div>
      </div></div>`;
  }
  h+=`</div>`;

  if(sess){
    h+=`<div class="sec"><div class="st" style="font-size:14px;color:#d97706;border-bottom-color:#d97706;letter-spacing:.3px">⏱️ Hourly Moves — ${fs(slot)}</div>
    <p style="font-size:11px;color:#888;margin-bottom:12px">Enter moves completed this hour per crane.</p>`;
    for(let i=1;i<=nc;i++){
      h+=`<div class="crblk"><div class="crtag">${craneName(i)}</div>
        <div class="g2">
          <div class="f"><label>Discharge</label><input type="number" value="${he(sess.id,slot,i,'discharge')||''}" placeholder="0" oninput="ST.hourly[hk('${sess.id}','${slot}',${i},'discharge')]=parseFloat(this.value)||0;_myLastSave=Date.now();sv()"/></div>
          <div class="f"><label>Load</label><input type="number" value="${he(sess.id,slot,i,'load')||''}" placeholder="0" oninput="ST.hourly[hk('${sess.id}','${slot}',${i},'load')]=parseFloat(this.value)||0;_myLastSave=Date.now();sv()"/></div>
        </div></div>`;
    }
    h+=`</div>`;
  }

  h+=`<div style="padding:0 10px 28px">`;
  if(!locked){h+=`<button class="btn" onclick="saveSession()" style="margin-bottom:10px">💾 Save Session</button>`;}
  else{
    var slot2Active=ST.vesselSlot===2&&ST.activeId2;
    var otherSessName='';
    if(ST.activeId2&&ST.vesselSlot!==2){var s2o=ST.sessions.find(function(x){return x.id===ST.activeId2;});if(s2o)otherSessName=s2o.vesselName;}
    if(ST.activeId2&&ST.vesselSlot===2){var s2o=ST.sessions.find(function(x){return x.id===ST.activeId;});if(s2o)otherSessName=s2o.vesselName;}
    h+=`<div class="suc">✅ Session saved${ST.activeId2?(' — Vessel '+(ST.vesselSlot===2?'2':'1')+' active'):''}${ST.activeId2?('<span style="font-size:10px;display:block;color:#475569">Other: '+otherSessName+'</span>'):''}
    </div>
    <button class="btn btn-out" onclick="unlockSess()" style="margin-bottom:10px">✏️ Edit Session</button>
    <button class="btn" onclick="newVessel()" style="background:#475569;margin-bottom:10px">🚢 New Vessel</button>
    <button class="btn" onclick="switchVessel()" style="background:#0891b2;margin-bottom:10px">🔄 Switch Vessel</button>`;
  }
  h+=`</div>`;
  $('sc-input').innerHTML=h;
}

// Re-render only crane sections when crane count changes (no page reload)
function onCraneChange(){
  const sel=$('fc');if(!sel)return;
  const nc=parseInt(sel.value)||2;
  const slot=currSlot();
  const sess=getSess();
  let bh=`<div class="sec" id="craneBalanceSection"><div class="st">Opening Balance &amp; Splits</div>`;
  for(let i=1;i<=nc;i++){
    const cb=(sess?.craneBalances||{})[i]||{};
    bh+=`<div class="crblk"><div class="crtag">${craneName(i)}</div>
      <div class="g2">
        <div class="f"><label>Discharge Split</label><input type="number" id="dst${i}" value="${cb.dischargeSplit!=null?cb.dischargeSplit:''}"/></div>
        <div class="f"><label>Load Split</label><input type="number" id="lst${i}" value="${cb.loadSplit!=null?cb.loadSplit:''}"/></div>
      </div>
      <div class="g2">
        <div class="f"><label>Discharge Opening Bal</label><input type="number" id="dob${i}" value="${cb.dischargeOB!=null?cb.dischargeOB:''}" placeholder="Leave blank"/></div>
        <div class="f"><label>Load Opening Bal</label><input type="number" id="lob${i}" value="${cb.loadOB!=null?cb.loadOB:''}" placeholder="Leave blank"/></div>
      </div></div>`;
  }
  bh+=`</div>`;

  let mh='';
  if(sess){
    mh=`<div class="sec"><div class="st">Hourly Moves — ${fs(slot)}</div><p style="font-size:11px;color:#888;margin-bottom:12px">Enter moves completed this hour per crane.</p>`;

          <div class="f"><label>Load</label><input type="number" value="${he(sess.id,slot,i,'load')||''}" placeholder="0" oninput="ST.hourly[hk('${sess.id}','${slot}',${i},'load')]=parseFloat(this.value)||0;_myLastSave=Date.now();sv()"/></div>

function saveSession(){
  const fcEl=$('fc');
  const nc=fcEl?parseInt(fcEl.value)||2:2;
  const cb={};
  for(let i=1;i<=nc;i++){
    const dob=$(`dob${i}`),lob=$(`lob${i}`);
    cb[i]={
      dischargeSplit:parseFloat($(`dst${i}`)?.value)||0,
      loadSplit:parseFloat($(`lst${i}`)?.value)||0,
      dischargeOB:dob&&dob.value!==''?parseFloat(dob.value):null,
      loadOB:lob&&lob.value!==''?parseFloat(lob.value):null
    };
  }
  // 🔴 CRITICAL: Generate ID only once — NEVER recreate existing session
  var targetSlot=ST.vesselSlot||1;
  if(targetSlot===2){if(!ST.activeId2)ST.activeId2=Date.now();}
  else{if(!ST.activeId)ST.activeId=Date.now();}
  const id=targetSlot===2?ST.activeId2:ST.activeId;

  // Find existing session in ST.sessions to preserve shifts + results
  const existing=ST.sessions.find(x=>x.id===id)||{};

  // Merge form values into session — DO NOT recreate the object
  const s=Object.assign({},existing,{
    id,
    vesselName:$('fv')?.value||existing.vesselName||'Unknown',
    numCranes:nc,
    target:parseFloat($('ft')?.value)||0,
    dockedOn:$('fd')?.value||'',
    firstLift:$('ffl')?.value||'',
    lastLift:$('fll')?.value||'',
    craneBalances:cb,
    locked:true,
    savedAt:new Date().toISOString(),
    // 🔴 PRESERVE shifts — never wipe them
    shifts:existing.shifts||[]
  });

  // Snapshot results and delays
  var sl_=shiftSlots();
  if(!s._results||typeof s._results!=='object')s._results={hourly:{},delays:{}};
  if(!s._results.hourly||typeof s._results.hourly!=='object')s._results.hourly={};
  if(!s._results.delays||typeof s._results.delays!=='object')s._results.delays={};
  sl_.forEach(function(slot){for(var ci=1;ci<=nc;ci++){['discharge','load'].forEach(function(t){var k=hk(id,slot,ci,t);var sk=slot+'_'+ci+'_'+t;if(ST.hourly[k])s._results.hourly[sk]=ST.hourly[k];});}});
  for(var ci=1;ci<=nc;ci++){var rk=id+'_c'+ci;(ST.delayRowIds&&ST.delayRowIds[rk]||[0]).forEach(function(r){var dk=id+'_'+ci+'_'+r;if(ST.delays[dk])s._results.delays[dk]=Object.assign({},ST.delays[dk]);});}

  // Update in-place — never duplicate
  const idx=ST.sessions.findIndex(x=>x.id===id);
  if(idx>=0) ST.sessions[idx]=JSON.parse(JSON.stringify(s));
  else ST.sessions.unshift(JSON.parse(JSON.stringify(s)));
  logActivity('Session Saved',s.vesselName,'Cranes: '+nc+' | Target: '+(s.target||0));
  // Set protection BEFORE sv() so the window is active before Firebase echo arrives
  _saveProtectUntil=Date.now()+8000;
  _myLastSave=Date.now();
  sv();
  renderInput();
  setTimeout(function(){_myLastSave=Date.now();},500);
  setTimeout(function(){_myLastSave=Date.now();},1000);
  setTimeout(function(){_myLastSave=Date.now();},2000);
  setTimeout(function(){_myLastSave=Date.now();},3000);
}

function newVessel(){
  var targetSlot=ST.vesselSlot||1;
  var currentId=targetSlot===2?(ST.activeId2||null):ST.activeId;
  if(currentId){
    var _id=currentId;
    var _existing=ST.sessions.find(function(x){return x.id===_id;})||{};
    if(_existing.id){
      var _nc=_existing.numCranes||2;
      if(!_existing.shifts)_existing.shifts=[];
      var _shiftType=isDay()?'DAY':'NIGHT';
      var _shiftDate=_shiftStartDate(); // correct for night-after-midnight (uses yesterday's date)
      var _shiftKey=_shiftType+'_'+_shiftDate;
      var _shiftEntry=_existing.shifts.find(function(sh){return sh.key===_shiftKey;});
      var _isNew=!_shiftEntry;
      if(!_shiftEntry){
        _shiftEntry={key:_shiftKey,type:_shiftType,date:_shiftDate,start:new Date().toISOString(),end:new Date().toISOString(),hourly:{},delays:{}};
        _existing.shifts.push(_shiftEntry);
      }
      if(_isNew){
        var _sl=shiftSlots();
        _sl.forEach(function(slot){
          for(var ci=1;ci<=_nc;ci++){
            ['discharge','load'].forEach(function(t){
              var k=hk(_id,slot,ci,t);var sk=slot+'_'+ci+'_'+t;
              if(ST.hourly[k])_shiftEntry.hourly[sk]=ST.hourly[k];
            });
          }
        });
        for(var _ci=1;_ci<=_nc;_ci++){
          var _rk=_id+'_c'+_ci;
          (ST.delayRowIds&&ST.delayRowIds[_rk]||[0]).forEach(function(_r){
            var _dk=_id+'_'+_ci+'_'+_r;
            if(ST.delays[_dk])_shiftEntry.delays[_dk]=Object.assign({},ST.delays[_dk]);
          });
        }
        _shiftEntry.end=new Date().toISOString();
      }
      _existing.locked=true;
      _existing.savedAt=new Date().toISOString();
      var _idx=ST.sessions.findIndex(function(x){return x.id===_id;});
      if(_idx>=0)ST.sessions[_idx]=JSON.parse(JSON.stringify(_existing));
    }
  }
  // Clear active slot — ONE sv() so Firebase only sees one write
  if(targetSlot===2){ST.activeId2=null;}
  else{ST.activeId=null;}
  ST.hourly={};
  ST.delayRowIds={};
  ST.delays={};
  // Clear per-shift CMT crane lifts — they belong to the shift, not the vessel
  if(ST.perfTargets&&ST.perfTargets.craneLifts){ST.perfTargets.craneLifts={};}
  // Stamp current shift key so missed-rollover detection works
  var _nvShiftType=isDay()?'DAY':'NIGHT';
  var _nvDate=_shiftStartDate(); // use canonical shift-start-date (handles night-after-midnight correctly)
  ST.hourlyShiftKey=_nvShiftType+'_'+_nvDate;
  logActivity('New Vessel','Started new vessel slot '+(targetSlot===2?'2':'1'));
  _saveProtectUntil=Date.now()+8000;
  _myLastSave=Date.now();
  sv();
  try{localStorage.setItem(SK,JSON.stringify(ST));}catch(e){}
  setTimeout(function(){_myLastSave=Date.now();},500);
  setTimeout(function(){_myLastSave=Date.now();},1000);
  setTimeout(function(){_myLastSave=Date.now();},2000);
  setTimeout(function(){_myLastSave=Date.now();},3000);
  renderInput();
}
// newSess kept as alias for backwards compat
function newSess(){newVessel();}

}

      let rT=0;

      for(let i=1;i<=nc;i++){
        const k=hk(sess.id,s,i,t),sk=s+'_'+i+'_'+t,v=ST.hourly[k]||0;rT+=v;
        h+=`<td><input class="ci" type="number" value="${v||''}" placeholder="-" oninput="ST.hourly[hk('${sess.id}','${s}',${i},'${t}')]=parseFloat(this.value)||0;sv()"/></td>`;
      }
      h+=`<td class="bold">${rT||''}</td></tr>`;
    });
    let dT=0;h+=`<tr class="ry"><td class="lbl">${_adminLbl('res_done','Total Done',false)}</td>`;

    h+=`<td${rT2<0?' style="color:var(--red)"':''}>${rT2}</td></tr>`;
    h+=`</table></div></div>`;
  });
  return h;
}

// Update a past shift's hourly snapshot (for results editing of completed shifts)
// blockId, nc, ri passed so we can update totals in-place without re-rendering
function updateShiftHourly(sessId, shiftKey, slot, ci, type, val, blockId, nc, ri){
  var raw=ST.sessions.find(function(x){return x.id===sessId;});
  if(!raw||!raw.shifts)return;
  var sh=raw.shifts.find(function(s){return s.key===shiftKey;});
  if(!sh){
    // Shift block exists in display but not yet in sess.shifts (empty slot) — create it
    var keyParts=shiftKey.split('_');
    sh={key:shiftKey,type:keyParts[0],date:keyParts.slice(1).join('_'),start:new Date().toISOString(),end:new Date().toISOString(),hourly:{},delays:{}};
    raw.shifts.push(sh);
  }
  if(!sh.hourly)sh.hourly={};
  var sk=slot+'_'+ci+'_'+type;
  sh.hourly[sk]=parseFloat(val)||0;
  _myLastSave=Date.now();
  sv();

  // Update cells in-place — no re-render, so open/closed state is preserved
  if(!blockId)return;
  // Update row total for this slot
  var rowTotEl=document.getElementById('rrowtot_'+blockId+'_'+type+'_'+ri);
  if(rowTotEl){
    var rT=0;
    for(var x=1;x<=nc;x++)rT+=(sh.hourly[slot+'_'+x+'_'+type])||0;
    rowTotEl.textContent=rT||'';
  }
  // Update done/remain rows for this type
  var doneRowId='res_done_'+blockId+'_'+type;
  var remRowId='res_rem_'+blockId+'_'+type;
  var perCrane={};
  for(var x=1;x<=nc;x++)perCrane[x]=0;
  Object.keys(sh.hourly).forEach(function(k){
    var parts=k.split('_');if(parts.length<3)return;
    var kci=parseInt(parts[parts.length-2]);
    var kt=parts[parts.length-1];
    if(kt===type&&kci>=1&&kci<=nc)perCrane[kci]=(perCrane[kci]||0)+(sh.hourly[k]||0);
  });
  var dT=0;
  for(var x=1;x<=nc;x++){
    dT+=perCrane[x];
    var dc=document.getElementById(doneRowId+'_c'+x);
    if(dc)dc.textContent=perCrane[x];
  }
  var dtEl=document.getElementById(doneRowId+'_tot');
  if(dtEl)dtEl.textContent=dT;
  var sess=getSess();
  if(sess){
    var rT2=0;
    for(var x=1;x<=nc;x++){
      var split=effSplit(sess,x,type);
      var rem=split-perCrane[x];
      rT2+=rem;
      var rc=document.getElementById(remRowId+'_c'+x);
      if(rc){rc.textContent=rem;rc.style.color=rem<0?'var(--red)':'';}
    }
    var rtEl=document.getElementById(remRowId+'_tot');
    if(rtEl){rtEl.textContent=rT2;rtEl.style.color=rT2<0?'var(--red)':'';}
  }
}

// Live-update Total Done, Total Remain, and row total cells without full re-render.
// Called from oninput on current-shift hourly inputs in renderResults.
function _resLiveTotals(sessId, blockId, t, nc, changedSlot, slotRi){
  // Sum directly from ST.hourly across ALL slots in the current shift.
  // This bypasses getCraneTotal and snapshot logic entirely — ST.hourly is
  // already updated by the oninput before this function is called.
  var doneRowId='res_done_'+blockId+'_'+t;
  var remRowId='res_rem_'+blockId+'_'+t;
  // Gather all slot keys that belong to this block by reading all ST.hourly keys for this session
  var pfx=String(sessId)+'_';
  var perCrane={};
  for(var i=1;i<=nc;i++)perCrane[i]=0;
  Object.keys(ST.hourly).forEach(function(k){
    if(k.indexOf(pfx)!==0)return;
    var sk=k.slice(pfx.length); // slot_ci_type
    var parts=sk.split('_');
    if(parts.length<3)return;
    var kt=parts[parts.length-1];
    if(kt!==t)return;
    var ci=parseInt(parts[parts.length-2]);
    if(ci<1||ci>nc)return;
    perCrane[ci]=(perCrane[ci]||0)+(ST.hourly[k]||0);
  });
  // Update per-crane Done cells
  var dT=0;
  for(var i=1;i<=nc;i++){
    dT+=perCrane[i];
    var dc=document.getElementById(doneRowId+'_c'+i);
    if(dc)dc.textContent=perCrane[i];
  }
  var dtEl=document.getElementById(doneRowId+'_tot');
  if(dtEl)dtEl.textContent=dT;
  // Update per-crane Remain cells — need effSplit which needs sess
  var sess=getSess();
  if(sess){
    var rT2=0;
    for(var i=1;i<=nc;i++){
      var split=effSplit(sess,i,t);
      var rem=split-perCrane[i];
      rT2+=rem;
      var rc=document.getElementById(remRowId+'_c'+i);
      if(rc){rc.textContent=rem;rc.style.color=rem<0?'var(--red)':'';}
    }
    var rtEl=document.getElementById(remRowId+'_tot');
    if(rtEl){rtEl.textContent=rT2;rtEl.style.color=rT2<0?'var(--red)':'';}
  }
  // Update the changed slot row total
  var rowTotEl=document.getElementById('rrowtot_'+blockId+'_'+t+'_'+slotRi);
  if(rowTotEl){
    var rt=0;
    for(var i=1;i<=nc;i++)rt+=ST.hourly[hk(sessId,changedSlot,i,t)]||0;
    rowTotEl.textContent=rt||'';
  }
}

function renderResults(){
  var sess=getSess();
  var curShiftType=isDay()?'DAY':'NIGHT';
  // Use isDay() (which respects shiftRolloverGrace) for the date too
  var _now=new Date(),_h=_now.getHours(),_hm=_now.getMinutes();
  var _grace=(ST.timing&&ST.timing.shiftRolloverGrace!=null?ST.timing.shiftRolloverGrace:15);
  var _totalMins=_h*60+_hm;
  var _dayStart=6*60+_grace, _dayEnd=18*60+_grace;
  var _curShiftStartDate;
  if(_totalMins>=_dayStart&&_totalMins<_dayEnd){
    _curShiftStartDate=_now.toLocaleDateString('en-CA');
  } else if(_totalMins<_dayStart){
    var _y=new Date(_now);_y.setDate(_y.getDate()-1);_curShiftStartDate=_y.toLocaleDateString('en-CA');
  } else {
    _curShiftStartDate=_now.toLocaleDateString('en-CA');
  }
  var curShiftKey=curShiftType+'_'+_curShiftStartDate;

  let h=`<div class="ph"><div class="ph-row"><h2>📊 Results</h2><span class="pill pblue">${curShiftType} SHIFT</span></div></div>`;
  if(!sess){h+=noSess('📊','No active session. Fill Input first.');$('sc-results').innerHTML=h;return;}
  var nc=sess.numCranes;
  var sl=shiftSlots();

  // Build shift blocks: generate ALL expected shifts from vessel start to now,
  // then overlay actual data from sess.shifts[]. This ensures every shift slot
  // appears even if it was never snapshotted (shows empty rows instead of disappearing).
  var shiftBlocks=[];

  // Build a lookup of actual shift snapshots by key
  var _shiftByKey={};
  if(sess.shifts&&sess.shifts.length){
    sess.shifts.forEach(function(sh){
      if(!sh||!sh.key)return;
      // Keep the last entry per key (most data wins)
      if(!_shiftByKey[sh.key]||Object.keys(sh.hourly||{}).length>=Object.keys((_shiftByKey[sh.key].hourly)||{}).length){
        _shiftByKey[sh.key]=sh;
      }
    });
  }

  // Generate expected shift sequence from vessel start up to and including current shift
  var _vestStartMs=sess.created||sess.id||(sess.savedAt?new Date(sess.savedAt).getTime():null);
  if(_vestStartMs){
    // Snap vessel start to the shift boundary it fell in
    var _vs=new Date(_vestStartMs);
    var _vsH=_vs.getHours();
    // Shift start: if 06<=h<18 → DAY starting that day; else NIGHT starting that day (or prev day if h<6)
    var _curMs=new Date(_vs.getFullYear(),_vs.getMonth(),_vs.getDate(),_vsH>=6&&_vsH<18?6:(_vsH<6?(_vs.getDate()-1,18):18),0,0).getTime();
    // Build properly: find the 06:00 or 18:00 boundary at or before vessel start
    var _iter=new Date(_vs);
    _iter.setSeconds(0);_iter.setMilliseconds(0);_iter.setMinutes(0);
    if(_vsH>=6&&_vsH<18){_iter.setHours(6);}
    else if(_vsH<6){_iter.setDate(_iter.getDate()-1);_iter.setHours(18);}
    else{_iter.setHours(18);}

    var _nowBoundary=new Date();
    _nowBoundary.setSeconds(0);_nowBoundary.setMilliseconds(0);_nowBoundary.setMinutes(0);
    var _nbH=_nowBoundary.getHours();
    if(_nbH>=6&&_nbH<18){_nowBoundary.setHours(6);}
    else if(_nbH<6){_nowBoundary.setDate(_nowBoundary.getDate()-1);_nowBoundary.setHours(18);}
    else{_nowBoundary.setHours(18);}

    // Walk from vessel-start shift boundary to current shift boundary (max 60 shifts safety cap)
    var _safetyCount=0;
    while(_iter.getTime()<=_nowBoundary.getTime()&&_safetyCount<60){
      _safetyCount++;
      var _itH=_iter.getHours();
      var _shType=(_itH===6)?'DAY':'NIGHT';
      var _shDateD=new Date(_iter);
      var _shDateStr=_shDateD.toLocaleDateString('en-CA');
      var _shKey=_shType+'_'+_shDateStr;
      var _shSlots=_shType==='DAY'?ALL.slice(0,12):ALL.slice(12);
      var _isCur=_shKey===curShiftKey;
      shiftBlocks.push({
        key:_shKey,
        label:buildShiftLabel(_shType,_shDateStr),
        isCurrent:_isCur,
        isPast:!_isCur,
        slots:_isCur?sl:_shSlots,
        shiftObj:_shiftByKey[_shKey]||null
      });
      // Advance by 12 hours
      _iter=new Date(_iter.getTime()+12*60*60*1000);
    }
  }

  // Fallback: if vessel start unknown, use existing sess.shifts + current
  if(shiftBlocks.length===0){
    Object.keys(_shiftByKey).forEach(function(key){
      var sh=_shiftByKey[key];
      var isCurrent=key===curShiftKey;
      var shSlots=sh.type==='DAY'?ALL.slice(0,12):ALL.slice(12);
      shiftBlocks.push({key:key,label:buildShiftLabel(sh.type,sh.date||sh.start||''),isCurrent:isCurrent,isPast:!isCurrent,slots:isCurrent?sl:shSlots,shiftObj:sh});
    });
    if(!shiftBlocks.find(function(b){return b.isCurrent;})){
      shiftBlocks.push({key:curShiftKey,label:buildShiftLabel(curShiftType,_curShiftStartDate),isCurrent:true,isPast:false,slots:sl,shiftObj:null});
    }
  }

  // Deduplicate by key (safety — walk above shouldn't produce dupes)
  var _seenBlocks={};
  shiftBlocks=shiftBlocks.filter(function(b){if(_seenBlocks[b.key])return false;_seenBlocks[b.key]=true;return true;});

  // Sort: true chronological order — DAY starts 06:00, NIGHT starts 18:00 on its date
  // Current is always last (bottom)
  function shiftStartTs(key){
    // key format: "DAY_2026-05-27" or "NIGHT_2026-05-27"
    var parts=key.split('_');
    var type=parts[0];
    var dateParts=(parts[1]||'').split('-');
    if(dateParts.length<3)return 0;
    var yr=parseInt(dateParts[0]),mo=parseInt(dateParts[1])-1,dy=parseInt(dateParts[2]);
    var hr=type==='DAY'?6:18;
    return new Date(yr,mo,dy,hr,0,0).getTime();
  }
  shiftBlocks.sort(function(a,b){
    if(a.isCurrent&&!b.isCurrent)return 1;
    if(!a.isCurrent&&b.isCurrent)return -1;
    return shiftStartTs(a.key)-shiftStartTs(b.key);
  });

  // Render each shift block as a collapsible
  shiftBlocks.forEach(function(block,bi){
    var blockId='res_block_'+bi;
    var isOpen=block.isCurrent;
    var shiftIcon=block.label.indexOf('0600')>=0?'☀️':'🌙';
