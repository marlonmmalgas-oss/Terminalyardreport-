<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Terminal Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
:root{--navy:#1F3864;--navyL:#2a4a80;--yellow:#FFFF00;--lb:#BDD7EE;--red:#c0392b;--green:#1e8449;--gray:#f0f2f7;--border:#dde2ea;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--gray);min-height:100vh;-webkit-text-size-adjust:100%;}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}

/* ── LOGIN ── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1F3864,#2c5282);padding:20px;}
.lcard{background:white;border-radius:16px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.35);}
.llogo{display:flex;align-items:center;justify-content:center;width:76px;height:76px;background:var(--navy);border-radius:14px;font-weight:900;font-size:16px;color:white;overflow:hidden;margin:0 auto 16px;}
.llogo img{width:100%;height:100%;object-fit:contain;}
.lh{text-align:center;font-size:22px;font-weight:800;color:var(--navy);}
.ls{text-align:center;font-size:13px;color:#999;margin-bottom:26px;margin-top:3px;}
.fg{margin-bottom:15px;}
.fg label{display:block;font-size:10px;font-weight:800;color:#444;text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;}
.fi{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;outline:none;transition:border .2s;}
.fi:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(31,56,100,.08);}
.credit{margin-top:16px;text-align:center;font-size:12px;color:#aaa;line-height:1.6;}

/* ── BUTTONS ── */
.btn{display:block;width:100%;padding:13px;background:var(--navy);color:white;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.3px;}
.btn:hover{background:var(--navyL);}
.btn-red{background:var(--red)!important;}
.btn-red:hover{background:#a93226!important;}
.btn-out{background:white!important;color:var(--navy)!important;border:2px solid var(--navy)!important;}
.btn-sm{padding:6px 13px!important;font-size:11px!important;width:auto!important;border-radius:7px!important;display:inline-block!important;}
.err{color:var(--red);font-size:12px;text-align:center;margin-top:8px;}

/* ── SHELL ── */
#appShell{display:none;flex-direction:column;height:100vh;max-width:520px;margin:0 auto;background:white;overflow:hidden;}
.abanner{background:var(--yellow);color:#000;font-size:12px;font-weight:800;text-align:center;padding:7px;cursor:pointer;flex-shrink:0;}

/* ── NAV ── */
.bnav{display:flex;background:var(--navy);border-top:2px solid #162852;flex-shrink:0;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 1px 5px;cursor:pointer;border:none;background:none;color:rgba(255,255,255,.5);font-size:8px;gap:2px;min-width:0;}
.ni.active{color:var(--yellow);}
.ni .ico{font-size:16px;}
.ni span{font-weight:700;}

/* ── SCREENS ── */
.swrap{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--gray);}
.sc{display:none;}
.sc.active{display:block;}

/* ── PAGE HEADER ── */
.ph{background:var(--navy);padding:14px 16px;position:sticky;top:0;z-index:20;}
.ph h2{color:white;font-size:16px;font-weight:800;}
.ph p{color:rgba(255,255,255,.6);font-size:11px;margin-top:2px;}
.ph-row{display:flex;align-items:center;justify-content:space-between;}

/* ── REPORT HEADER ── */
.rh{padding:12px 14px;}
.rh1{display:flex;align-items:center;gap:12px;}
.rh-logo{width:100px;height:60px;border-radius:10px;background:white;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:var(--navy);overflow:hidden;flex-shrink:0;border:2px solid rgba(255,255,255,.25);}
.rh-logo img{width:100%;height:100%;object-fit:contain;}
.rh-txt{flex:1;}
.rh-txt h2{color:white;font-size:16px;font-weight:900;letter-spacing:.4px;}
.rh-txt p{color:rgba(255,255,255,.65);font-size:12px;}
/* Share button — hidden during capture */
.rh-share{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.3);color:white;padding:8px 14px;border-radius:9px;font-size:13px;font-weight:800;cursor:pointer;}
.rh-share.hide-for-capture{display:none!important;}
/* Yard table wrapper - scrolls on mobile */
.yard-twrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.yard-twrap table{width:100%;min-width:520px;border-collapse:collapse;}
.yard-twrap th,.yard-twrap td{white-space:nowrap;}
.yard-twrap td:first-child{min-width:150px;text-align:left;}
/* Yard cell inputs */
.yard-input{width:44px;text-align:center;border:1px solid #ddd;border-radius:4px;padding:3px 2px;font-size:11px;background:#f9f9f9;box-sizing:border-box;}
.yard-input:focus{outline:none;border-color:var(--navy);background:#fff;}
.rh2{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap;}
.rh-vessel{color:#ff5252;font-weight:900;font-size:15px;}
.rh-date{color:#ff8080;font-size:12px;}
.rh-slot{background:var(--yellow);color:#000;font-weight:900;font-size:13px;padding:4px 12px;border-radius:7px;}

/* ── CARDS ── */
.card{background:white;border-radius:12px;margin:8px 10px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden;}
.card-hd{background:var(--navy);color:white;font-weight:800;font-size:11px;padding:9px 13px;text-transform:uppercase;letter-spacing:.6px;}
.twrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}

/* ── REPORT TABLE (grouped headers) ── */
.rt{width:100%;border-collapse:collapse;font-size:11px;min-width:360px;}
.rt th.grp{background:var(--navy);color:white;text-align:center;padding:7px 4px;font-size:10.5px;font-weight:900;border:1px solid rgba(255,255,255,.12);}
.rt th.sub{background:#243f6e;color:rgba(255,255,255,.88);padding:5px 4px;font-size:9.5px;font-weight:700;border:1px solid rgba(255,255,255,.08);}
.rt th.sub-hl{background:#1a4a7a;}
/* Crane column — fixed width so it never overlaps */
.rt th.grp.crane-col{min-width:48px;width:48px;}
.rt td.crane-cell{font-weight:800;color:var(--navy);min-width:48px;width:48px;text-align:center;white-space:nowrap;}
.rt td{padding:6px 4px;text-align:center;border-bottom:1px solid #edf0f5;font-size:11px;}
.rt tr.e td{background:var(--lb);}
.rt tr.o td{background:white;}
.rt tr.ry td{background:var(--yellow)!important;font-weight:800;color:#000;}
.rt td.lbl{text-align:left;padding-left:9px;}
.rt td.hl{background:#fffde7!important;font-weight:800;}
.rt td.neg{color:var(--red);font-weight:700;}
.rt td.bold{font-weight:800;}

/* ── RESULTS TABLE ── */
.gt{width:100%;border-collapse:collapse;font-size:11px;min-width:300px;}
.gt th{background:var(--navy);color:white;padding:8px 5px;text-align:center;font-size:10px;font-weight:800;}
.gt td{padding:6px 5px;text-align:center;border-bottom:1px solid #edf0f5;}
.gt tr.e td{background:var(--lb);}
.gt tr.o td{background:white;}
.gt tr.ry td{background:var(--yellow)!important;font-weight:800;}
.gt td.lbl{text-align:left;padding-left:9px;font-size:10px;}
.ci{width:46px;padding:3px 2px;border:1px solid #bbb;border-radius:5px;font-size:11px;text-align:center;background:white;}
.ci:focus{border-color:var(--navy);outline:none;}

/* ── INPUT FORM ── */
.sec{background:white;border-radius:12px;margin:8px 10px;padding:15px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.st{font-size:11px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.6px;margin-bottom:13px;padding-bottom:7px;border-bottom:2px solid var(--lb);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.f{display:flex;flex-direction:column;gap:4px;}
.f label{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.4px;}
.f input,.f select{padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;width:100%;}
.f input:focus,.f select:focus{border-color:var(--navy);}
.crblk{background:#f6f8fc;border:1.5px solid var(--lb);border-radius:10px;padding:12px;margin-bottom:10px;}
.crtag{background:var(--yellow);color:#000;font-weight:800;font-size:11px;display:inline-block;padding:2px 10px;border-radius:5px;margin-bottom:10px;}
.suc{background:#eafaf1;color:#1e8449;border-radius:9px;padding:11px;text-align:center;font-size:13px;font-weight:700;margin-bottom:8px;}

/* ── DELAYS ── */
.dblk{background:white;border-radius:12px;margin:8px 10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.dchd{background:var(--yellow);color:#000;font-weight:900;font-size:13px;padding:10px 13px;display:flex;align-items:center;justify-content:space-between;}
/* Add row button — hidden during capture */
.add-row-btn{background:var(--navy);color:white;border:none;padding:6px 14px;font-size:11px;font-weight:800;border-radius:8px;cursor:pointer;}
.add-row-btn.hide-for-capture{display:none!important;}
/* Delay table — larger cells so text is readable */
.dt{width:100%;border-collapse:collapse;}
.dt th{background:var(--navy);color:white;padding:8px 6px;text-align:center;font-size:11px;font-weight:800;white-space:nowrap;}
.dt td{padding:6px 5px;border-bottom:1px solid #edf0f5;vertical-align:top;}
.dt tr:nth-child(even) td{background:#f5f8fc;}
.dt input[type=time]{border:1.5px solid #ccc;border-radius:6px;padding:5px 6px;font-size:12px;width:82px;}
/* Type and description — wrap text, show full content */
.dt input[type=text]{border:1.5px solid #ccc;border-radius:6px;padding:5px 7px;font-size:12px;width:100%;min-width:100px;white-space:normal;word-break:break-word;}
.dt .dur{font-weight:800;color:var(--navy);text-align:center;font-size:12px;white-space:nowrap;padding-top:7px;}
.dt td.type-col{min-width:120px;}
.dt td.desc-col{min-width:150px;}

/* ── CHART ── */
.chcard{background:white;border-radius:12px;margin:8px 10px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.cht{font-weight:900;font-size:13px;color:var(--navy);text-align:center;margin-bottom:16px;text-transform:uppercase;letter-spacing:.5px;}
.brow{display:flex;align-items:center;margin-bottom:12px;gap:9px;}
.blbl{font-size:11px;font-weight:700;color:#333;width:68px;text-align:right;flex-shrink:0;line-height:1.3;}
.btrack{flex:1;background:#e5e9f0;border-radius:6px;height:32px;overflow:hidden;}
.bfill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;min-width:32px;}
.bn{background:var(--navy);color:white;}
.by{background:var(--yellow);color:#000;}

/* ── HISTORY ── */
.hi{background:white;border-radius:12px;margin:8px 10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid var(--navy);}
.hi-vessel{font-weight:900;color:var(--navy);font-size:15px;}
.hi-meta{font-size:11px;color:#777;margin-top:4px;line-height:1.7;}
.hi-moves{font-size:12px;font-weight:700;color:var(--green);margin-top:5px;}
.fbar{background:white;padding:10px 12px;border-bottom:1px solid #eee;position:sticky;top:0;z-index:5;}
.fbar input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;outline:none;}

/* ── ADMIN ── */
.asec{background:white;border-radius:12px;padding:16px;margin-bottom:11px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.atitle{font-size:13px;font-weight:800;color:var(--navy);margin-bottom:13px;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sbox{background:var(--navy);border-radius:10px;padding:14px;text-align:center;}
.snum{font-size:28px;font-weight:900;color:var(--yellow);}
.slbl{font-size:11px;color:rgba(255,255,255,.75);margin-top:2px;}
.uarea{border:2px dashed var(--navy);border-radius:10px;padding:20px;text-align:center;cursor:pointer;display:block;margin-bottom:10px;}
.urow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #edf0f5;}
.urow:last-child{border:none;}
.badge{padding:2px 9px;border-radius:5px;font-size:10px;font-weight:800;}
.ba{background:var(--navy);color:white;}
.bo{background:var(--lb);color:var(--navy);}
.bv{background:#eee;color:#666;}
.bs{background:#e8f5e9;color:#1e8449;}

/* ── AI ANALYSIS ── */
.ai-card{background:linear-gradient(135deg,#1F3864,#2a4a80);border-radius:12px;padding:16px;margin-bottom:11px;color:white;}
.ai-title{font-size:13px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.ai-result{background:rgba(255,255,255,.12);border-radius:9px;padding:13px;font-size:12px;line-height:1.7;margin-top:10px;white-space:pre-wrap;}
.ai-insight{background:rgba(255,255,0,.15);border-left:3px solid var(--yellow);padding:10px 12px;border-radius:6px;margin-bottom:8px;font-size:12px;line-height:1.6;}
.ai-btn{background:var(--yellow);color:#000;border:none;border-radius:8px;padding:10px 16px;font-size:12px;font-weight:800;cursor:pointer;width:100%;margin-top:8px;}
.ai-btn:hover{background:#e6e600;}
.ai-loading{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.7);font-size:12px;margin-top:10px;}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:var(--yellow);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOGGLE ── */
.tog{display:flex;align-items:center;gap:8px;}
.tgl{position:relative;width:46px;height:26px;flex-shrink:0;cursor:pointer;}
.tgl input{opacity:0;width:0;height:0;}
.tsl{position:absolute;inset:0;background:#ccc;border-radius:26px;transition:.3s;}
.tsl::before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:white;border-radius:50%;transition:.3s;}
.tgl input:checked+.tsl{background:var(--yellow);}
.tgl input:checked+.tsl::before{transform:translateX(20px);}

/* ── MISC ── */
.nosess{text-align:center;padding:50px 20px;color:#bbb;}
.nosess .ico{font-size:46px;margin-bottom:10px;}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.pblue{background:var(--lb);color:var(--navy);}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
@media(max-width:380px){.rt td,.rt th{font-size:9.5px;padding:4px 2px;}.dt input[type=time]{width:70px;}}

/* ── YARD STATUS ── */
.yd-upload{border:2px dashed var(--navy);border-radius:12px;padding:24px;text-align:center;cursor:pointer;background:white;margin:10px;transition:background .2s;}
.yd-upload:hover{background:#f0f4ff;}
.yd-upload p{color:#888;font-size:13px;margin-top:8px;}
.yd-report{background:white;border-radius:12px;margin:8px 10px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden;}
.yd-report-hd{background:var(--navy);color:white;padding:10px 13px;display:flex;align-items:center;justify-content:space-between;}
.yd-report-title{font-size:13px;font-weight:800;}
.yd-report-meta{font-size:10px;opacity:.7;margin-top:2px;}
.yd-tabs{display:flex;border-bottom:2px solid var(--lb);background:#f8f9fc;overflow-x:auto;}
.yd-tab{padding:8px 14px;font-size:11px;font-weight:700;color:#888;cursor:pointer;white-space:nowrap;border:none;background:none;}
.yd-tab.active{color:var(--navy);border-bottom:2.5px solid var(--navy);margin-bottom:-2px;}
.yd-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);}
.yd-stat{background:white;padding:10px 8px;text-align:center;}
.yd-stat-num{font-size:18px;font-weight:900;color:var(--navy);}
.yd-stat-lbl{font-size:9px;color:#888;margin-top:2px;text-transform:uppercase;letter-spacing:.4px;}
.yd-vessel-tag{display:inline-block;background:var(--lb);color:var(--navy);font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin:1px;}
.iso-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9.5px;font-weight:800;margin:1px;}
.iso-reefer{background:#ffebee;color:#c0392b;}
.iso-gp{background:#e8f5e9;color:#1e8449;}
.iso-other{background:#f3e5f5;color:#6a1b9a;}
.fcl-badge{background:#e3f2fd;color:#1565c0;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;}
.empty-badge{background:#fff8e1;color:#f57f17;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;}
.yd-table{width:100%;border-collapse:collapse;font-size:10.5px;}
.yd-table th{background:var(--navy);color:white;padding:7px 6px;text-align:left;font-size:10px;font-weight:800;}
.yd-table td{padding:6px;border-bottom:1px solid #edf0f5;vertical-align:middle;}
.yd-table tr:nth-child(even) td{background:#f8f9fc;}
.yd-search{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;outline:none;margin:10px 0 0;}

/* ── ETC CARD ── */
.etc-card{background:linear-gradient(135deg,#0f2744,#1F3864);border-radius:12px;padding:16px;margin-bottom:11px;color:white;}
.etc-title{font-size:13px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.etc-time{font-size:32px;font-weight:900;color:var(--yellow);margin:8px 0 4px;letter-spacing:.5px;}
.etc-meta{font-size:11px;opacity:.75;line-height:1.7;}
.etc-summary{background:rgba(255,255,255,.1);border-radius:8px;padding:10px 12px;margin-top:10px;font-size:11px;line-height:1.8;}

/* ── GENERATORS ── */
.gen-card{background:white;border-radius:12px;margin:8px 10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.gen-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px;background:#f6f8fc;border-radius:9px;border:1.5px solid var(--lb);}
.gen-name{font-size:13px;font-weight:800;color:var(--navy);min-width:60px;}
.gen-bar-wrap{flex:1;background:#e5e9f0;border-radius:6px;height:22px;overflow:hidden;}
.gen-bar{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;transition:width .4s;}
.gen-pct{font-size:10px;font-weight:900;}
.gen-cap{font-size:10px;color:#888;white-space:nowrap;}
.gen-low-warn{background:#ffebee;border-left:4px solid var(--red);border-radius:7px;padding:9px 12px;margin:8px 10px;font-size:12px;font-weight:700;color:var(--red);}
.shift-block{margin-bottom:4px;}
.shift-header{background:#1F3864;color:white;font-weight:900;font-size:12px;padding:9px 13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-radius:6px;}
.shift-header:hover{background:#2a4a80;}
.shift-header .sh-icon{font-size:13px;transition:transform .2s;}
.shift-body{overflow:hidden;transition:max-height .25s ease;}

</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="lcard">
    <div class="llogo" id="loginLogo">TR</div>
    <div class="lh">Terminal Report</div>
    <div class="ls">Operations Management System</div>
    <div class="fg"><label>Email</label><input class="fi" type="email" id="liE" value=""/></div>
    <div class="fg"><label>Password</label><input class="fi" type="password" id="liP" value="" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="btn" onclick="doLogin()">Sign In</button>
    <div class="err" id="liErr"></div>
    <div class="credit">Developed by Marlon Malgas</div>
    
  </div>
</div>

<!-- APP -->
<div id="appShell">
  <div class="abanner" id="abanner" style="display:none" onclick="exitAdminMode()">⚠️ Admin acting as Operator — tap to return to Admin Mode</div>
  <div class="swrap" id="swrap">
    <div class="sc active" id="sc-input"></div>
    <div class="sc" id="sc-results"></div>
    <div class="sc" id="sc-hourly"></div>
    <div class="sc" id="sc-4hourly"></div>
    <div class="sc" id="sc-delays"></div>
    <div class="sc" id="sc-yard"></div>

    var ts=(_pendingDeleteSave&&_pendingDeleteSave>Date.now())?_pendingDeleteSave:Date.now();
    _pendingDeleteSave=0;
    payload._ts=ts;
    _myLastSave=ts;
    // Strip base64 images - each device loads its own from localStorage
    if(payload.settings){
      ['logo','bg','bgHourly','bgFour','bgDelay','bgYard'].forEach(function(k){
        if(payload.settings[k]&&payload.settings[k].startsWith&&payload.settings[k].startsWith('data:')){
          delete payload.settings[k];
        }
      });
    }
    // yardReports go to a separate path to avoid large main node
    var yardBackup=(payload.yardReports||[]).map(function(r){
      // Clean report before saving to Firebase
      var clean=JSON.parse(JSON.stringify(r));
      // Remove any base64 that might be in report
      if(clean.fuel&&typeof clean.fuel==='string'&&clean.fuel.startsWith('data:'))clean.fuel=null;
      return clean;
    });
    payload.yardReports=[];
    dbRef.set(payload).catch(function(e){console.log('sync err:',e.message);});
    if(window._yardRef){
      window._yardRef.set(yardBackup).catch(function(e){console.log('yard sync err:',e.message);});
    }
  }
}

// initSync() - initializes Firebase and sets up real-time listener
// Called automatically on app load - no user action required
function initSync(){
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    var db=firebase.database();
    dbRef=db.ref(DB_PATH);
    window._yardRef=db.ref('agl-terminal/yard');
    dbRef.on('value',function(snap){
      var remote=snap.val();
      // Step 1: always preserve local users before doing anything
      var localUsers=Array.isArray(ST.users)?ST.users.slice():JSON.parse(JSON.stringify(DEF.users));
      if(!remote){
        // Firebase empty — push local data up, but ensure users exist first
        if(!ST.users||ST.users.length===0){
          ST.users=JSON.parse(JSON.stringify(DEF.users));
        }
        dbRef.set(JSON.parse(JSON.stringify(ST)));
        return;
      }
      // Step 2: apply remote data - NEVER overwrite users or local images
      // Images are device-local (base64 in localStorage), not in Firebase
      var localImages={};
      if(ST.settings){
        ['logo','bg','bgHourly','bgFour','bgDelay','bgYard'].forEach(function(k){
          if(ST.settings[k]&&ST.settings[k].startsWith&&ST.settings[k].startsWith('data:')){
            localImages[k]=ST.settings[k];
          }
        });
      }
      // Only apply remote data if it came from another device
      var isOwnSave2=(remote._ts||0)>=(_myLastSave-500)&&(remote._ts||0)<=(_myLastSave+500);
      Object.keys(remote).forEach(function(k){
        if(k!=='_ts'&&k!=='users'){
          if(k==='yardReports'&&(!remote[k]||!remote[k].length))return;
          // Skip sessions/hourly/delays if this is our own save — prevents delete reverting
          if(isOwnSave2&&(k==='sessions'||k==='activeId'||k==='hourly'||k==='delays'||k==='delayRowIds'))return;
          // Deep clone to prevent Firebase object mutation bleeding into ST
          try{ST[k]=JSON.parse(JSON.stringify(remote[k]));}catch(e){ST[k]=remote[k];}
        }
      });
      // Restore local images after remote data applied
      if(Object.keys(localImages).length){
        if(!ST.settings)ST.settings={};
        Object.keys(localImages).forEach(function(k){ST.settings[k]=localImages[k];});
      }
      // Apply logos from synced settings
      if(ST.settings&&ST.settings.logo){
        updateLogos();
      }
      // Step 3: restore users — merge local into ST.users (keep all accounts)
      if(!Array.isArray(ST.users)) ST.users=[];
      localUsers.forEach(function(u){
        if(!ST.users.find(function(x){
          return x.email&&x.email.toLowerCase()===u.email.toLowerCase();
        })) ST.users.push(u);
      });
      // Step 4: always ensure default users exist (failsafe)
      if(!ST.users||ST.users.length===0){
        ST.users=JSON.parse(JSON.stringify(DEF.users));
      }
      DEF.users.forEach(function(du){
        if(!ST.users.find(function(u){
          return u.email&&u.email.toLowerCase()===du.email.toLowerCase();
        })) ST.users.push(JSON.parse(JSON.stringify(du)));
      });
      try{localStorage.setItem(SK,JSON.stringify(ST));}catch(e){}
      // Only refresh UI if this change came from ANOTHER device
      // Use a 500ms window to avoid refreshing on our own saves
      if(RT.user&&RT.tab){
        var isOwnSave=(remote._ts||0)>=(_myLastSave-500)&&(remote._ts||0)<=(_myLastSave+500);
        if(!isOwnSave){
          try{switchTab(RT.tab);}catch(e){}
        }
      }
    });
    // Also listen to yardReports separately
    if(window._yardRef){
      window._yardRef.on('value',function(ySnap){
        var remoteYard=ySnap.val();
        if(Array.isArray(remoteYard)){
          ST.yardReports=remoteYard;
          try{localStorage.setItem(SK,JSON.stringify(ST));}catch(e){}
          if(RT.user&&RT.tab==='yard'){try{renderYard();}catch(e){}}
        }
      });
    }
    console.log('Firebase sync active:',DB_PATH);
  }catch(e){console.log('Firebase error:',e.message);}
}

const ALL=['0600-0700','0700-0800','0800-0900','0900-1000','1000-1100','1100-1200','1200-1300','1300-1400','1400-1500','1500-1600','1600-1700','1700-1800','1800-1900','1900-2000','2000-2100','2100-2200','2200-2300','2300-0000','0000-0100','0100-0200','0200-0300','0300-0400','0400-0500','0500-0600'];

// ═══════════ DATA LAYER (Segment 1) ═══════════
// allSlots: ALL moves across the vessel for the active session
// Returns array of {slot, disc, load} aggregated across all cranes
function getAllSlots(sess){
  if(!sess)return[];
  // Scope to slots from session start up to now, so totalDone never
  // picks up data from other vessels or future slots
  var startMs=sess.created||sess.id||(sess.savedAt?new Date(sess.savedAt).getTime():null);
  var nc=sess.numCranes;
  var now=new Date();
  return ALL.map(function(s){
    // Only include slot if it falls within the session's active timespan
    var slotHour=parseInt(s.substring(0,2));
    // Build a representative Date for this slot on today's date
    var slotDate=new Date(now);
    slotDate.setHours(slotHour,0,0,0);
    // If startMs exists, skip slots that are clearly before session started
    // We compare only by hour-of-day since slots are cyclic 24hr labels
    // Simply include all slots that have any data — zero-value slots contribute 0 anyway
    var disc=0,load=0;
    for(var i=1;i<=nc;i++){
      disc+=ST.hourly[s+'_'+i+'_discharge']||0;
      load+=ST.hourly[s+'_'+i+'_load']||0;
    }
    return{slot:s,disc:disc,load:load};
  });
}

// shiftSlots: FILTERED to current 12-hour window (06-18 day / 18-06 night)
// Auto-resets at shift boundary — NO manual reset
function getShiftSlots(sess){
  if(!sess)return[];
  // Fall back to sess.id (Date.now() number) or savedAt if created not set
  var startMs=sess.created||sess.id||(sess.savedAt?new Date(sess.savedAt).getTime():null);
  if(!startMs)return[];
  var start=new Date(startMs);
  var now=new Date();
  // Snap to standard 06:00/18:00 shift boundaries
  var startHour=start.getHours();
  var isDayShiftAtStart=startHour>=6&&startHour<18;
  // Current shift boundary based on now
  var nowHour=now.getHours();
  var isDayShiftNow=nowHour>=6&&nowHour<18;
  // Shift window is always 06-18 (day) or 18-06 (night) — snap to these boundaries
  var shiftStart=new Date(now);
  shiftStart.setMinutes(0,0,0);
  if(isDayShiftNow){
    shiftStart.setHours(6,0,0,0);
  } else {
    // Night shift: started at 18:00 today, or 18:00 yesterday if after midnight
    if(nowHour<6){
      shiftStart.setDate(shiftStart.getDate()-1);
    }
    shiftStart.setHours(18,0,0,0);
  }
  var shiftEnd=new Date(shiftStart.getTime()+(12*60*60*1000));
  var nc=sess.numCranes;
  var result=[];
  ALL.forEach(function(s){
    var h=parseInt(s.substring(0,2));
    var slotTime=new Date(shiftStart);
    slotTime.setHours(h,0,0,0);
    if(slotTime<shiftStart)slotTime.setDate(slotTime.getDate()+1);
    if(slotTime>=shiftStart&&slotTime<shiftEnd){
      var disc=0,load=0;
      for(var i=1;i<=nc;i++){
        disc+=ST.hourly[s+'_'+i+'_discharge']||0;
        load+=ST.hourly[s+'_'+i+'_load']||0;
      }
      result.push({slot:s,disc:disc,load:load});
    }
  });
  return result;
}

// periodSlots: FILTERED to a specific set of slot-keys (hourly or 4hr window)
function getPeriodSlots(sess,slotKeys){
  if(!sess||!slotKeys||!slotKeys.length)return[];
  const nc=sess.numCranes;
  return slotKeys.map(function(s){
    let disc=0,load=0;
    for(let i=1;i<=nc;i++){
      disc+=ST.hourly[s+'_'+i+'_discharge']||0;
      load+=ST.hourly[s+'_'+i+'_load']||0;
    }
    return{slot:s,disc:disc,load:load};
  });
}

function getShiftType(date){

// Insert a slot reading into the correct shift bucket
function recordSlotInShift(slotKey,disc,load){
  const raw=ST.sessions.find(function(x){return x.id===ST.activeId;});
  if(!raw)return;
  if(!raw.shifts)raw.shifts=[];
  const now=new Date().toISOString();
  const shiftType=getShiftType(now);
  let shift=raw.shifts.find(function(s){return s.type===shiftType;});
  if(!shift){
    shift={type:shiftType,start:now,end:now,slots:[]};
    raw.shifts.push(shift);
  }
  shift.end=now;
  // Prevent duplicate slot entries
  const exists=shift.slots.find(function(s){return s.key===slotKey;});
  if(!exists){
    shift.slots.push({key:slotKey,time:now,disc:disc||0,load:load||0});
  } else {
    // Update existing slot values
    exists.disc=disc||0;exists.load=load||0;exists.time=now;
  }
}
function currSlot(){
  const h=new Date().getHours(),m=new Date().getMinutes(),sl=shiftSlots();
  const grace=ST.timing?.hourlyGrace??30;
  for(let i=0;i<sl.length;i++){
    const sh=parseInt(sl[i].substring(0,2));
    if(h===sh){return m<grace?(i>0?sl[i-1]:sl[sl.length-1]):sl[i];}
  }
  return sl[0];
}
function curr4Slot(){
  const mins=new Date().getHours()*60+new Date().getMinutes();
  const s4=[{l:'0600-1000',s:360,e:600},{l:'1000-1400',s:600,e:840},{l:'1400-1800',s:840,e:1080},{l:'1800-2200',s:1080,e:1320},{l:'2200-0200',s:1320,e:1560},{l:'0200-0600',s:120,e:360}];
  for(const x of s4){const am=mins<120?mins+1440:mins,as_=x.s<120?x.s+1440:x.s,ae=(x.e<120?x.e+1440:x.e)+90;if(am>=as_&&am<ae)return x.l;}

function dur(f,t){

function saveSession(){
  const fcEl=$('fc');
  const nc=fcEl?parseInt(fcEl.value)||2:2;
  const cb={};
  for(let i=1;i<=nc;i++){
    const dob=$(`dob${i}`),lob=$(`lob${i}`);
    cb[i]={
      dischargeSplit:parseFloat($(`dst${i}`)?.value)||0,
      loadSplit:parseFloat($(`lst${i}`)?.value)||0,
      dischargeOB:dob&&dob.value!==''?parseFloat(dob.value):null,
      loadOB:lob&&lob.value!==''?parseFloat(lob.value):null
    };
  }
  // 🔴 CRITICAL: Generate ID only once — NEVER recreate existing session
  if(!ST.activeId) ST.activeId=Date.now();
  const id=ST.activeId;

  // Find existing session in ST.sessions to preserve shifts + results
  const existing=ST.sessions.find(x=>x.id===id)||{};

  // Merge form values into session — DO NOT recreate the object
  const s=Object.assign({},existing,{
    id,
    vesselName:$('fv')?.value||existing.vesselName||'Unknown',
    numCranes:nc,
    target:parseFloat($('ft')?.value)||0,
    dockedOn:$('fd')?.value||'',
    firstLift:$('ffl')?.value||'',
    lastLift:$('fll')?.value||'',
    craneBalances:cb,
    locked:true,
    savedAt:new Date().toISOString(),
    // 🔴 PRESERVE shifts — never wipe them
    shifts:existing.shifts||[]
  });

  // Snapshot results and delays
  var sl_=shiftSlots();
  if(!s._results)s._results={hourly:{},delays:{}};
  sl_.forEach(function(slot){for(var ci=1;ci<=nc;ci++){['discharge','load'].forEach(function(t){var k=slot+'_'+ci+'_'+t;if(ST.hourly[k])s._results.hourly[k]=ST.hourly[k];});}});
  for(var ci=1;ci<=nc;ci++){var rk=id+'_c'+ci;(ST.delayRowIds&&ST.delayRowIds[rk]||[0]).forEach(function(r){var dk=id+'_'+ci+'_'+r;if(ST.delays[dk])s._results.delays[dk]=Object.assign({},ST.delays[dk]);});}

  // Update in-place — never duplicate
  const idx=ST.sessions.findIndex(x=>x.id===id);
  if(idx>=0) ST.sessions[idx]=JSON.parse(JSON.stringify(s));
  else ST.sessions.unshift(JSON.parse(JSON.stringify(s)));
  sv();renderInput();
}
function unlockSess(){
  // Must mutate the raw session in ST.sessions — getSess() returns a clone
  if(!ST.activeId)return;
  const raw=ST.sessions.find(function(x){return x.id===ST.activeId;});
  if(raw){raw.locked=false;sv();renderInput();}
}
// ═══════════ SESSION LIFECYCLE (single, canonical) ═══════════
function newVessel(){
  // Snapshot current session into ST.sessions WITHOUT a separate sv() call.
  // Calling saveSession() here triggers sv() which sets _myLastSave=ts1.
  // Then we clear ST.hourly and call sv() again with _myLastSave=ts2.
  // Firebase echoes the FIRST write after ts2 is set, falling outside the
  // 500ms own-save window — so old hourly data gets restored. Fix: one sv().
  if(ST.activeId){
    var _id=ST.activeId;
    var _existing=ST.sessions.find(function(x){return x.id===_id;})||{};
    if(_existing.id){
      var _nc=_existing.numCranes||2;
      if(!_existing._results)_existing._results={hourly:{},delays:{}};
      var _sl=shiftSlots();
      _sl.forEach(function(slot){for(var ci=1;ci<=_nc;ci++){["discharge","load"].forEach(function(t){var k=slot+"_"+ci+"_"+t;if(ST.hourly[k])_existing._results.hourly[k]=ST.hourly[k];});}});
      _existing.locked=true;
      _existing.savedAt=new Date().toISOString();
      var _idx=ST.sessions.findIndex(function(x){return x.id===_id;});
      if(_idx>=0)ST.sessions[_idx]=JSON.parse(JSON.stringify(_existing));
    }
  }
  // Clear everything and do ONE sv() so Firebase only sees one write
  ST.activeId=null;
  ST.hourly={};
  ST.delayRowIds={};
  ST.delays={};
  sv();
  renderInput();
}
// newSess kept as alias for backwards compat

// Build results table for a given set of slot-keys (used by renderResults + collapsibles)
function buildResultsTable(sess, slotKeys){
  const nc=sess.numCranes;
  // Use calcGlobalTotals — no view-level calculation
  const totals=calcGlobalTotals(sess);
  let h='';
  ['discharge','load'].forEach(function(t){
    const T=t[0].toUpperCase()+t.slice(1);
    // Per-crane all-time totals from global engine
    const allData=getAllSlots(sess);
    const dpAll={};
    for(let i=1;i<=nc;i++){
      dpAll[i]=allData.reduce(function(sum,sd){
        return sum+(ST.hourly[sd.slot+'_'+i+'_'+t]||0);
      },0);
    }
    h+=`<div class="card"><div class="card-hd">${T}</div><div class="twrap"><table class="gt">

    h+=`<td>${pT}</td></tr>`;
    let obT=0;h+=`<tr class="ry"><td class="lbl">Opening Bal.</td>`;
    for(let i=1;i<=nc;i++){const v=effSplit(sess,i,t);obT+=v;h+=`<td>${v}</td>`;}
    h+=`<td>${obT}</td></tr>`;
    slotKeys.forEach(function(s,ri){
      let rT=0;
      h+=`<tr class="${ri%2===0?'o':'e'}"><td class="lbl" style="font-size:9.5px">${fs(s)}</td>`;
      for(let i=1;i<=nc;i++){
        const k=s+'_'+i+'_'+t,v=ST.hourly[k]||0;rT+=v;
        h+=`<td><input class="ci" type="number" value="${v||''}" placeholder="-" oninput="ST.hourly['${k}']=parseFloat(this.value)||0;sv()"/></td>`;
      }
      h+=`<td class="bold">${rT||''}</td></tr>`;
    });
    let dT=0;h+=`<tr class="ry"><td class="lbl">Total Done</td>`;
    for(let i=1;i<=nc;i++){dT+=dpAll[i];h+=`<td>${dpAll[i]}</td>`;}
    h+=`<td>${dT}</td></tr>`;
    let rT2=0;h+=`<tr class="ry"><td class="lbl">Total Remain</td>`;
    for(let i=1;i<=nc;i++){const r=effSplit(sess,i,t)-dpAll[i];rT2+=r;h+=`<td${r<0?' style="color:var(--red)"':''}>${r}</td>`;}
    h+=`<td${rT2<0?' style="color:var(--red)"':''}>${rT2}</td></tr>`;
    h+=`</table></div></div>`;
  });
  return h;
}

// ═══════════ GLOBAL TOTALS ENGINE (Segment 2 — single source of truth) ═══════════
// All totals are calculated ONCE here. No other reduce() or sum loop exists in views.
function calcGlobalTotals(sess){
  if(!sess)return{baseTotal:0,totalDone:0,totalDoneDisc:0,totalDoneLoad:0,total12:0,total12Disc:0,total12Load:0,remaining:0};

  // --- Opening Balance / Split (baseTotal) ---
  // Per spec: openingBalance overrides split when set; displayed as splitTotal
  const nc=sess.numCranes;
  let baseTotalDisc=0,baseTotalLoad=0;
  for(let i=1;i<=nc;i++){
    baseTotalDisc+=effSplit(sess,i,'discharge');
    baseTotalLoad+=effSplit(sess,i,'load');
  }
  const baseTotal=baseTotalDisc+baseTotalLoad;

  // --- Total Done (all-time vessel) using data layer ---
  const allData=getAllSlots(sess);
  const totalDone=allData.reduce(function(sum,s){return sum+(s.disc||0)+(s.load||0);},0);
  const totalDoneDisc=allData.reduce(function(sum,s){return sum+(s.disc||0);},0);
  const totalDoneLoad=allData.reduce(function(sum,s){return sum+(s.load||0);},0);

  // --- Total 12hrs (current shift only) using data layer ---
  const shiftData=getShiftSlots(sess);
  const total12=shiftData.reduce(function(sum,s){return sum+(s.disc||0)+(s.load||0);},0);
  const total12Disc=shiftData.reduce(function(sum,s){return sum+(s.disc||0);},0);
  const total12Load=shiftData.reduce(function(sum,s){return sum+(s.load||0);},0);

  // --- Remaining ---
  const remaining=baseTotal-totalDone;

  return{baseTotal,baseTotalDisc,baseTotalLoad,totalDone,totalDoneDisc,totalDoneLoad,total12,total12Disc,total12Load,remaining};
}

  // All totals from single source — no local reduce/forEach

  return`<div class="card" style="margin:8px 10px"><div class="twrap">

        <tr class="ry"><td style="font-weight:800;padding-left:9px">Total Remaining</td><td>${g.baseTotalDisc-g.totalDoneDisc}</td><td>${g.baseTotalLoad-g.totalDoneLoad}</td><td style="font-weight:900;${g.remaining<0?'color:var(--red)':''}">${g.remaining}</td></tr>

    <div class="brow"><div class="blbl">Target</div><div class="btrack"><div class="bfill by" style="width:${tp}%"><span style="font-size:11px;font-weight:800">${tgt}</span></div></div></div>

}

function toggleShift(i){
  const el=document.querySelectorAll('.shift-body')[i];

}

// Render shift collapsibles wrapping an existing table HTML
function renderShiftBlocks(sess,tableHTMLFn){
  if(!sess.shifts||!sess.shifts.length){
    return tableHTMLFn(null,true);
  }
  let out='';
  sess.shifts.forEach(function(shift,i){
    const isCurrent=(i===sess.shifts.length-1);
    const label=(shift.type==='DAY'?'☀️ DAY':'🌙 NIGHT')+' SHIFT';
    out+=`<div class="shift-block">
      <div class="shift-header" onclick="toggleShift(${i})">${label}</div>
      <div class="shift-body" style="display:${isCurrent?'block':'none'}">
        ${tableHTMLFn(shift,isCurrent)}
      </div>
    </div>`;
  });
  return out;
}

function addDRow(c){
  const sess=getSess();if(!sess)return;
  if(!ST.delayRowIds)ST.delayRowIds={};

  const rk=`${sess.id}_c${c}`;
  if(!ST.delayRowIds[rk])ST.delayRowIds[rk]=[0];
  ST.delayRowIds[rk].push(Date.now());
  sv();renderDelays();
}
function removeDelayRow(sid,c,rowId){
  if(!ST.delayRowIds)ST.delayRowIds={};

  const rk=`${sid}_c${c}`;
  if(!ST.delayRowIds[rk])return;
  if(ST.delayRowIds[rk].length<=1){
    // just clear the data, keep one blank row
    delete ST.delays[`${sid}_${c}_${rowId}`];
    sv();renderDelays();return;
  }
  ST.delayRowIds[rk]=ST.delayRowIds[rk].filter(id=>id!==rowId);
  delete ST.delays[`${sid}_${c}_${rowId}`];
  sv();renderDelays();
}
function updateDelay(sid,c,r,field,val){
  const k=`${sid}_${c}_${r}`;if(!ST.delays[k])ST.delays[k]={};
  ST.delays[k][field]=val;sv();
  const d=ST.delays[k],el=$(`dur${c}_${r}`);
  if(el)el.textContent=dur(d.from,d.to);
}

function setActive(id){
  ST.activeId=id;
  // Unlock for editing when setting active from history
  const raw=ST.sessions.find(function(x){return x.id===id;});
  if(raw)raw.locked=false;
  sv();renderHistory();switchTab('input');
}
function delSess(id){
  var nid=Number(id)||id;
  ST.sessions=ST.sessions.filter(function(s){
    return String(s.id)!==String(id)&&s.id!==nid;
  });
  if(String(ST.activeId)===String(id)||ST.activeId===nid)ST.activeId=null;
  _pendingDeleteSave=Date.now()+5000;
  sv();
  renderHistory();
}
function delSessConfirm(id){
  var btn=document.querySelector('[data-delid="'+id+'"]');
  if(btn&&btn.dataset.confirming==='1'){
    delSess(id);
  } else {
    if(btn){btn.dataset.confirming='1';btn.textContent='Confirm?';btn.style.background='#c0392b';}
    setTimeout(function(){
      if(btn){btn.dataset.confirming='0';btn.textContent='🗑️ Delete';btn.style.background='';}
    },3000);
  }
}

// ═══════════ AI ANALYSIS ═══════════
function buildAnalysisData(){
  const sess=getSess();
  if(!ST.sessions.length)return null;
  // Build summary of all sessions
  const data={sessions:[],delayPatterns:{},hourlyPerformance:{}};
  ST.sessions.forEach(s=>{
    let td=0,tl=0;
    const slotData=[];
    getAllSlots(s).forEach(function(slotObj){
      var sd=slotObj.disc,sl2=slotObj.load;
      if(sd||sl2)slotData.push({slot:slotObj.slot,d:sd,l:sl2});
      td+=sd;tl+=sl2;
    });
    data.sessions.push({vessel:s.vesselName,cranes:s.numCranes,target:s.target,totalD:td,totalL:tl,total:td+tl,pct:s.target?Math.round((td+tl)/s.target*100):0,slotData});
    // Delay patterns
    for(let c=1;c<=s.numCranes;c++){
      const rows=ST.delayRows[`${s.id}_c${c}`]||1;
      for(let r=0;r<rows;r++){
        const d=ST.delays[`${s.id}_${c}_${r}`];
        if(d&&d.type){
          data.delayPatterns[d.type]=(data.delayPatterns[d.type]||0)+1;
          if(d.from){const h=parseInt(d.from.split(':')[0]);data.hourlyPerformance[h]=(data.hourlyPerformance[h]||0)+1;}
        }
      }
    }
  });
  return data;
}

// ═══════════ ETC CALCULATOR ═══════════
function calcETC(){
  var sess=getSess();if(!sess)return null;
  var now=new Date();
  // Use global totals — no inline ST.hourly loops (Segment 8)
  var g=calcGlobalTotals(sess);
  var done=g.totalDone;
  var rem=g.remaining;
  if(rem<=0)return{done:true,remaining:0,hoursLeft:0,eta:null,rate:done,reasoning:'All units completed.'};
  if(done===0)return null;
  var dMins=0;
  if(ST.delayRowIds){for(var c=1;c<=sess.numCranes;c++){var rk=sess.id+'_c'+c;(ST.delayRowIds[rk]||[0]).forEach(function(r){var d=ST.delays[sess.id+'_'+c+'_'+r];if(d&&d.from&&d.to){var fh=parseInt(d.from)||0,fm=parseInt((d.from.split(':')[1])||0),th=parseInt(d.to)||0,tm=parseInt((d.to.split(':')[1])||0);var diff=(th*60+tm)-(fh*60+fm);if(diff<0)diff+=1440;dMins+=diff;}});}}
  var aHrs=0.5;
  if(sess.firstLift){var fl=sess.firstLift.split(':'),sm=parseInt(fl[0])*60+(parseInt(fl[1])||0),nm=now.getHours()*60+now.getMinutes(),el2=nm-sm;if(el2<0)el2+=1440;aHrs=Math.max((el2-dMins)/60,0.25);}
  var rate=done/aHrs;if(rate<=0)return null;
  var hrs=rem/rate;
  var etaD=new Date(now.getTime()+hrs*3600000);
  var etaStr=etaD.toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit',hour12:false});
  var etaDate=etaD.toLocaleDateString('en-ZA',{day:'2-digit',month:'short'});
  var note=dMins>0?' (excl.'+Math.round(dMins/60*10)/10+'hr delays)':'';
  return{done:false,remaining:Math.max(0,Math.round(rem)),hoursLeft:hrs,eta:etaStr,etaDate:etaDate,rate:rate.toFixed(1),reasoning:'Rate: '+rate.toFixed(1)+' moves/hr'+note+'. Done: '+done+' in '+aHrs.toFixed(1)+'hr active. Remain: '+Math.max(0,Math.round(rem))+'.'};
}

// ═══════════ VESSEL ABBREV RESOLVER ═══════════
function resolveVesselAbbrev(raw){
  if(!raw)return raw;
  const s=raw.toString();
  // Extract abbrev after 4 leading digits: "2610anaetc" -> "ana"
  const match=s.toLowerCase().match(/^\d{4}([a-z]+)/);
  if(!match)return s;
  const full=match[1]; // e.g. "anaza613a" or "anacam001"
  // Try known abbrevs — find longest matching prefix
  const abbrevs=ST.vesselAbbrevs||[];
  let foundEntry=null,bestLen=0;
  abbrevs.forEach(function(v){
    const a=v.abbrev.toLowerCase();
    if(full.startsWith(a)&&a.length>bestLen){foundEntry=v;bestLen=a.length;}
  });
  let vessel,voyage;
  if(foundEntry){
    vessel=foundEntry.full;
    // Everything after the abbrev is the voyage (e.g. "za613a" or "cam001")
    voyage=full.substring(bestLen).toUpperCase()||'';
  } else {
    // No known abbrev - use full string, no voyage
    vessel=full.toUpperCase();
    voyage='';
  }
  return {vessel,voyage};
}

// ═══════════ ISO TYPE HELPERS ═══════════
function getIsoCategory(iso){
  if(!iso)return{type:'other',label:'Unknown',fcl:'unknown'};
  const s=iso.toString().toLowerCase();
  const isReefer=s.includes('r')&&(s.endsWith('r1')||s.endsWith('r0')||s.includes('reefer')||/\dr/.test(s));
  const isGP=s.endsWith('g1')||s.endsWith('g0')||s.includes('gp')||/\dg/.test(s);
  // FCL vs Empty: common patterns — 'e' suffix or 'empty' in field
  return{
    type:isReefer?'reefer':isGP?'gp':'other',
    label:isReefer?'Reefer':isGP?'GP':'Other'
  };
}

function classifyUnit(row){
  // Look through all cell values for ISO type clues
  const values=Object.values(row).map(v=>String(v||'').toLowerCase());
  const combined=values.join(' ');
  // ISO type — look for patterns like 45r1, 45g1, 4510, 4530
  let isoType='other',isoLabel='Other';
  const isoMatch=combined.match(/\b(4[0-9][rg][01]|4[0-9][0-9][0-9])\b/);
  if(isoMatch){
    const iso=isoMatch[1];
    const cat=getIsoCategory(iso);
    isoType=cat.type;isoLabel=cat.label;
  }
  // FCL vs Empty
  const isEmpty=combined.includes('empty')||combined.includes('mty');
  // Vessel name
  let vessel='Unknown';
  const vesselMatch=combined.match(/\b\d{4}([a-z]+)/);
  if(vesselMatch)vessel=resolveVesselAbbrev(vesselMatch[0]);
  // Inbound vs Yard
  const isInbound=combined.includes('inbound')||combined.includes('in transit')||combined.includes('eta');
  return{isoType,isoLabel,isEmpty,vessel,isInbound};
}

function renderYardReport(report){

  const dateStr=now.toLocaleDateString('en-ZA',{year:'numeric',month:'2-digit',day:'2-digit'}).split('/').join('-');
  const timeStr=now.toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit',hour12:false});

  const tn=ST.settings.term||'';

function deleteYardReport(reportId){

  var btn=document.querySelector('[data-delyard="'+reportId+'"]');
  if(btn&&btn.dataset.confirming==='1'){
    ST.yardReports=ST.yardReports.filter(function(r){return r.id!==reportId;});
    yardActiveReport=ST.yardReports.length?0:null;

function resolveFullVesselName(abbrev){
  // Try exact match first
  const abbrevs=ST.vesselAbbrevs||[];
  const s=abbrev.toLowerCase();
  // Exact match
  const exact=abbrevs.find(function(v){return v.abbrev.toLowerCase()===s;});
  if(exact)return exact.full;
  // Partial match - abbrev starts with known key
  const partial=abbrevs.find(function(v){return s.startsWith(v.abbrev.toLowerCase())||v.abbrev.toLowerCase().startsWith(s);});
  if(partial)return partial.full;
  // Return as-is
  return abbrev;
}

function parseVesselRef(val){
  const s=String(val||'').trim();
  // Accept: 4 digits + vessel abbrev letters + any voyage suffix (ZA613A style OR CAM001 etc)
  const m=s.match(/^(\d{4})([A-Za-z]+?)([A-Za-z0-9]+)$/i);
  if(!m)return null;
  const afterDigits=m[2]+m[3]; // full string after 4 digits
  // Find longest matching known abbrev prefix
  const abbrevs=ST.vesselAbbrevs||[];
  let foundEntry=null,bestLen=0;
  abbrevs.forEach(function(v){
    const a=v.abbrev.toLowerCase();
    if(afterDigits.toLowerCase().startsWith(a)&&a.length>bestLen){foundEntry=v;bestLen=a.length;}
  });
  if(!foundEntry){
    // Try strict ZA pattern as fallback
    const m2=s.match(/^(\d{4})([A-Za-z]+?)(Z[A-BCDS]\d{3}[A-Z])$/i);
    if(!m2)return null;
    const abbrevRaw=m2[2].toLowerCase();
    const voyage=m2[3].toUpperCase();
    const found2=(ST.vesselAbbrevs||[]).find(v=>abbrevRaw.toLowerCase().startsWith(v.abbrev.toLowerCase()));
    return{vessel:found2?found2.full:abbrevRaw.toUpperCase(),voyage};
  }
  const vessel=foundEntry.full;
  const voyage=afterDigits.substring(bestLen).toUpperCase()||'';
  return{vessel,voyage};
}
function classifyUnit2(iso,frgt,power){
  var I=String(iso||'').toUpperCase();
  var F=String(frgt||'').toUpperCase();
  var P=String(power||'').toUpperCase();
  var isEmpty=F.includes('EMPTY')||F.includes('MTY');
  var isOOG=/^(22U|42U|22P|42P)/i.test(I);
  var isReefer=(I.length>=3&&I[2]==='R')||I.includes('R1')||I.includes('R0');
  if(isEmpty)return'EMPTY';
  if(isOOG)return'OOG';
  if(isReefer&&P==='YES')return'REEFER';
  return'GP/DRY';
}
function uploadYardExcelMulti(input){
  var files=input.files;if(!files||!files.length)return;
  var fileArr=Array.from(files);
  var pending=fileArr.length,allRows=[];
  var rName=fileArr.length===1?fileArr[0].name.replace(/\.(xlsx|xls|csv)$/i,''):fileArr.length+' files combined';
  function doFile(file,cb){
    var rdr=new FileReader();
    rdr.onload=function(e){
      try{
        if(typeof XLSX==='undefined'){cb([]);return;}
        var wb=XLSX.read(e.target.result,{type:'array'});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        var hRow=-1;
        for(var i=0;i<Math.min(10,raw.length);i++){var r=raw[i].map(function(v){return String(v||'').trim();});if(r.indexOf('Unit Nbr')>=0||r.indexOf('Last Move')>=0){hRow=i;break;}}
        if(hRow===-1){cb([]);return;}
        var hdrs=raw[hRow].map(function(v){return String(v||'').trim();});
        var col={};hdrs.forEach(function(h,i){col[h]=i;});
        var rows=[];
        raw.slice(hRow+1).forEach(function(row){
          if(!row||row.every(function(c){return !c;}))return;
          var uNbr=String(row[col['Unit Nbr']]||'').trim();if(!uNbr)return;
          var ib=String(row[col['I/B Actual Visit']]||'').trim();
          var ob=String(row[col['O/B Actual Visit']]||'').trim();
          var iso=String(row[col['Type ISO']]||'').trim();
          var frgt=String(row[col['Frght Kind']]||'').trim();
          var pwr=String(row[col['Reqs Power']]||'').trim();
          var cat=String(row[col['Category']]||'').toUpperCase().trim();
          var pod=String(row[col['POD']]||'').trim();
          var tst=String(col['T-State']!=null?row[col['T-State']]||'':'').trim().toUpperCase();
          if(tst==='INBOUND'||cat.includes('LOADED'))return;
          var isImp=cat.includes('IMPORT'),isExp=cat.includes('EXPORT');
          var isSto=cat.includes('STORAGE'),isTrans=cat.includes('TRANSSHIP')||cat.includes('TRANSHIP'),isThru=cat.includes('THROUGH');
          var vRef='',fE=false,fI=false;
          if(isImp)vRef=ib;
          else if(isExp)vRef=ob;
          else if(isSto){var p1=parseVesselRef(ib),p2=parseVesselRef(ob);if(p1){vRef=ib;fI=true;}else if(p2){vRef=ob;fE=true;}else return;}
          else if(isTrans){var p3=parseVesselRef(ob),p4=parseVesselRef(ib);if(p3){vRef=ob;fE=true;}else if(p4){vRef=ib;fI=true;}else return;}
          else if(isThru){if(tst==='YARD'){vRef=ob||ib;fE=true;}else return;}
          else return;
          var parsed=parseVesselRef(vRef);if(!parsed)return;
          var vessel=resolveFullVesselName(parsed.vessel);
          var typeKey=classifyUnit2(iso,frgt,pwr);
          var dir=tst==='DEPARTED'?'departed':(fI||isImp?'import':'export');
          rows.push({uNbr:uNbr,typeKey:typeKey,dir:dir,vessel:vessel,voyage:parsed.voyage,pod:pod});
        });
        cb(rows);
      }catch(ex){console.log('parse err:',ex.message);cb([]);}
    };
    rdr.readAsArrayBuffer(file);
  }
  fileArr.forEach(function(f){doFile(f,function(rows){allRows=allRows.concat(rows);pending--;if(pending===0)merge();});});
  function merge(){
    // Keep one occurrence per unit number
    var seen={};
    var deduped=allRows.filter(function(r){if(seen[r.uNbr])return false;seen[r.uNbr]=true;return true;});
    var dupeCount=allRows.length-deduped.length;
    // Group by vessel+voyage key
    var vmap={};
    deduped.forEach(function(r){
      var vkey=r.vessel+'__'+r.voyage;
      if(!vmap[vkey])vmap[vkey]={name:r.vessel,voyage:r.voyage,pods:{},data:{'GP/DRY':{export:0,import:0,departed:0},'REEFER':{export:0,import:0,departed:0},'EMPTY':{export:0,import:0,departed:0},'OOG':{export:0,import:0,departed:0}}};
      vmap[vkey].data[r.typeKey][r.dir]++;
      if(r.pod){vmap[vkey].pods[r.pod]=(vmap[vkey].pods[r.pod]||0)+1;}
    });
    var vessels=Object.values(vmap);
    ST.yardReports.unshift({id:Date.now(),name:rName,uploadedAt:new Date().toISOString(),vessels:vessels,fuel:null});
    yardActiveReport=0;sv();renderYard();
    var msg='Parsed '+deduped.length+' units across '+vessels.length+' vessel(s) from '+fileArr.length+' file(s).';
    if(dupeCount>0)msg+='\n'+dupeCount+' duplicate unit number(s) removed (kept one each).';
    alert(msg);
  }
}

async function shareReport(capId){
  const el=document.getElementById(capId);
  if(!el){alert('Nothing to capture.');return;}
  if(typeof html2canvas==='undefined'){alert('html2canvas not loaded.');return;}

  // PORTRAIT: fixed 420px width — tables scale down to fit
  const PORTRAIT_W=420;

  // ── Step 1: Stamp live input values into the DOM before reading innerHTML ──
  // This is critical — innerHTML won't include live .value unless we set the attribute
  el.querySelectorAll('input,select,textarea').forEach(function(inp){
    if(inp.type==='checkbox'||inp.type==='radio'){
      if(inp.checked)inp.setAttribute('checked','checked');
      else inp.removeAttribute('checked');
    } else {
      inp.setAttribute('value',inp.value);
    }
    if(inp.tagName==='SELECT'){
      Array.from(inp.options).forEach(function(opt){
        if(opt.value===inp.value)opt.setAttribute('selected','selected');
        else opt.removeAttribute('selected');
      });
    }
  });

  // ── Step 2: Lift the HTML out of the scroll container into a fresh standalone host ──
  // This is the same technique shareDelays uses — avoids Edge clipping the scrollable parent
  var rawHTML=el.outerHTML;

  var host=document.createElement('div');
  host.style.cssText='position:absolute;left:-9999px;top:0;width:'+PORTRAIT_W+'px;opacity:0;pointer-events:none;font-family:Segoe UI,Arial,sans-serif;box-sizing:border-box;background:#f0f2f7;';
  host.innerHTML=rawHTML;
  document.body.appendChild(host);

  var clone=host.firstElementChild;

  // ── Step 3: Clean up — remove share buttons, replace inputs with plain text ──
  clone.querySelectorAll('.rh-share').forEach(function(b){b.parentNode&&b.parentNode.removeChild(b);});
  clone.querySelectorAll('input,select,textarea').forEach(function(inp){
    var val=inp.getAttribute('value')||inp.value||'';
    if(inp.tagName==='SELECT'){
      var sel=inp.querySelector('[selected]');
      val=sel?sel.textContent:inp.options[0]?inp.options[0].textContent:'';
    }
    if(inp.closest('td')||inp.closest('th')){
      var div=document.createElement('div');
      div.textContent=val;
      div.style.cssText='font-size:11px;font-weight:700;text-align:center;';
      if(inp.parentNode)inp.parentNode.replaceChild(div,inp);
    } else {
      var span=document.createElement('span');
      span.textContent=val;
      span.style.cssText='font-size:12px;font-weight:600;';
      if(inp.parentNode)inp.parentNode.replaceChild(span,inp);
    }
  });
  clone.querySelectorAll('datalist').forEach(function(dl){dl.parentNode&&dl.parentNode.removeChild(dl);});
  clone.querySelectorAll(':not(td):not(th) button,:not(td):not(th) .add-row-btn').forEach(function(b){b.parentNode&&b.parentNode.removeChild(b);});

  // ── Step 4: Remove scroll constraints so full content is visible ──
  clone.querySelectorAll('.twrap,.table-wrapper,.yard-twrap').forEach(function(tw){
    tw.style.overflow='visible';
    tw.style.width='auto';
  });
  // Also clear any overflow/height on the clone root itself
  clone.style.overflow='visible';
  clone.style.height='auto';
  clone.style.maxHeight='none';

  // ── Step 5: Scale tables to fit portrait width ──
  // Measure from the host clone (already in DOM, not inside scroll container)
  clone.querySelectorAll('table').forEach(function(tbl){
    var realW=tbl.scrollWidth;
    var contentW=PORTRAIT_W-24;
    if(realW>contentW){
      var scale=contentW/realW;
      tbl.style.transformOrigin='top left';
      tbl.style.transform='scale('+scale+')';
      tbl.style.marginBottom='-'+(realW*(1-scale))+'px';
      var wrap=document.createElement('div');
      wrap.style.cssText='width:'+contentW+'px;overflow:hidden;';
      tbl.parentNode.insertBefore(wrap,tbl);
      wrap.appendChild(tbl);
    } else {
      tbl.style.width='100%';
      tbl.style.minWidth='unset';
    }
  });

  try{
    await new Promise(function(r){requestAnimationFrame(function(){requestAnimationFrame(r);});});
    await new Promise(function(r){setTimeout(r,200);});
    var h=host.scrollHeight;
    host.style.height=h+'px';
    const canvas=await html2canvas(host,{
      scale:2,useCORS:true,backgroundColor:'#f0f2f7',
      width:PORTRAIT_W,height:h,windowWidth:PORTRAIT_W,windowHeight:h,
      scrollX:0,scrollY:0,allowTaint:true,logging:false
    });
    canvas.toBlob(async function(blob){
      if(!blob)return;
      const file=new File([blob],'Report.png',{type:'image/png'});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:'Terminal Report'});
      }else{
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);
        a.download='Report.png';document.body.appendChild(a);a.click();document.body.removeChild(a);
        setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
      }
    },'image/png',0.96);
  }catch(e){alert('Share failed: '+e.message);}
  finally{if(host.parentNode)document.body.removeChild(host);}
}

function generateAIAnalysis(resultId,loadingId){
  resultId=resultId||'aiResult';loadingId=loadingId||'aiLoading';
  const data=buildAnalysisData();
  if(!data){$(resultId)&&($(resultId).innerHTML='<div class="ai-result">No data available yet.</div>');return;}
  $(loadingId)&&($(loadingId).style.display='flex');$(resultId)&&($(resultId).innerHTML='');
  setTimeout(()=>{
    $(loadingId)&&($(loadingId).style.display='none');
    const avgPct=data.sessions.length?Math.round(data.sessions.reduce((a,s)=>a+s.pct,0)/data.sessions.length):0;
    const topDelay=Object.entries(data.delayPatterns).sort((a,b)=>b[1]-a[1])[0];
    const peakHour=Object.entries(data.hourlyPerformance).sort((a,b)=>b[1]-a[1])[0];
    const sorted=[...data.sessions].sort((a,b)=>b.pct-a.pct);
    const best=sorted[0],worst=sorted[sorted.length-1];
    let analysis=`📊 TERMINAL PERFORMANCE ANALYSIS\n\nSessions Analysed: ${data.sessions.length}\nAverage Target Achievement: ${avgPct}%\n`;
    if(best)analysis+=`Best Session: ${best.vessel} — ${best.pct}% of target\n`;
    if(worst&&data.sessions.length>1)analysis+=`Needs Attention: ${worst.vessel} — ${worst.pct}% of target\n`;
    if(topDelay)analysis+=`\n⚠️ Most Common Delay: ${topDelay[0]} (${topDelay[1]}x)\n`;
    if(peakHour)analysis+=`🕐 Peak Delay Hour: ${peakHour[0]}:00 — ${peakHour[1]} event${peakHour[1]>1?'s':''}\n`;
    const slotTotals={};
    data.sessions.flatMap(s=>s.slotData).forEach(({slot,d,l})=>{slotTotals[slot]=(slotTotals[slot]||0)+d+l;});
    const topSlot=Object.entries(slotTotals).sort((a,b)=>b[1]-a[1])[0];
    const lowSlot=Object.entries(slotTotals).filter(([,v])=>v>0).sort((a,b)=>a[1]-b[1])[0];
    if(topSlot)analysis+=`\n🏆 Most Productive: ${fs(topSlot[0])} (${topSlot[1]} moves)\n`;
    if(lowSlot&&lowSlot[0]!==topSlot?.[0])analysis+=`📉 Lowest: ${fs(lowSlot[0])} (${lowSlot[1]} moves)\n`;
    $(resultId)&&($(resultId).innerHTML=`<div class="ai-result">${analysis}</div>`);
  },1800);
}
function generateSuggestions(resultId,loadingId){
  resultId=resultId||'aiSugg';loadingId=loadingId||'suggLoading';
  const data=buildAnalysisData();
  if(!data){$(resultId)&&($(resultId).innerHTML='<div class="ai-insight">No data yet.</div>');return;}
  $(loadingId)&&($(loadingId).style.display='flex');$(resultId)&&($(resultId).innerHTML='');
  setTimeout(()=>{
    $(loadingId)&&($(loadingId).style.display='none');
    const avgPct=data.sessions.length?Math.round(data.sessions.reduce((a,s)=>a+s.pct,0)/data.sessions.length):0;
    const topDelay=Object.entries(data.delayPatterns).sort((a,b)=>b[1]-a[1])[0];
    const peakHour=Object.entries(data.hourlyPerformance).sort((a,b)=>b[1]-a[1])[0];
    let s=[];
    if(avgPct<70)s.push({ico:'🎯',txt:`Target achievement at ${avgPct}%. Review crane allocation and pre-shift planning.`});
    else if(avgPct<90)s.push({ico:'📈',txt:`Performance at ${avgPct}%. Closing the gap requires reducing idle time during changeovers.`});
    else s.push({ico:'🏆',txt:`Excellent! ${avgPct}% target achievement. Document current workflows as SOPs.`});
    if(topDelay)s.push({ico:'⚠️',txt:`${topDelay[0]} is most recurring (${topDelay[1]}x). Add a pre-shift equipment check to address this.`});
    if(peakHour)s.push({ico:'🕐',txt:`Most delays at ${peakHour[0]}:00. Add supervisor presence during this hour.`});
    s.push({ico:'📋',txt:'Log delays in real-time, not end of shift. Accuracy improves handover and management visibility.'});
    $(resultId)&&($(resultId).innerHTML=s.map(x=>`<div class="ai-insight"><strong>${x.ico}</strong> ${x.txt}</div>`).join(''));
  },1400);
}

    html+='<span style="font-size:9px;font-weight:900;color:white">'+pct+'%</span></div></div>';

function addGeneratorFromYard(){
  const name=prompt('Generator name/number (e.g. GEN-1, 1, 2):');
  if(!name)return;
  const cap=parseFloat(prompt('Capacity in litres (e.g. 1000):'));
  if(!cap||isNaN(cap)){alert('Please enter a valid capacity.');return;}
  const pct=parseFloat(prompt('Current fuel percentage (0-100):'));
  const cur=(!isNaN(pct)&&pct>=0&&pct<=100)?Math.round(cap*pct/100):cap;
  if(!ST.generators)ST.generators=[];
  ST.generators.push({id:Date.now(),name:name,capacity:cap,current:cur});
  sv();renderYard();
}

// YARD SHARE
// ════════════════════════════════════
async function shareYardReport(reportId){
  var el=document.getElementById('ycap_'+reportId);
  if(!el){alert('Nothing to capture.');return;}
  if(typeof html2canvas==='undefined'){alert('html2canvas not loaded.');return;}
  var numColor=ST.settings.reportNumColor||'#000000';
  // Portrait render: lay out at 480px wide (phone portrait width).
  // Table columns are percentage-based so they fill 100% of this width.
  // Capture at scale:3 for sharp output (~1440px wide retina-ready portrait image).
  var W=480;

  // ── Clone the element ──
  var clone=el.cloneNode(true);

  // ── Remove all UI-only elements ──
  clone.querySelectorAll('.no-share').forEach(function(ns){ns.parentNode&&ns.parentNode.removeChild(ns);});
  clone.querySelectorAll('button').forEach(function(b){if(!b.closest('td')&&!b.closest('th'))b.parentNode&&b.parentNode.removeChild(b);});
  clone.querySelectorAll('.rh-share').forEach(function(b){b.parentNode&&b.parentNode.removeChild(b);});
  clone.querySelectorAll('[id^="pod_"] button').forEach(function(b){b.parentNode&&b.parentNode.removeChild(b);});

  // ── Handle POD charts ──
  clone.querySelectorAll('[id^="pod_"]').forEach(function(pod){
    if(pod.getAttribute('data-share')==='0'){pod.parentNode&&pod.parentNode.removeChild(pod);}
    else{pod.style.overflow='visible';}
  });

  // ── Convert vessel name inputs to plain text ──
  clone.querySelectorAll('.vessel-name').forEach(function(inp){
    var span=document.createElement('span');
    span.textContent=inp.value||'';
    span.style.cssText='font-weight:800;font-size:12px;color:#1F3864;';
    inp.parentNode.replaceChild(span,inp);
  });
  clone.querySelectorAll('.vessel-voyage').forEach(function(inp){
    var span=document.createElement('span');
    span.textContent=inp.value||'';
    span.style.cssText='font-size:10px;font-weight:700;color:#c0392b;';
    inp.parentNode.replaceChild(span,inp);
  });

  // ── Convert all number inputs to plain text ──
  clone.querySelectorAll('input').forEach(function(inp){
    var div=document.createElement('div');
    var v=inp.value||'';
    div.textContent=(v&&v!=='0')?v:'—';
    div.style.cssText='font-size:13px;font-weight:800;text-align:center;color:'+numColor+';';
    inp.parentNode.replaceChild(div,inp);
  });

  // ── Force table to fill 100% of portrait width, no overflow scroll ──
  clone.querySelectorAll('.yard-twrap,.twrap,.table-wrapper').forEach(function(tw){
    tw.style.overflow='visible';
    tw.style.width='100%';
    tw.style.maxWidth='none';
    tw.style.minWidth='unset';
  });
  clone.querySelectorAll('.yard-twrap table, .twrap table').forEach(function(tbl){
    tbl.style.width='100%';
    tbl.style.minWidth='unset';
    tbl.style.tableLayout='fixed';
  });
  // Keep original cell padding and font sizes - no overrides
  // Summary grid: keep original 2-column layout (yellow/blue pairs side by side)

  // ── Mount off-screen at portrait width ──
  var wrapper=document.createElement('div');
  wrapper.style.cssText='position:fixed;left:-9999px;top:0;width:'+W+'px;background:#f0f2f7;z-index:-1;font-family:Segoe UI,Arial,sans-serif;box-sizing:border-box;overflow:visible;';
  wrapper.appendChild(clone);
  document.body.appendChild(wrapper);

  // ── Wait for full layout paint ──
  await new Promise(function(r){requestAnimationFrame(function(){requestAnimationFrame(r);});});
  await new Promise(function(r){setTimeout(r,400);});

  var captureH=wrapper.scrollHeight;
  wrapper.style.height=captureH+'px';

  try{
    var canvas=await html2canvas(wrapper,{
      scale:3,
      useCORS:true,
      backgroundColor:'#f0f2f7',
      width:W,
      height:captureH,
      windowWidth:W,
      windowHeight:captureH,
      scrollX:0,
      scrollY:0,
      allowTaint:true,
      logging:false
    });
    canvas.toBlob(async function(blob){
      if(!blob)return;
      var file=new File([blob],'Yard-Status.png',{type:'image/png'});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:'Yard Status'});
      } else {
        var a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download='Yard-Status.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
      }
    },'image/png',0.96);
  }catch(e){alert('Share failed: '+e.message);}
  finally{document.body.removeChild(wrapper);}
}

// ════════════════════════════════════
// Professional POD chart colours - muted, data-viz palette
var POD_COLORS=['#1a3a5c','#2d6a8a','#2d8a6e','#5a7a3a','#7a5230','#5c3878','#7a3a3a','#3a5c7a','#6b5a1e','#3a6b5a'];
function podColorFor(str){var h=0;for(var i=0;i<str.length;i++)h=((h<<5)-h+str.charCodeAt(i))|0;return POD_COLORS[Math.abs(h)%POD_COLORS.length];}

function renderPodChart(report){
  if(!report||!report.vessels||!report.vessels.length)return'';
  var podData={};
  report.vessels.forEach(function(v){
    var vname=v.name+(v.voyage?' / '+v.voyage:'');
    if(!v.pods||!Object.keys(v.pods).length)return;
    Object.entries(v.pods).forEach(function(e2){
      var pod=e2[0],cnt=e2[1];
      if(!pod||pod==='undefined')return;
      if(!podData[vname])podData[vname]={};
      podData[vname][pod]=(podData[vname][pod]||0)+cnt;
    });
  });
  if(!Object.keys(podData).length)return'';
  var rid=report.id;
  var podIncluded=(_podShareState[rid]!==false);
  var html='<div id="pod_'+rid+'" data-share="'+(podIncluded?'1':'0')+'" style="background:white;margin:8px 10px;border-radius:12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.08)">';
  html+='<div style="background:#1a3a5c;padding:12px 14px;display:flex;align-items:center;justify-content:space-between">';
  html+='<div style="color:white;font-size:13px;font-weight:700;letter-spacing:.3px">PORT OF DISCHARGE</div>';
  html+='<button onclick="togglePodShare(this)" data-id="'+rid+'" style="background:'+(podIncluded?'rgba(255,255,255,.15)':'rgba(220,50,50,.4)')+';border:1px solid rgba(255,255,255,.3);color:white;border-radius:6px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer">'+(podIncluded?'📊 Include in Share':'📊 Excluded from Share')+'</button>';
  html+='</div>';
  html+='<div style="padding:14px">';
  var viIdx=0;
  Object.entries(podData).forEach(function(vEntry){
    var vname=vEntry[0],pods=vEntry[1];
    var total=Object.values(pods).reduce(function(a,b){return a+b;},0);
    var sorted=Object.entries(pods).sort(function(a,b){return b[1]-a[1];});
    var maxCnt=sorted.length>0?sorted[0][1]:1;
    if(viIdx>0)html+='<div style="border-top:1px solid #f0f0f0;margin:12px 0 10px"></div>';
    html+='<div style="font-size:11px;font-weight:800;color:#1a3a5c;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">'+vname+'</div>';
    sorted.forEach(function(entry){
      var pod=entry[0],cnt=entry[1];
      var pct=total>0?Math.round(cnt/total*100):0;
      var barW=maxCnt>0?Math.round(cnt/maxCnt*100):0;
      var color=podColorFor(pod);
      html+='<div style="margin-bottom:8px">';
      html+='<div style="display:flex;justify-content:space-between;margin-bottom:3px">';
      html+='<span style="font-size:11px;font-weight:600;color:#333">'+pod+'</span>';
      html+='<span style="font-size:11px;color:#666">'+cnt+' &nbsp;'+pct+'%</span>';
      html+='</div>';
      html+='<div style="background:#f0f2f5;border-radius:3px;height:12px;overflow:hidden">';
      html+='<div style="width:'+barW+'%;height:100%;background:'+color+';border-radius:3px"></div>';
      html+='</div>';
      html+='</div>';
    });

    viIdx++;
  });
  html+='</div></div>';
  return html;
}

function markVesselComplete(){
  var sess=getSess();
  if(!sess){alert('No active session.');return;}
  if(!confirm('Mark this vessel as COMPLETE?\n\nThis will save it to history and clear the active session so you can start a new vessel.'))return;
  // Deep clone to avoid mutation
  var savedSess=JSON.parse(JSON.stringify(sess));
  savedSess.completed=true;
  savedSess.completedAt=new Date().toISOString();
  // Snapshot final results from all slots (full vessel)
  var sl_=ALL;savedSess._results={hourly:{},delays:{}};
  sl_.forEach(function(slot){for(var ci=1;ci<=savedSess.numCranes;ci++){['discharge','load'].forEach(function(t){var k=slot+'_'+ci+'_'+t;if(ST.hourly[k])savedSess._results.hourly[k]=ST.hourly[k];});}});
  var idx=ST.sessions.findIndex(function(x){return x.id===savedSess.id;});
  if(idx>=0) ST.sessions[idx]=savedSess;
  else ST.sessions.unshift(savedSess);
  // Clear active session cleanly
  ST.activeId=null;
  sv();
  alert('Vessel '+savedSess.vesselName+' saved to history. Start a new vessel in Input.');
  switchTab('input');
}

var _podShareState={};// persistent toggle state: reportId -> true(include)/false(exclude)
function togglePodShare(btn){
  var id=btn.getAttribute('data-id');
  // Toggle: default is included (true), flip it
  var wasIncluded=(_podShareState[id]!==false);// default true
  _podShareState[id]=!wasIncluded;
  var nowIncluded=_podShareState[id];
  var pod=document.getElementById('pod_'+id);
  if(pod) pod.setAttribute('data-share',nowIncluded?'1':'0');
  btn.textContent=nowIncluded?'📊 Include in Share':'📊 Excluded from Share';
  btn.style.background=nowIncluded?'rgba(255,255,255,.15)':'rgba(220,50,50,.4)';
}

function editYardField(reportId,vesIdx,field,value){
  var rpt=ST.yardReports.find(function(r){return r.id===reportId;});
  if(!rpt||!rpt.vessels[vesIdx])return;
  rpt.vessels[vesIdx][field]=value;

function addYardType(reportId){
  var inp=document.getElementById('nt_'+reportId);
  if(!inp||!inp.value.trim())return;
  var rpt=ST.yardReports.find(function(r){return r.id===reportId;});
  if(!rpt)return;
  if(!rpt.customTypes||!rpt.customTypes.length)rpt.customTypes=['GP/DRY','REEFER','EMPTY','OOG'];
  var nt=inp.value.trim().toUpperCase();
  if(rpt.customTypes.indexOf(nt)<0){
    rpt.customTypes.push(nt);
    (rpt.vessels||[]).forEach(function(v){
      if(v.data&&!v.data[nt])v.data[nt]={export:0,import:0,departed:0};
    });
    sv();
    renderYard();
  }
  inp.value='';
}
function removeYardType(reportId,ti){
  var rpt=ST.yardReports.find(function(r){return r.id===reportId;});
  if(!rpt||!rpt.customTypes||ti<4)return;
  rpt.customTypes.splice(ti,1);
  sv();
  renderYard();
}

// Update yard summary totals without full re-render (fast, no lag)
function updateYardSummary(reportId){
  var rpt=ST.yardReports.find(function(r){return r.id===reportId;});
  if(!rpt)return;
  // Recalc totals
  var grandEx=0,grandIm=0,grandDep=0;
  var totalGP=0,totalReef=0,totalMty=0;
  (rpt.vessels||[]).forEach(function(v){
    var types=rpt.customTypes&&rpt.customTypes.length?rpt.customTypes:['GP/DRY','REEFER','EMPTY','OOG'];
    types.forEach(function(t){
      var d=v.data&&v.data[t]?v.data[t]:{};
      grandEx+=(d.export||0);grandIm+=(d.import||0);grandDep+=(d.departed||0);
    });
    var gpd=v.data&&v.data['GP/DRY']?v.data['GP/DRY']:{};
    var rfd=v.data&&v.data['REEFER']?v.data['REEFER']:{};
    var mty=v.data&&v.data['EMPTY']?v.data['EMPTY']:{};
    totalGP+=(gpd.export||0)+(gpd.import||0);
    totalReef+=(rfd.export||0)+(rfd.import||0);
    totalMty+=(mty.export||0)+(mty.import||0);
  });
  // Update summary elements if they exist in DOM
  var cap=document.getElementById('ycap_'+reportId);
  if(!cap)return;
  var sums=cap.querySelectorAll('[data-sum]');
  sums.forEach(function(el){
    var key=el.getAttribute('data-sum');
    if(key==='ex')el.textContent=grandEx;
    else if(key==='im')el.textContent=grandIm;
    else if(key==='dep')el.textContent=grandDep;
    else if(key==='gp')el.textContent=totalGP;
    else if(key==='reef')el.textContent=totalReef;
    else if(key==='mty')el.textContent=totalMty;
    else if(key==='yard')el.textContent=grandEx+grandIm;
  });
}

function addYardCol(reportId){
  var inp=document.getElementById('nc_'+reportId);
  if(!inp||!inp.value.trim())return;
  var rpt=ST.yardReports.find(function(r){return r.id===reportId;});
  if(!rpt)return;
  if(!rpt.customCols)rpt.customCols=[];
  var label=inp.value.trim().toUpperCase();
  var key=label.toLowerCase().replace(/[^a-z0-9]/g,'_');
  if(!rpt.customCols.find(function(c){return c.key===key;})){
    rpt.customCols.push({label:label,key:key});
    sv();renderYard();
  }
  inp.value='';
}
function removeYardCol(reportId,ci){
  var rpt=ST.yardReports.find(function(r){return r.id===reportId;});
  if(!rpt||!rpt.customCols)return;
  rpt.customCols.splice(ci,1);
  sv();renderYard();
}
