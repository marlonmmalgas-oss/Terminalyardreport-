    rows+='<td class="hl"><input type="number" value="'+(hl||'')+'" placeholder="—" class="ci" style="background:#e8f4fb" oninput="if(!ST.emergency)ST.emergency={};if(!ST.emergency.rows)ST.emergency.rows={};ST.emergency.rows[\''+ci+'_load\']=parseFloat(this.value)||0;_emgSv()"/></td>';
    // Remaining editable
    rows+='<td'+(rd<0?' class="neg"':'')+'><input type="number" value="'+rd+'" class="ci" oninput="if(!ST.emergency)ST.emergency={};if(!ST.emergency.remaining)ST.emergency.remaining={};ST.emergency.remaining[\''+ci+'_discharge\']=parseFloat(this.value);_emgSv()"/></td>';
    rows+='<td'+(rl<0?' class="neg"':'')+'><input type="number" value="'+rl+'" class="ci" oninput="if(!ST.emergency)ST.emergency={};if(!ST.emergency.remaining)ST.emergency.remaining={};ST.emergency.remaining[\''+ci+'_load\']=parseFloat(this.value);_emgSv()"/></td>';
    rows+='</tr>';
  }
  h+='<div class="card" style="margin:8px 10px"><div class="twrap"><table class="rt"><thead>';
  h+='<tr>';
  h+='<th class="grp crane-col" rowspan="2">Crane</th>';
  h+='<th class="grp" colspan="2"><span contenteditable="true" style="outline:none;border-bottom:1px dashed rgba(255,255,255,.4);cursor:text" oninput="if(!ST.emergency)ST.emergency={};ST.emergency.splitsLabel=this.textContent.trim();_emgSv()">'+(e.splitsLabel||'Splits')+'</span></th>';
  h+='<th class="grp" colspan="2" style="background:#1a4a7a"><span contenteditable="true" style="outline:none;border-bottom:1px dashed rgba(255,255,255,.4);cursor:text" oninput="if(!ST.emergency)ST.emergency={};ST.emergency.hourlyLabel=this.textContent.trim();_emgSv()">'+(e.hourlyLabel||'Hourly Moves')+'</span></th>';
  h+='<th class="grp" colspan="2"><span contenteditable="true" style="outline:none;border-bottom:1px dashed rgba(255,255,255,.4);cursor:text" oninput="if(!ST.emergency)ST.emergency={};ST.emergency.remainingLabel=this.textContent.trim();_emgSv()">'+(e.remainingLabel||'Remaining')+'</span></th>';
  h+='</tr><tr>';
  h+='<th class="sub">Disch.</th><th class="sub">Load</th>';
  h+='<th class="sub sub-hl">Disch.</th><th class="sub sub-hl">Load</th>';
  h+='<th class="sub">Disch.</th><th class="sub">Load</th>';
  h+='</tr></thead><tbody>'+rows+'</tbody></table></div></div>';

  // ── Summary — identical to summaryHTML, all cells editable ──
  var tRemD=parseFloat(e.summary&&e.summary.remD!=null?e.summary.remD:0);
  var tRemL=parseFloat(e.summary&&e.summary.remL!=null?e.summary.remL:0);
  var tRemT=parseFloat(e.summary&&e.summary.remT!=null?e.summary.remT:tRemD+tRemL);
  var tDoneD=parseFloat(e.summary&&e.summary.doneD!=null?e.summary.doneD:0);
  var tDoneL=parseFloat(e.summary&&e.summary.doneL!=null?e.summary.doneL:0);
  var tDoneT=parseFloat(e.summary&&e.summary.doneT!=null?e.summary.doneT:tDoneD+tDoneL);
  var t12D=parseFloat(e.summary&&e.summary.done12D!=null?e.summary.done12D:0);
  var t12L=parseFloat(e.summary&&e.summary.done12L!=null?e.summary.done12L:0);
  var t12T=parseFloat(e.summary&&e.summary.done12T!=null?e.summary.done12T:t12D+t12L);
  var tgt=parseFloat(e.target)||0;
  var mx=Math.max(t12T,tgt,1);
  var mp=Math.max(t12T/mx*100,t12T>0?5:0);
  var tp=Math.max(tgt/mx*100,tgt>0?5:0);

  function numIn(key,val,extra){
    return '<input type="number" value="'+(val||0)+'" class="ci" style="width:60px;text-align:center;'+(extra||'')+'" oninput="if(!ST.emergency)ST.emergency={};if(!ST.emergency.summary)ST.emergency.summary={};ST.emergency.summary[\''+key+'\']=parseFloat(this.value)||0;_emgUpdateBar();_emgSv()"/>';
  }

  h+='<div class="card" style="margin:8px 10px"><div class="twrap"><table class="rt"><thead>';
  h+='<tr><th class="grp" style="text-align:left;padding-left:9px">Summary</th><th class="grp">Discharge</th><th class="grp">Load</th><th class="grp">Total Moves</th></tr>';
  h+='</thead><tbody>';
  h+='<tr class="ry"><td style="font-weight:800;padding-left:9px">Total Remaining</td><td>'+numIn('remD',tRemD)+'</td><td>'+numIn('remL',tRemL)+'</td><td style="font-weight:900;'+(tRemT<0?'color:var(--red)':'')+'">'+numIn('remT',tRemT,'font-weight:900;')+'</td></tr>';
  h+='<tr class="o"><td style="padding-left:9px">Total Done</td><td>'+numIn('doneD',tDoneD)+'</td><td>'+numIn('doneL',tDoneL)+'</td><td class="bold">'+numIn('doneT',tDoneT)+'</td></tr>';
  h+='<tr class="e"><td style="padding-left:9px">Total Done 12hrs</td><td>'+numIn('done12D',t12D)+'</td><td>'+numIn('done12L',t12L)+'</td><td class="bold">'+numIn('done12T',t12T)+'</td></tr>';
  h+='</tbody></table></div></div>';

  // Bar chart — uses Total Done 12hrs vs Target (exactly as summaryHTML)
  h+='<div class="chcard" style="margin:8px 10px">';
  h+='<div class="cht">Total Done 12hrs vs Target</div>';
  h+='<div class="brow"><div class="blbl">Total Done 12hrs</div><div class="btrack"><div class="bfill bn" id="emg_bfill" style="width:'+mp+'%"><span id="emg_bspan" style="font-size:11px;font-weight:800">'+t12T+'</span></div></div></div>';
  h+='<div class="brow"><div class="blbl">Target</div><div class="btrack"><div class="bfill by" style="width:'+tp+'%"><span style="font-size:11px;font-weight:800"><input type="number" value="'+tgt+'" style="width:55px;font-size:11px;font-weight:800;background:transparent;border:none;border-bottom:1px dashed rgba(0,0,0,.3);color:inherit;text-align:center" oninput="if(!ST.emergency)ST.emergency={};ST.emergency.target=parseFloat(this.value)||0;_emgUpdateBar();_emgSv()"/></span></div></div></div>';

function _emgUpdateBar(){
  var e=ST.emergency||{};
  var t12T=parseFloat(e.summary&&e.summary.done12T||0);
  var tgt=parseFloat(e.target)||0;
  var mx=Math.max(t12T,tgt,1);
  var mp=Math.max(t12T/mx*100,t12T>0?5:0);
  var bf=document.getElementById('emg_bfill');
  var bs=document.getElementById('emg_bspan');
  if(bf)bf.style.width=mp+'%';
  if(bs)bs.textContent=t12T;
}
function _emgCopyFromActive(){
  var sess=getSess();
  if(!sess){alert('No active session to copy from.');return;}
  if(!ST.emergency)ST.emergency={};
  var e=ST.emergency;
  // Vessel info
  e.vesselName=sess.vesselName||'';
  e.dockedOn=sess.dockedOn||'';
  e.firstLift=sess.firstLift||'';
  e.lastLift=sess.lastLift||'';
  e.numCranes=sess.numCranes||2;
  e.target=sess.target||0;
  e.slotLabel=fs(currSlot());
  e._prefilled=true;
  var nc=parseInt(e.numCranes)||2;
  // Crane names
  if(!e.craneNames)e.craneNames={};
  for(var i=1;i<=nc;i++)e.craneNames[i]=craneName(i);
  // Splits
  if(!e.splits)e.splits={};
  for(var i=1;i<=nc;i++){
    var cb=sess.craneBalances&&sess.craneBalances[i]||{};
    e.splits[i+'_discharge']=cb.dischargeSplit||0;
    e.splits[i+'_load']=cb.loadSplit||0;
  }
  // OB
  if(!e.ob)e.ob={};
  for(var i=1;i<=nc;i++){
    var cb=sess.craneBalances&&sess.craneBalances[i]||{};
    if(cb.dischargeOB!=null&&cb.dischargeOB!=='')e.ob[i+'_discharge']=parseFloat(cb.dischargeOB)||0;
    if(cb.loadOB!=null&&cb.loadOB!=='')e.ob[i+'_load']=parseFloat(cb.loadOB)||0;
  }
  // Current slot hourly moves
  if(!e.rows)e.rows={};
  var slot=currSlot();
  for(var i=1;i<=nc;i++){
    e.rows[i+'_discharge']=ST.hourly[hk(sess.id,slot,i,'discharge')]||0;
    e.rows[i+'_load']=ST.hourly[hk(sess.id,slot,i,'load')]||0;
  }
  // Remaining
  if(!e.remaining)e.remaining={};
  for(var i=1;i<=nc;i++){
    e.remaining[i+'_discharge']=effSplit(sess,i,'discharge')-getCraneTotal(sess,i,'discharge');
    e.remaining[i+'_load']=effSplit(sess,i,'load')-getCraneTotal(sess,i,'load');
  }
  // Summary — copy from calcGlobalTotals
  var g=calcGlobalTotals(sess);
  e.summary={
    remD:Math.round(g.baseTotalDisc-g.totalDoneDisc),
    remL:Math.round(g.baseTotalLoad-g.totalDoneLoad),
    remT:Math.round(g.remaining),
    doneD:Math.round(g.totalDoneDisc),
    doneL:Math.round(g.totalDoneLoad),
    doneT:Math.round(g.totalDone),
    done12D:Math.round(g.total12Disc),
    done12L:Math.round(g.total12Load),
    done12T:Math.round(g.total12)
  };
  _emgSv();renderEmergency();
}
function _emgAddSlot(){
  var e=_emgInit();
  if(!e.slots)e.slots=[];
  e.slots.push('0000-0100');
  _emgSv();renderEmergency();
}
function _emgDelSlot(si){
  var e=_emgInit();
  e.slots.splice(si,1);
  // Shift row keys down
  var newRows={};
  Object.keys(e.rows||{}).forEach(function(k){
    var parts=k.split('_');
    var idx=parseInt(parts[parts.length-1]);
    if(idx===si)return;
    if(idx>si){parts[parts.length-1]=String(idx-1);newRows[parts.join('_')]=e.rows[k];}
    else newRows[k]=e.rows[k];
  });
  e.rows=newRows;
  _emgSv();renderEmergency();
}
function _emgReset(){
  if(!confirm('Reset Emergency Report? All data will be cleared.'))return;
  ST.emergency={};_emgSv();renderEmergency();
}
function shareEmergency(){
  var el=document.getElementById('emgCap');
  if(!el){alert('Open Emergency tab first.');return;}

  // Clone the element for capture
  var clone=el.cloneNode(true);
  clone.style.cssText='position:fixed;left:-9999px;top:0;width:'+el.offsetWidth+'px;overflow:visible;background:#f0f2f7;';

  // Stamp live input values onto cloned inputs before replacing
  var liveInputs=el.querySelectorAll('input');
  var cloneInputs=clone.querySelectorAll('input');
  liveInputs.forEach(function(inp,i){if(cloneInputs[i])cloneInputs[i].value=inp.value;});

  // Remove no-share elements (controls strip, buttons)
  clone.querySelectorAll('.no-share,.rh-share,button,select').forEach(function(e2){e2.remove();});

  // Replace all inputs with plain text spans showing their value
  clone.querySelectorAll('input').forEach(function(inp){
    var span=document.createElement('span');
    var val=inp.value||inp.placeholder||'';
    span.textContent=val==='-'||val===''?'—':val;
    span.style.cssText='display:inline-block;min-width:'+inp.offsetWidth+'px;text-align:center;font-size:'+getComputedStyle(inp).fontSize+';font-weight:'+getComputedStyle(inp).fontWeight+';color:'+getComputedStyle(inp).color+';';
    inp.parentNode.replaceChild(span,inp);
  });

  // Replace contenteditable spans — they already show text, just remove the dashed border
  clone.querySelectorAll('[contenteditable]').forEach(function(e2){
    e2.removeAttribute('contenteditable');
    e2.style.borderBottom='none';
  });

  document.body.appendChild(clone);

  // Measure full height after clone is in DOM
  var captureH=clone.scrollHeight;
  var captureW=el.offsetWidth;

  html2canvas(clone,{
    scale:2,useCORS:true,backgroundColor:'#f0f2f7',
    width:captureW,height:captureH,
    windowWidth:captureW,scrollX:0,scrollY:0,
    allowTaint:true,logging:false
  }).then(function(canvas){
    document.body.removeChild(clone);
    canvas.toBlob(function(blob){
      if(!blob)return;
      var file=new File([blob],'EmergencyReport.png',{type:'image/png'});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:'Emergency Report'});
      } else {
        var a=document.createElement('a');a.href=URL.createObjectURL(blob);
        a.download='EmergencyReport.png';document.body.appendChild(a);a.click();document.body.removeChild(a);
        setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
      }
    },'image/png',0.96);
  }).catch(function(err){
    if(document.body.contains(clone))document.body.removeChild(clone);
    alert('Share failed: '+err.message);
  });
}
