      var pT=0;
      h+='<tr class="ry"><td class="lbl">'+_adminLbl('res_planned','Planned',false)+'</td>';
      for(var i=1;i<=nc;i++){var v=sess.craneBalances[i]&&sess.craneBalances[i][t+'Split']||0;pT+=v;h+='<td>'+v+'</td>';}
      h+='<td>'+pT+'</td></tr>';

      var obT=0;
      h+='<tr class="ry"><td class="lbl">'+_adminLbl('res_opening','Opening Bal.',false)+'</td>';
      for(var i=1;i<=nc;i++){var v=effSplit(sess,i,t);obT+=v;h+='<td>'+v+'</td>';}
      h+='<td>'+obT+'</td></tr>';

      var blockSlots=block.slots;
      blockSlots.forEach(function(s,ri){
        var rT=0;
        h+='<tr class="'+(ri%2===0?'o':'e')+'"><td class="lbl" style="font-size:9.5px">'+fs(s)+'</td>';
        for(var i=1;i<=nc;i++){
          var v;
          if(block.isCurrent){
            v=ST.hourly[hk(sess.id,s,i,t)]||0;
            rT+=v;
            var rowTotId='rrowtot_'+blockId+'_'+t+'_'+ri;
            h+='<td><input class="ci" type="number" value="'+(v||'')+'" placeholder="-" oninput="ST.hourly[hk(\''+sess.id+'\',\''+s+'\','+i+',\''+t+'\')]=parseFloat(this.value)||0;_resLiveTotals(\''+sess.id+'\',\''+blockId+'\',\''+t+'\','+nc+',\''+s+'\','+ri+');sv()"/></td>';
          } else {
            var sk=s+'_'+i+'_'+t;
            v=(block.shiftObj&&block.shiftObj.hourly&&block.shiftObj.hourly[sk])||0;
            rT+=v;
            h+='<td><input class="ci" type="number" value="'+(v||'')+'" placeholder="-" oninput="updateShiftHourly('+sess.id+',\''+block.key+'\',\''+s+'\','+i+',\''+t+'\',this.value,\''+blockId+'\','+nc+','+ri+')"/></td>';
          }
        }
        var rtId=block.isCurrent?'id="rrowtot_'+blockId+'_'+t+'_'+ri+'"':'id="rrowtot_'+blockId+'_'+t+'_'+ri+'"';
        h+='<td class="bold" '+rtId+'>'+(rT||'')+'</td></tr>';
      });

      var dT=0;
      var doneRowId='res_done_'+blockId+'_'+t;
      var remRowId='res_rem_'+blockId+'_'+t;
      h+='<tr class="ry" id="'+doneRowId+'"><td class="lbl">'+_adminLbl('res_done','Total Done',false)+'</td>';
      for(var i=1;i<=nc;i++){dT+=dpAll[i];h+='<td id="'+doneRowId+'_c'+i+'">'+dpAll[i]+'</td>';}
      h+='<td id="'+doneRowId+'_tot">'+dT+'</td></tr>';

      var rT2=0;
      h+='<tr class="ry" id="'+remRowId+'"><td class="lbl">'+_adminLbl('res_remain','Total Remain',false)+'</td>';
      for(var i=1;i<=nc;i++){var r=effSplit(sess,i,t)-dpAll[i];rT2+=r;h+='<td id="'+remRowId+'_c'+i+'"'+(r<0?' style="color:var(--red)"':'')+'>'+r+'</td>';}
      h+='<td id="'+remRowId+'_tot"'+(rT2<0?' style="color:var(--red)"':'')+'>'+rT2+'</td></tr>';

      h+='</table></div></div>';
    });

    h+='</div></div>';
  });

  h+=`<div style="height:20px"></div>`;
  $('sc-results').innerHTML=h;
}

// ═══════════ GLOBAL TOTALS ENGINE (Segment 2 — single source of truth) ═══════════
// All totals are calculated ONCE here. No other reduce() or sum loop exists in views.
function calcGlobalTotals(sess){
  if(!sess)return{baseTotal:0,totalDone:0,totalDoneDisc:0,totalDoneLoad:0,total12:0,total12Disc:0,total12Load:0,remaining:0};

  // --- Opening Balance / Split (baseTotal) ---
  // Per spec: openingBalance overrides split when set; displayed as splitTotal
  const nc=sess.numCranes;
  let baseTotalDisc=0,baseTotalLoad=0;
  for(let i=1;i<=nc;i++){
    baseTotalDisc+=effSplit(sess,i,'discharge');
    baseTotalLoad+=effSplit(sess,i,'load');
  }
  const baseTotal=baseTotalDisc+baseTotalLoad;

  // --- Total Done (all-time vessel) using data layer ---
  const allData=getAllSlots(sess);
  const totalDone=allData.reduce(function(sum,s){return sum+(s.disc||0)+(s.load||0);},0);
  const totalDoneDisc=allData.reduce(function(sum,s){return sum+(s.disc||0);},0);
  const totalDoneLoad=allData.reduce(function(sum,s){return sum+(s.load||0);},0);

  // --- Total 12hrs (current shift only) using data layer ---
  const shiftData=getShiftSlots(sess);
  const total12=shiftData.reduce(function(sum,s){return sum+(s.disc||0)+(s.load||0);},0);
  const total12Disc=shiftData.reduce(function(sum,s){return sum+(s.disc||0);},0);
  const total12Load=shiftData.reduce(function(sum,s){return sum+(s.load||0);},0);

  // --- Remaining ---
  const remaining=baseTotal-totalDone;

  return{baseTotal,baseTotalDisc,baseTotalLoad,totalDone,totalDoneDisc,totalDoneLoad,total12,total12Disc,total12Load,remaining};
}

// ═══════════ SUMMARY + CHART (Segment 7 — no view-level calculations) ═══════════
function summaryHTML(sess){
  // All totals from single source — no local reduce/forEach
  const g=calcGlobalTotals(sess);
  const tgt=sess.target||0;
  // Graph: Segment 8 — uses total12 exclusively
  const graphTotal=g.total12;
  const mx=Math.max(graphTotal,tgt,1);
  const mp=Math.max(graphTotal/mx*100,graphTotal>0?5:0);
  const tp=Math.max(tgt/mx*100,tgt>0?5:0);
  return`<div class="card" style="margin:8px 10px"><div class="twrap">
    <table class="rt">
      <thead><tr><th class="grp" style="text-align:left;padding-left:9px">${_adminLbl('sum_hd','Summary',true)}</th><th class="grp">Discharge</th><th class="grp">Load</th><th class="grp">Total Moves</th></tr></thead>
      <tbody>
        <tr class="ry"><td style="font-weight:800;padding-left:9px">${_adminLbl('sum_remaining','Total Remaining',false)}</td><td>${g.baseTotalDisc-g.totalDoneDisc}</td><td>${g.baseTotalLoad-g.totalDoneLoad}</td><td style="font-weight:900;${g.remaining<0?'color:var(--red)':''}">${g.remaining}</td></tr>
        <tr class="o"><td style="padding-left:9px">${_adminLbl('sum_done','Total Done',false)}</td><td>${g.totalDoneDisc}</td><td>${g.totalDoneLoad}</td><td class="bold">${g.totalDone}</td></tr>
        <tr class="e"><td style="padding-left:9px">${_adminLbl('sum_done12','Total Done 12hrs',false)}</td><td>${g.total12Disc}</td><td>${g.total12Load}</td><td class="bold">${g.total12}</td></tr>
      </tbody>
    </table>
  </div></div>
  <div class="chcard" style="margin:8px 10px">
    <div class="cht">Total Done 12hrs vs Target</div>
    <div class="brow"><div class="blbl">Total Done 12hrs</div><div class="btrack"><div class="bfill bn" style="width:${mp}%"><span style="font-size:11px;font-weight:800">${graphTotal}</span></div></div></div>
    <div class="brow"><div class="blbl">Target</div><div class="btrack"><div class="bfill by" style="width:${tp}%"><span style="font-size:11px;font-weight:800">${tgt}</span></div></div></div>
  </div><div style="height:14px"></div>`;
}

// Render shift collapsibles wrapping an existing table HTML
function renderShiftBlocks(sess,tableHTMLFn){
  if(!sess.shifts||!sess.shifts.length){
    return tableHTMLFn(null,true);
  }
  let out='';
  sess.shifts.forEach(function(shift,i){
    const isCurrent=(i===sess.shifts.length-1);
    const label=(shift.type==='DAY'?'☀️ DAY':'🌙 NIGHT')+' SHIFT';
    out+=`<div class="shift-block">
      <div class="shift-header" onclick="toggleShift(${i})">${label}</div>
      <div class="shift-body" style="display:${isCurrent?'block':'none'}">
        ${tableHTMLFn(shift,isCurrent)}
      </div>
    </div>`;
  });
  return out;
}

// Break slots: day shift = 1000-1030 and 1400-1430; night = 2200-2230 and 0200-0230
var CMT_BREAKS_DAY  = [{start:'1000',end:'1030'},{start:'1400',end:'1430'}];
var CMT_BREAKS_NIGHT= [{start:'2200',end:'2230'},{start:'0200',end:'0230'}];

function cmtIsBreakSlot(slotStr){
  // slotStr like "1000-1100"
  var slotStart=slotStr.split('-')[0];
  var h=parseInt(slotStart.substring(0,2)),hh=new Date().getHours();
  var isNightShift=hh>=18||hh<6;
  var breaks=isNightShift?CMT_BREAKS_NIGHT:CMT_BREAKS_DAY;
  return breaks.some(function(b){return b.start===slotStart;});
}

// Given a target per full hour and a slot string + firstLift time,
// compute the proportional target for that specific slot.
// Slots BEFORE firstLift return 0. Tea break slots get 30 min worth.
function cmtSlotTarget(fullHrTarget, slotStr, firstLiftTime){
  if(!fullHrTarget) return 0;

  // Convert slot start/end to minutes-since-midnight
  var slotStartH=parseInt(slotStr.substring(0,2));
  var slotStartM=parseInt(slotStr.substring(2,4)||0);
  var slotStartMins=slotStartH*60+slotStartM;
  var slotEndMins=slotStartMins+60;

  // Night shift: slots after midnight (0000–0600) need +24*60 so they sit
  // on the correct timeline after 18:00 (e.g. 0000 → 1440, not 0)
  if(!isDay()&&slotStartH<12){
    slotStartMins+=24*60;
    slotEndMins+=24*60;
  }

  // If firstLift is set: only zero out slots ENTIRELY before firstLift.
  // The slot containing firstLift and all after get the full hourly target.
  if(firstLiftTime){
    var flParts=firstLiftTime.split(':');
    var flH=parseInt(flParts[0]),flM=parseInt(flParts[1]||0);
    var flMins=flH*60+flM;
    // Night shift: if firstLift is after midnight (e.g. 01:00) adjust for crossing midnight
    if(!isDay()&&flH<12) flMins+=24*60;
    if(flMins>=slotEndMins) return 0; // slot entirely before first lift → 0
    // slot contains firstLift OR is after it → full target
  }

  // Break slot gets 30 min worth (half target)
  if(cmtIsBreakSlot(slotStr)){
    return Math.floor(30 / (60/fullHrTarget));
  }

  return fullHrTarget;
}

// Build cumulative targets array for chart
function cmtCumulativeTargets(slots, fullHrTarget, firstLiftTime){
  var cum=0;
  return slots.map(function(s){
    cum+=cmtSlotTarget(fullHrTarget,s,firstLiftTime);
    return cum;
  });
}

// Get actual moves per slot for a specific view (combined, mhc1, mhc2, mhc3, ...)
function cmtActuals(sess, slots, view){
  var nc=sess.numCranes||2;
  return slots.map(function(s){
    var t=0;
    if(view==='combined'){
      for(var ci=1;ci<=nc;ci++) t+=(ST.hourly[hk(sess.id,s,ci,'discharge')]||0)+(ST.hourly[hk(sess.id,s,ci,'load')]||0);
    } else {
      var ci=parseInt(view.replace('mhc',''))||1;
      t=(ST.hourly[hk(sess.id,s,ci,'discharge')]||0)+(ST.hourly[hk(sess.id,s,ci,'load')]||0);
    }
    return t;
  });
}

  h+='<button class="rh-share cmt-share-btn" onclick="sharePerformance()" style="padding:8px 12px;border-radius:8px;font-size:12px;font-weight:800;flex:0 0 auto;">📤</button>';
  h+='</div>';

  // ── KPI Mode selector ──
  var kpiMode=ST.perfTargets.kpiMode||'shift';
  var kpiModes=[{id:'shift',lbl:'Current Shift'},{id:'vessel',lbl:'Entire Vessel'},{id:'last4',lbl:'Last 4 Hrs'}];
  h+='<div style="margin:0 10px 8px;display:flex;gap:6px;align-items:center">';
  h+='<span style="font-size:9px;color:#90a4c8;font-weight:700;letter-spacing:.4px;text-transform:uppercase;flex-shrink:0">KPI:</span>';
  kpiModes.forEach(function(km){
    var kActive=kpiMode===km.id;
    h+='<button onclick="if(!ST.perfTargets)ST.perfTargets={};ST.perfTargets.kpiMode=\''+km.id+'\';sv();renderPerformance()" style="flex:1;padding:6px 4px;border-radius:7px;border:2px solid '+(kActive?'#4fc3f7':'transparent')+';font-size:10px;font-weight:800;cursor:pointer;background:'+(kActive?'#1e2a3a':'#141e2e')+';color:'+(kActive?'#4fc3f7':'#90a4c8')+';transition:all .15s;">'+km.lbl+'</button>';
  });
  h+='</div>';

  // ── Compute data for current view ──
  // Actuals per slot (raw, not cumulative) — CURRENT SHIFT only (for chart)
  var rawActuals=cmtActuals(sess,sl,view);

  // ── KPI-mode aware actuals for Production Stats ──
  var kpiMode=ST.perfTargets.kpiMode||'shift';
  var kpiRawActuals; // flat array of move counts across the relevant slots/cranes
  var kpiSlots; // the slot keys used for KPI computation
  if(kpiMode==='vessel'){
    // Entire vessel: sum across ALL stored shifts + current live
    kpiSlots=ALL; // we'll query directly
    kpiRawActuals=(function(){
      var totals=[];
      // Sum all shifts stored on the session
      var allSlotData=getAllSlots(sess); // returns [{slot,disc,load}] across all shifts
      allSlotData.forEach(function(obj){
        var t=0;
        if(view==='combined'){t=obj.disc+obj.load;}
        else{
          var ci=parseInt(view.replace('mhc',''))||1;
          // Need per-crane data; getAllSlots aggregates — use live ST.hourly for current shift
          var shiftSlotKeys=isDay()?ALL.slice(0,12):ALL.slice(12);
          var inCurShift=shiftSlotKeys.indexOf(obj.slot)>=0;
          if(inCurShift){
            t=(ST.hourly[hk(sess.id,obj.slot,ci,'discharge')]||0)+(ST.hourly[hk(sess.id,obj.slot,ci,'load')]||0);
          } else {
            // Past shift: approximate from per-crane stored data
            var perCraneTotal=0;
            if(sess.shifts){sess.shifts.forEach(function(sh){var sk=obj.slot+'_'+ci+'_discharge';var sk2=obj.slot+'_'+ci+'_load';perCraneTotal+=(sh.hourly&&sh.hourly[sk]||0)+(sh.hourly&&sh.hourly[sk2]||0);});}
            t=perCraneTotal;
          }
        }
        totals.push(t);
      });
      return totals;
    })();
  } else if(kpiMode==='last4'){
    // Last 4 hourly slots
    var _l4slots=sl.slice(Math.max(0,sl.indexOf(slot)-3),sl.indexOf(slot)+1);
    if(_l4slots.length===0)_l4slots=sl.slice(-4);
    kpiSlots=_l4slots;
    kpiRawActuals=cmtActuals(sess,_l4slots,view);
  } else {
    // Current shift (default)
    kpiSlots=sl;
    kpiRawActuals=rawActuals;
  }
  // Cumulative actuals — only up to and including the current slot
  // Slots after the current one get null so the line stops at now
  var cumActuals=[];
  var runSum=0;
  var slotIdx=sl.indexOf(slot);
  if(slotIdx<0)slotIdx=sl.length-1;
  rawActuals.forEach(function(v,i){
    if(i<=slotIdx){runSum+=v;cumActuals.push(runSum);}
    else{cumActuals.push(null);}
  });
  // Pad cumActuals to fullShiftSlots length (future slots get null)
  while(cumActuals.length<fullShiftSlots.length)cumActuals.push(null);

  // Target for current view
  var tKey=view==='combined'?null:(view==='mhc1'?'cmtTarget':('cmtTarget'+view.replace('mhc','')));
  var tPerHrView=0;
  if(view==='combined'){
    // combined target = sum of all crane targets per slot
  } else {
    tPerHrView=ST.perfTargets[tKey]||0;
  }

  // Compute cumulative targets per crane using fullShiftSlots (all 12hrs, not just slots-to-now)
  var _derivedTgtPerHr=(sess&&sess.target&&nc)?(sess.target/12/nc):0;
  var cumTargetsByCrane={};
  for(var _cj=1;_cj<=nc;_cj++){
    cumTargetsByCrane[_cj]=(function(tHr,flRaw){
      var _cum2=0;
      return fullShiftSlots.map(function(s){_cum2+=cmtSlotTarget(tHr,s,flRaw);return _cum2;});
    })(ST.perfTargets[(_cj===1)?'cmtTarget':('cmtTarget'+_cj)]||_derivedTgtPerHr, craneLifts['fl_'+_cj]||'');
  }

  // Combined cumulative = sum of all cranes across fullShiftSlots
  var cumTargetsCombined=fullShiftSlots.map(function(s,i){
    var tot=0;
    for(var _cj2=1;_cj2<=nc;_cj2++) tot+=(cumTargetsByCrane[_cj2]||[])[i]||0;
    return tot;
  });

  // No cap — target line is a rate projection for the full shift

  // Single-crane cumulative for non-combined
  var craneIdx=view==='combined'?1:parseInt(view.replace('mhc',''))||1;
  var cumTargetsCurrent=view==='combined'?cumTargetsCombined:(cumTargetsByCrane[craneIdx]||[]);

  // Summary stats — current slot index
  var slotIdx=sl.indexOf(slot);
  if(slotIdx<0)slotIdx=sl.length-1;
  var fullSlotIdx=fullShiftSlots.indexOf(slot);
  if(fullSlotIdx<0)fullSlotIdx=Math.min(slotIdx,fullShiftSlots.length-1);
  var currentTarget=cumTargetsCurrent[fullSlotIdx]||0;
  var currentActual=cumActuals[slotIdx]||0;
  var deviation=currentActual-currentTarget;

  // Labels: all 12 shift slots so target line stretches the full shift
  var labels=fullShiftSlots.map(function(s){
    var p=s.split('-')[0];
    return p.substring(0,2)+':'+p.substring(2,4)||p;
  });

  // ── KPI strip ──
  var viewLabel=view==='combined'?'Combined':('MHC'+view.replace('mhc',''));
  var kpiColour=cmtColour(view);
  h+='<div style="margin:0 10px 10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">';
  h+='<div style="background:#1e2a3a;border-radius:10px;padding:12px 10px;text-align:center;border-top:2px solid '+kpiColour+'">';
  h+='<div style="font-size:10px;color:#90a4c8;font-weight:700;margin-bottom:4px">'+viewLabel.toUpperCase()+' TARGET</div>';
  h+='<div style="font-size:26px;font-weight:900;color:white">'+currentTarget+'</div></div>';
  h+='<div style="background:#1e2a3a;border-radius:10px;padding:12px 10px;text-align:center;border-top:2px solid '+kpiColour+'">';
  h+='<div style="font-size:10px;color:#90a4c8;font-weight:700;margin-bottom:4px">ACTUAL</div>';
  h+='<div style="font-size:26px;font-weight:900;color:white">'+currentActual+'</div></div>';
  h+='<div style="background:#1e2a3a;border-radius:10px;padding:12px 10px;text-align:center;border-top:2px solid '+(deviation>=0?'#4caf50':'#ef5350')+'">';
  h+='<div style="font-size:10px;color:#90a4c8;font-weight:700;margin-bottom:4px">DEVIATION</div>';
  h+='<div style="font-size:26px;font-weight:900;color:'+(deviation>=0?'#4caf50':'#ef5350')+'">'+(deviation>=0?'+':'')+deviation+'</div></div>';
  h+='</div>';

  // ── Chart canvas ──
  h+='<div style="margin:0 10px 16px;padding:14px;border-radius:12px;background:#0d1521;box-shadow:0 2px 12px rgba(0,0,0,.4)">';
  h+='<div style="font-size:11px;font-weight:800;color:#90a4c8;margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase">Cumulative Moves</div>';
  h+='<div style="position:relative;height:260px"><canvas id="chartCMT"></canvas></div></div>';

  // ── Production Stats ──
  // statsNc: number of cranes for stats — 1 if viewing a single crane, nc if combined
  var statsNc=(view==='combined')?nc:1;
  var shiftStartHour=isDay()?6:18;
  var shiftEndHour=isDay()?18:6; // next day for night

  // Per-crane crane hours using craneLifts (already declared above)
  function _craneHrs(ci){
    // First lift: per-crane if set, else session firstLift, else shift start
    var _flRaw=craneLifts['fl_'+ci]||sess.firstLift||'';
    var _llRaw=craneLifts['ll_'+ci]||sess.lastLift||'';
    var shiftStartMins=shiftStartHour*60;

    var startMins=shiftStartMins;
    if(_flRaw){
      var _fp=_flRaw.split(':');
      var _fh=parseInt(_fp[0])||0,_fm2=parseInt(_fp[1])||0;
      var _ftotal=_fh*60+_fm2;
      if(!isDay()&&_fh<12)_ftotal+=24*60;
      // Only reduce if first lift is after shift start
      startMins=Math.max(shiftStartMins,_ftotal);
    }

    var endMins=isDay()?18*60:(6*60+24*60); // shift end in same timeline
    if(_llRaw){
      var _lp=_llRaw.split(':');
      var _lh=parseInt(_lp[0])||0,_lm2=parseInt(_lp[1])||0;
      var _ltotal=_lh*60+_lm2;
      if(!isDay()&&_lh<12)_ltotal+=24*60;
      // Only reduce if last lift is before shift end
      endMins=Math.min(endMins,_ltotal);
    }

    // Fix 3: If there are delays that explain the gap between shift start and first lift,
    // add those delay minutes BACK to crane hours (the crane was on the clock but delayed).
    // Those delays will then be counted as deductable in production stats.
    var _earlyDelayMins=0;
    if(startMins>shiftStartMins&&sess){
      var _rowIds=getDelayRowIds(sess.id,ci);
      _rowIds.forEach(function(r){
        var _dk=sess.id+'_'+ci+'_'+r;
        var _dd=ST.delays[_dk]||{};
        if(_dd.from&&_dd.to){
          var _dfp=_dd.from.split(':');var _dtp=_dd.to.split(':');
          var _dfm=parseInt(_dfp[0]||0)*60+(parseInt(_dfp[1]||0));
          var _dtm=parseInt(_dtp[0]||0)*60+(parseInt(_dtp[1]||0));
          if(!isDay()&&_dfm<12*60)_dfm+=24*60;
          if(!isDay()&&_dtm<12*60)_dtm+=24*60;
          if(_dtm<_dfm)_dtm+=24*60;
          // Only count delay minutes that fall within the gap [shiftStart, startMins]
          var _overlapStart=Math.max(_dfm,shiftStartMins);
          var _overlapEnd=Math.min(_dtm,startMins);
          if(_overlapEnd>_overlapStart)_earlyDelayMins+=(_overlapEnd-_overlapStart);
        }
      });
    }

    // Cap end at the current time within the shift so live KPI reflects hours worked so far,
    // not the full 12-hr shift assumption.
    var _nowMins=new Date().getHours()*60+new Date().getMinutes();
    if(!isDay()&&_nowMins<12*60)_nowMins+=24*60; // night shift: adjust past-midnight hours
    var nowCapMins=Math.min(endMins,_nowMins);
    var hrsWorked=Math.max(0,(nowCapMins-startMins+_earlyDelayMins)/60);
    return Math.round(hrsWorked*100)/100;
  }

  var totalCraneHrs=0;
  if(view==='combined'){
    for(var _ci2=1;_ci2<=nc;_ci2++)totalCraneHrs+=_craneHrs(_ci2);
  } else {
    var _viewCi=parseInt(view.replace('mhc',''))||1;
    totalCraneHrs=_craneHrs(_viewCi);
  }
  totalCraneHrs=Math.round(totalCraneHrs*100)/100;
  var totalCraneMins=Math.round(totalCraneHrs*60);

  // Total moves for the KPI scope (all cranes, combined)
  var totalMoves=0;
  kpiRawActuals.forEach(function(v){totalMoves+=v||0;});

  // Deductable delays: only count delays for the viewed crane(s)
  var deductMins=0;
  if(sess){
    var _startCi=view==='combined'?1:parseInt(view.replace('mhc',''))||1;
    var _endCi=view==='combined'?nc:_startCi;
    for(var _dc=_startCi;_dc<=_endCi;_dc++){
      var _rowIds=getDelayRowIds(sess.id,_dc);
      _rowIds.forEach(function(r){
        var _dk=sess.id+'_'+_dc+'_'+r;
        var _dd=ST.delays[_dk]||{};
        if(_dd.from&&_dd.to){
          var _fp=_dd.from.split(':');var _tp2=_dd.to.split(':');
          var _fm=parseInt(_fp[0]||0)*60+(parseInt(_fp[1]||0));
          var _tm=parseInt(_tp2[0]||0)*60+(parseInt(_tp2[1]||0));
          if(_tm<_fm)_tm+=24*60;
          deductMins+=Math.max(0,_tm-_fm);
        }
      });
    }
  }

  // Net crane hrs = (total crane mins - deductable delay mins) / 60
  var netCraneMins=Math.max(0,totalCraneMins-deductMins);
  var netCraneHrs=Math.round(netCraneMins/60*100)/100;

  // Gross TPH = total moves / total crane hrs
  var grossTPH=totalCraneHrs>0?Math.round(totalMoves/totalCraneHrs*10)/10:0;
  // Net TPH = total moves / net crane hrs
  var netTPH=netCraneHrs>0?Math.round(totalMoves/netCraneHrs*10)/10:0;

  var _isCombinedView=(view==='combined');
  var stats=[
    {lbl:'TOTAL CRANE HRS',                             val:totalCraneHrs,   unit:'hrs'},
    {lbl:_isCombinedView?'GROSS TPH':'GROSS CPH',       val:grossTPH,         unit:'moves/hr'},
    {lbl:'TOTAL CRANE MIN',                             val:totalCraneMins,   unit:'min'},
    {lbl:'DEDUCTABLE DELAYS',                           val:deductMins,       unit:'min'},
    {lbl:'NET CRANE HRS',                               val:netCraneHrs,      unit:'hrs'},
    {lbl:_isCombinedView?'NET TPH':'NET CPH',           val:netTPH,           unit:'moves/hr'},
  ];

  var _kpiModeLabel={'shift':'Current Shift','vessel':'Entire Vessel','last4':'Last 4 Hours'}[kpiMode]||'Current Shift';
  h+='<div style="margin:0 10px 16px;border-radius:12px;overflow:hidden;border:1px solid #1e2a3a">';
  h+='<div style="background:#1e2a3a;padding:10px 14px;font-size:11px;font-weight:800;color:#90a4c8;letter-spacing:.8px;text-transform:uppercase">Production Stats &nbsp;<span style="background:#4fc3f722;color:#4fc3f7;border-radius:5px;padding:2px 8px;font-size:9px;font-weight:700;letter-spacing:.3px">'+_kpiModeLabel+'</span></div>';
  stats.forEach(function(s,i){
    var bg=i%2===0?'#0d1521':'#111827';
    var isTPH=s.lbl.indexOf('TPH')>=0;
    var valCol=isTPH?'#4fc3f7':'white';
    h+='<div style="background:'+bg+';display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-top:1px solid #1e2a3a">';
    h+='<span style="font-size:11px;font-weight:700;color:#90a4c8;letter-spacing:.3px">'+s.lbl+'</span>';
    h+='<span style="font-size:18px;font-weight:900;color:'+valCol+'">'+s.val+'<span style="font-size:10px;font-weight:600;color:#4a5a72;margin-left:4px">'+s.unit+'</span></span>';
    h+='</div>';
  });
  h+='</div>';

  h+='<div style="height:14px"></div></div>';

  $('sc-performance').innerHTML=h;

  // ── Draw chart ──
  function drawCMTChart(){
    var existC=Chart.getChart('chartCMT');if(existC)existC.destroy();
    var darkGrid='rgba(255,255,255,.06)';
    var darkTick={color:'rgba(255,255,255,.5)',font:{size:9}};
    var col=cmtColour(view);

    var datasets=[];

    // Target line (dashed, with dots) — extends full shift
    datasets.push({
      label:(view==='combined'?'Combined':'MHC'+view.replace('mhc',''))+' target',
      data:cumTargetsCurrent,
      borderColor:col,borderDash:[5,4],borderWidth:1.5,
      pointRadius:3,pointHoverRadius:5,pointBackgroundColor:col,
      fill:false,tension:0,order:2
    });
    // Actual line (solid) — stops at current slot, nulls after
    datasets.push({
      label:(view==='combined'?'Combined':'MHC'+view.replace('mhc',''))+' actual',
      data:cumActuals,
      borderColor:col,backgroundColor:col+'22',
      borderWidth:2.5,pointRadius:4,pointHoverRadius:6,pointBackgroundColor:col,
      fill:true,tension:.3,order:1,spanGaps:false
    });

    // Mark break slots with vertical shading via a plugin
    var breakPlugin={
      id:'cmtBreaks',
      beforeDraw:function(chart){
        var ctx=chart.ctx;
        var xScale=chart.scales.x;
        var yScale=chart.scales.y;
        fullShiftSlots.forEach(function(s,i){
          if(cmtIsBreakSlot(s)){
            var x0=xScale.getPixelForValue(i);
            var x1=i+1<fullShiftSlots.length?xScale.getPixelForValue(i+1):x0+20;
            ctx.save();
            ctx.fillStyle='rgba(255,235,59,.06)';
            ctx.fillRect(x0-((x1-x0)/2),yScale.top,x1-x0,yScale.bottom-yScale.top);
            ctx.restore();
          }
        });
      }
    };

    new Chart(document.getElementById('chartCMT'),{
      type:'line',
      data:{labels:labels,datasets:datasets},
      options:{
        responsive:true,maintainAspectRatio:false,
        layout:{padding:{top:20,left:6,right:40,bottom:4}},
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{
            position:'bottom',
            labels:{
              color:'rgba(255,255,255,.8)',font:{size:10},usePointStyle:true,padding:12,
              generateLabels:function(chart){
                return chart.data.datasets.map(function(ds,i){
                  var isDashed=ds.borderDash&&ds.borderDash.length;
                  return {
                    text:ds.label,
                    fillStyle:isDashed?'transparent':ds.borderColor,
                    strokeStyle:ds.borderColor,
                    lineDash:isDashed?[5,4]:[],
                    lineWidth:isDashed?1.5:2.5,
                    datasetIndex:i,
                    fontColor:'rgba(255,255,255,.8)',
                    hidden:false
                  };
                });
              }
            }
          },
          tooltip:{backgroundColor:'#1e2a3a',titleColor:'#fff',bodyColor:'rgba(255,255,255,.85)',borderColor:'rgba(255,255,255,.12)',borderWidth:1,
            callbacks:{
              title:function(items){return labels[items[0].dataIndex]+' — cumulative';},
              label:function(item){return ' '+item.dataset.label+': '+item.formattedValue;}
            }
          }
        },
        scales:{
          x:{grid:{color:darkGrid},ticks:Object.assign({maxRotation:45,minRotation:30},darkTick),
             title:{display:true,text:'Hour',color:'rgba(255,255,255,.35)',font:{size:9}}},
          y:{grid:{color:darkGrid},ticks:darkTick,beginAtZero:true,
             title:{display:true,text:'Cumulative moves',color:'rgba(255,255,255,.35)',font:{size:9}}}
        }
      },
      plugins:[breakPlugin]
    });
  }

  if(window.Chart&&window.Chart.getChart){
    drawCMTChart();
  } else {
    var sc=document.createElement('script');
    sc.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';
    sc.onload=function(){setTimeout(drawCMTChart,50);};
    document.head.appendChild(sc);
  }
}

function sharePerformance(){
  if(typeof html2canvas==='undefined'){alert('html2canvas not loaded.');return;}
  var el=document.getElementById('perfCap');
  if(!el){alert('Please open the CMT tab first.');return;}
  var hidden=[];
  el.querySelectorAll('input,button,.perf-targets,.cmt-crane-lifts').forEach(function(e2){
    hidden.push({e:e2,d:e2.style.display});e2.style.display='none';
  });
  html2canvas(el,{
    scale:2,useCORS:true,backgroundColor:'#111827',
    width:el.offsetWidth,height:el.scrollHeight,
    windowWidth:el.offsetWidth,
    scrollX:0,scrollY:0,allowTaint:true,logging:false
  }).then(function(canvas){
    hidden.forEach(function(h2){h2.e.style.display=h2.d;});
    canvas.toBlob(function(blob){
      if(!blob)return;
      var file=new File([blob],'Performance.png',{type:'image/png'});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:'Hourly Performance'});
      } else {
        var a=document.createElement('a');a.href=URL.createObjectURL(blob);
        a.download='Performance.png';document.body.appendChild(a);a.click();document.body.removeChild(a);
        setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
      }
    },'image/png',0.96);
  }).catch(function(e){
    hidden.forEach(function(h2){h2.e.style.display=h2.d;});
    alert('Share failed: '+e.message);
  });
}

function histCollapse(uid){
  var el=document.getElementById(uid);
  var arr=document.getElementById(uid+'-arr');
  if(!el)return;
  var open=el.style.display==='block';
  el.style.display=open?'none':'block';
  if(arr)arr.textContent=open?'▶':'▼';
}
function buildShiftLabel(type,dateRef){
  var d;
  if(typeof dateRef==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(dateRef)){
    var parts=dateRef.split('-');
    d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  } else {
    d=new Date(typeof dateRef==='number'?dateRef:(dateRef||Date.now()));
  }
  // Format: DD-Mon-YY
  function fmtDate(dt){
    return dt.toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'2-digit'}).replace(/ /g,'-');
  }
  if(type==='DAY'){
    // 0600 - 1800  25-Apr-26
    return '0600 \u2013 1800  '+fmtDate(d);
  }
  if(type==='NIGHT'){
    // 1800 - 0600  25/26-Apr-26  (night crosses midnight, show both days)
    var d2=new Date(d.getTime());d2.setDate(d2.getDate()+1);
    var mon=d.toLocaleDateString('en-ZA',{month:'short'});
    var yr=d.toLocaleDateString('en-ZA',{year:'2-digit'});
    var day1=String(d.getDate()).padStart(2,'0');
    var day2=String(d2.getDate()).padStart(2,'0');
    return '1800 \u2013 0600  '+day1+'/'+day2+'-'+mon+'-'+yr;
  }
  // Fallback — detect from hour
  var isNight=d.getHours()<6||d.getHours()>=18;
  if(isNight){
    var d2b=new Date(d.getTime());d2b.setDate(d2b.getDate()+1);
    var mon2=d.toLocaleDateString('en-ZA',{month:'short'});
    var yr2=d.toLocaleDateString('en-ZA',{year:'2-digit'});
    var day1b=String(d.getDate()).padStart(2,'0');
    var day2b=String(d2b.getDate()).padStart(2,'0');
    return '1800 \u2013 0600  '+day1b+'/'+day2b+'-'+mon2+'-'+yr2;
  }
  return '0600 \u2013 1800  '+fmtDate(d);
}

  tf+='<td style="padding:7px 5px;font-size:13px;font-weight:900;text-align:center;border-left:2px solid rgba(255,255,255,.2)">'+(gD+gL)+'</td></tr>';
  return'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead>'+th+'</thead><tbody>'+tb+'</tbody><tfoot>'+tf+'</tfoot></table></div>';
}
function buildHistoryDelaysHTML(delayData,snc){
  var out='';
  for(var ci=1;ci<=snc;ci++){
    var rows='';
    Object.keys(delayData).forEach(function(k){
      var p=k.split('_');if(p.length<3)return;

      rows+='<tr>'
        +'<td style="text-align:center;font-size:11px;font-weight:700;padding:6px 10px;white-space:nowrap">'+(dd.from||'—')+'</td>'
        +'<td style="text-align:center;font-size:11px;font-weight:700;padding:6px 10px;white-space:nowrap">'+(dd.to||'—')+'</td>'
        +'<td style="text-align:center;font-size:12px;font-weight:800;color:#1a3a5c;padding:6px 8px">'+dur(dd.from,dd.to)+'</td>'
        +'<td style="font-size:11px;font-weight:700;padding:6px 8px">'+(dd.type||'')+'</td>'
        +'<td style="font-size:11px;padding:6px 8px;color:#444">'+(dd.desc||'')+'</td></tr>';
    });
    if(rows){
      out+='<div style="background:#fff176;border-radius:8px;padding:7px 12px;margin-bottom:6px;font-weight:800;font-size:13px;color:#1a3a5c">'+craneName(ci)+'</div>'
        +'<div style="overflow-x:auto;margin-bottom:8px"><table style="width:100%;border-collapse:collapse">'
        +'<thead><tr style="background:#1f3864;color:white"><th style="padding:7px 10px;font-size:11px">From</th><th style="padding:7px 10px;font-size:11px">To</th>'
        +'<th style="padding:7px 8px;font-size:11px">Dur.</th><th style="padding:7px 8px;font-size:11px;text-align:left">Delay Type</th>'
        +'<th style="padding:7px 8px;font-size:11px;text-align:left">Description</th></tr></thead>'
        +'<tbody>'+rows+'</tbody></table></div>';
    }
  }
  return out||'<div style="font-size:11px;color:#999;padding:10px 6px">No delays recorded.</div>';
}
function renderHistory(){
  const fv=$('histF')?$('histF').value:'';
  let h=`<div class="ph"><h2>🗂️ History</h2><p>All sessions — persists across shifts &amp; logins</p></div>
    <div class="fbar"><input id="histF" placeholder="🔍 Search vessel..." value="${fv}" oninput="renderHistory()"/></div>`;
  const list=ST.sessions.filter(s=>!fv||s.vesselName.toLowerCase().includes(fv.toLowerCase()));
  if(!list.length){h+=noSess('🗂️','No sessions recorded yet.');$('sc-history').innerHTML=h;return;}
  list.forEach(function(s){
    const _gt=calcGlobalTotals(s);
    const td=_gt.totalDoneDisc,tl=_gt.totalDoneLoad;
    const tot=_gt.totalDone,pct=s.target?Math.round(tot/s.target*100):0,isA=s.id===ST.activeId;
    const snc=s.numCranes||2;
    var uid='h_'+s.id;
    // Build shift blocks — one collapsible pair per shift
    var blocks=[];
    var isActiveSession=s.id===ST.activeId||s.id===ST.activeId2;
    var curShiftType=isDay()?'DAY':'NIGHT';
    // Use isDay() (grace-aware) for shift start date — matches renderResults and getCraneTotal
    var _now=new Date();
    var _nh=_now.getHours(),_nm=_now.getMinutes();
    var _grace=(ST.timing&&ST.timing.shiftRolloverGrace!=null?ST.timing.shiftRolloverGrace:15);
    var _totalMins=_nh*60+_nm;
    var _dayStart=6*60+_grace,_dayEnd=18*60+_grace;
    var _curShiftStartDate;
    if(_totalMins>=_dayStart&&_totalMins<_dayEnd){_curShiftStartDate=_now.toLocaleDateString('en-CA');}
    else if(_totalMins<_dayStart){var _y=new Date(_now);_y.setDate(_y.getDate()-1);_curShiftStartDate=_y.toLocaleDateString('en-CA');}
    else{_curShiftStartDate=_now.toLocaleDateString('en-CA');}
    var curShiftDate=_curShiftStartDate;
    var curShiftKey=curShiftType+'_'+curShiftDate;
    // Slots belonging to the current shift — used to filter live ST.hourly
    var _curShiftSlots=curShiftType==='DAY'?ALL.slice(0,12):ALL.slice(12);
    var _curShiftSlotsSet={};
    _curShiftSlots.forEach(function(s){_curShiftSlotsSet[s]=true;});
    if(s.shifts&&s.shifts.length){
      s.shifts.forEach(function(sh){
        var isCurrentShift=isActiveSession&&sh.key===curShiftKey;
        // For current shift: merge snapshotted sh.hourly (floor) with live ST.hourly (top)
        // so data still shows on devices where ST.hourly is stale or empty after sync lag
        var hourlyData;
        if(isCurrentShift){
          hourlyData=Object.assign({},sh.hourly||{});
          var _pfx=s.id+'_';
          Object.keys(ST.hourly).forEach(function(k){
            if(k.indexOf(_pfx)!==0)return;
            var sk=k.slice(_pfx.length);
            var slotEnd=sk.indexOf('_',sk.indexOf('-')+1);
            var slotPart=slotEnd>=0?sk.substring(0,slotEnd):sk;
            if(_curShiftSlotsSet[slotPart])hourlyData[sk]=ST.hourly[k];
          });
        } else { hourlyData=sh.hourly||{}; }
        // Delays: for current shift use only live ST.delays filtered to this shift's hours.
        // For past shifts use the snapshot only. Never merge sh.delays + ST.delays —
        // that causes day-shift entries to bleed into the night-shift display.
        var delayData;
        if(isCurrentShift){
          // Filter ST.delays to entries whose 'from' time falls in the current shift window
          // AND whose key belongs to this session (prefix = s.id) — prevents old vessel bleed
          var _isDayShift=(sh.type||curShiftType)==='DAY';
          var _sidPfx=String(s.id)+'_';
          delayData={};
          Object.keys(ST.delays).forEach(function(dk){
            if(dk.indexOf(_sidPfx)!==0)return; // must belong to this session
            var dd=ST.delays[dk];if(!dd||!dd.from)return;
            var fromH=parseInt((dd.from||'00:00').split(':')[0],10);
            var inShift=_isDayShift?(fromH>=6&&fromH<18):(fromH>=18||fromH<6);
            if(inShift)delayData[dk]=dd;
          });
        } else {
          delayData=sh.delays||{};
        }
        if((Object.keys(hourlyData).length)||(Object.keys(delayData).length)){
          blocks.push({key:sh.key||'',label:buildShiftLabel(sh.type,sh.date||sh.start||s.savedAt||s.id),hourly:hourlyData,delays:delayData,isCurrent:isCurrentShift});
        }
      });
    }
    // If active session has no shift entry yet, show live data filtered to current-shift slots
    if(isActiveSession&&!blocks.find(function(b){return b.isCurrent;})){
      var _liveHourly={};
      var _lfx=s.id+'_';
      Object.keys(ST.hourly).forEach(function(k){
        if(k.indexOf(_lfx)!==0)return;
        var sk=k.slice(_lfx.length);
        var slotEnd=sk.indexOf('_',sk.indexOf('-')+1);
        var slotPart=slotEnd>=0?sk.substring(0,slotEnd):sk;
        if(_curShiftSlotsSet[slotPart])_liveHourly[sk]=ST.hourly[k];
      });
      // Filter live ST.delays to current shift hours only AND this session's ID — prevent bleed from old vessel
      var _isDaySh=curShiftType==='DAY';
      var _sidPfx2=String(s.id)+'_';
      var _liveDelays={};
      Object.keys(ST.delays).forEach(function(dk){
        if(dk.indexOf(_sidPfx2)!==0)return; // must belong to this session
        var dd=ST.delays[dk];if(!dd||!dd.from)return;
        var fromH=parseInt((dd.from||'00:00').split(':')[0],10);
        var inShift=_isDaySh?(fromH>=6&&fromH<18):(fromH>=18||fromH<6);
        if(inShift)_liveDelays[dk]=dd;
      });
      if(Object.keys(_liveHourly).length||Object.keys(_liveDelays).length){
        blocks.push({key:curShiftKey,label:buildShiftLabel(curShiftType,curShiftDate),hourly:_liveHourly,delays:_liveDelays,isCurrent:true});
      }
    }
    // Fallback for old sessions with flat _results
    if(!blocks.length&&s._results){
      var hr=s._results.hourly||{},dl=s._results.delays||{};
      if(Object.keys(hr).length||Object.keys(dl).length)
        blocks.push({label:buildShiftLabel(null,s.savedAt||s.id),hourly:hr,delays:dl});
    }
    h+=`<div class="hi" style="${isA?'border-left-color:var(--yellow)':''}">
      <div class="hi-vessel">${s.vesselName} ${isA?'<span class="pill pblue">ACTIVE</span>':''}</div>
      <div class="hi-meta">🏗️ ${s.numCranes} Cranes &nbsp;·&nbsp; 🎯 Target: ${s.target}<br>
        ⏰ First: ${s.firstLift||'—'} &nbsp;·&nbsp; Last: ${s.lastLift||'—'}
      </div>
      <div class="hi-moves">📦 Total: ${tot} (${pct}%) &nbsp;·&nbsp; D: ${td} / L: ${tl}</div>`;
    // Sort: true chronological order — DAY starts 06:00, NIGHT starts 18:00 on its date
    // Current is always last (bottom)
    function histShiftTs(key){
      var parts=(key||'').split('_');
      var type=parts[0];
      var dateParts=(parts[1]||'').split('-');
      if(dateParts.length<3)return 0;
      var yr=parseInt(dateParts[0]),mo=parseInt(dateParts[1])-1,dy=parseInt(dateParts[2]);
      var hr=type==='DAY'?6:18;
      return new Date(yr,mo,dy,hr,0,0).getTime();
    }
    blocks.sort(function(a,b){
      if(a.isCurrent&&!b.isCurrent)return 1;
      if(!a.isCurrent&&b.isCurrent)return -1;
      return histShiftTs(a.key)-histShiftTs(b.key);
    });
    blocks.forEach(function(block,bi){
      var buid=uid+'_'+bi;
      h+='<div style="margin-top:8px">'
        +'<div onclick="histCollapse(\''+buid+'r\')" style="display:flex;align-items:center;justify-content:space-between;background:#1f3864;color:white;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:800;user-select:none">'
        +'<span>📊 Results &mdash; '+block.label+'</span><span id="'+buid+'r-arr">▶</span></div>'
        +'<div id="'+buid+'r" style="display:none;padding:10px;background:white;border:1px solid #dde3f0;border-top:none;border-radius:0 0 8px 8px">'+buildHistoryResultsHTML(block.hourly,snc)+'</div>'
        +'<div style="margin-top:4px"><div onclick="histCollapse(\''+buid+'d\')" style="display:flex;align-items:center;justify-content:space-between;background:#f1c40f;color:#1a3a5c;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:800;user-select:none">'
        +'<span>⏸️ Delays &mdash; '+block.label+'</span><span id="'+buid+'d-arr">▶</span></div>'
        +'<div id="'+buid+'d" style="display:none;padding:10px;background:white;border:1px solid #dde3f0;border-top:none;border-radius:0 0 8px 8px">'+buildHistoryDelaysHTML(block.delays,snc)+'</div></div>'
        +'</div>';
    });
    h+=`<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
      ${ST.activeId===s.id?'<span class="pill pgreen" style="font-size:10px">● Active</span>':
        `<button class="btn btn-sm" onclick="setActive('${s.id}')">Set Active</button>`}
      ${(RT.user&&RT.user.role==='admin')?`<button class="btn btn-sm btn-red" data-delid="${s.id}" onclick="delSessConfirm('${s.id}')">🗑️ Delete</button>`:''}
    </div></div>`;
  });
  h+=`<div style="padding:10px 10px 20px;display:flex;flex-direction:column;gap:10px">
    <button class="btn" onclick="exportHistoryExcel()" style="background:#1e6e3a">📥 Export History to Excel</button>
    <button class="btn btn-red" onclick="doLogout()">🚪 Sign Out</button>
  </div>`;
  $('sc-history').innerHTML=h;
}

// ── Step 1: build shift list and show picker modal ──
function exportHistoryExcel(){
  if(!window.XLSX){alert('XLSX library not loaded.');return;}
  if(!ST.sessions||!ST.sessions.length){alert('No sessions to export.');return;}

  // Build flat list of all shifts across all sessions
  var allShifts=[];// {sess, sh, label, sheetLabel}
  ST.sessions.forEach(function(sess){
    var nc=sess.numCranes||2;
    var shiftsFound=[];
    if(sess.shifts&&sess.shifts.length){
      sess.shifts.forEach(function(sh){shiftsFound.push(sh);});
    }
    // Live current shift for active session
    var isActive=sess.id===ST.activeId||sess.id===ST.activeId2;
    if(isActive){
      var _n=new Date(),_hh=_n.getHours();
      var _csd;
      if(_hh>=6&&_hh<18){_csd=_n.toLocaleDateString('en-CA');}
      else if(_hh<6){var _yy=new Date(_n);_yy.setDate(_yy.getDate()-1);_csd=_yy.toLocaleDateString('en-CA');}
      else{_csd=_n.toLocaleDateString('en-CA');}
      var _csk=(isDay()?'DAY':'NIGHT')+'_'+_csd;
      if(!shiftsFound.find(function(s){return s.key===_csk;})){
        var _lH={},_lD={};
        var _pfx=sess.id+'_';
        Object.keys(ST.hourly).forEach(function(k){if(k.indexOf(_pfx)===0){_lH[k.slice(_pfx.length)]=ST.hourly[k];}});
        Object.keys(ST.delays).forEach(function(k){_lD[k]=ST.delays[k];});
        if(Object.keys(_lH).length||Object.keys(_lD).length){
          shiftsFound.push({key:_csk,type:isDay()?'DAY':'NIGHT',date:_csd,hourly:_lH,delays:_lD,_live:true});
        }
      }
    }
    // Fallback: old flat _results
    if(!shiftsFound.length&&sess._results){
      shiftsFound.push({key:'ALL',type:'ALL',date:'',hourly:sess._results.hourly||{},delays:sess._results.delays||{},_fallback:true});
    }
    shiftsFound.forEach(function(sh){
      allShifts.push({sess:sess,sh:sh,nc:nc});
    });
  });

  if(!allShifts.length){alert('No shift data found to export.');return;}

  // ── Build modal HTML ──
  // Group by vessel for display
  var byVessel={};
  allShifts.forEach(function(item,idx){
    var vid=item.sess.id;
    if(!byVessel[vid])byVessel[vid]={sess:item.sess,items:[]};
    byVessel[vid].items.push({item:item,idx:idx});
  });

  function _shiftDisplayLabel(sh){
    var t=sh.type||'',d=sh.date||'';
    if(t==='DAY'){
      var dp=d.split('-');if(dp.length<3)return 'Day Shift';
      var dt=new Date(parseInt(dp[0]),parseInt(dp[1])-1,parseInt(dp[2]));
      return '☀ Day  0600-1800  '+dt.toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'2-digit'});
    }
    if(t==='NIGHT'){
      var dp2=d.split('-');if(dp2.length<3)return 'Night Shift';
      var dt2=new Date(parseInt(dp2[0]),parseInt(dp2[1])-1,parseInt(dp2[2]));
      var dt3=new Date(dt2);dt3.setDate(dt3.getDate()+1);
      return '🌙 Night 1800-0600  '+String(dt2.getDate()).padStart(2,'0')+'/'+String(dt3.getDate()).padStart(2,'0')+'-'+dt2.toLocaleDateString('en-ZA',{month:'short',year:'2-digit'});
    }
    return 'All Shifts';
  }

  var mh='<div class="xmod-overlay" id="xmodOverlay" onclick="if(event.target===this)_xmodClose()">';
  mh+='<div class="xmod-box">';
  mh+='<div class="xmod-hd"><h3>📥 Export to Excel</h3><p>Select the shifts and data you want to include.</p></div>';
  mh+='<div class="xmod-body">';

  Object.keys(byVessel).forEach(function(vid){
    var vg=byVessel[vid];
    var vn=vg.sess.vesselName||'Unknown';
    var allIdxs=vg.items.map(function(x){return x.idx;});
    var hasLive=vg.items.some(function(x){return !!(x.item.sh._live);});
    mh+='<div class="xmod-vessel">';
    mh+='<label class="xmod-vhd"><input type="checkbox" '+(hasLive?'checked':'')+' onchange="_xmodVessel(this,\''+allIdxs.join(',')+'\')" id="xv_'+vid+'"/><span class="xmod-vname">'+vn+'</span><span class="xmod-vmeta">'+vg.sess.numCranes+' cranes · target '+vg.sess.target+'</span></label>';
    mh+='<div class="xmod-shifts">';
    vg.items.forEach(function(it){
      var i=it.idx;
      var isLive=!!(it.item.sh._live);
      var defaultChecked=isLive; // only live shift checked by default; past shifts unchecked
      mh+='<div class="xmod-shift" style="flex-direction:column;align-items:flex-start;gap:6px;padding:9px 10px">';
      mh+='<div style="display:flex;align-items:center;gap:8px;width:100%">';
      mh+='<input type="checkbox" '+(defaultChecked?'checked':'')+' id="xs_'+i+'" style="width:15px;height:15px;accent-color:var(--navy);flex-shrink:0" onchange="_xmodUpdGo()"/>';
      mh+='<span class="xmod-slbl">'+_shiftDisplayLabel(it.item.sh)+'</span>';
      mh+=(isLive?'<span class="xmod-smeta">LIVE</span>':'');
      mh+='</div>';
      mh+='<div style="display:flex;gap:12px;padding-left:23px">';
      mh+='<label style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#444;cursor:pointer"><input type="checkbox" '+(defaultChecked?'checked':'')+' id="xr_'+i+'" style="accent-color:var(--navy)" onchange="_xmodUpdGo()"/> Results</label>';
      mh+='<label style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#444;cursor:pointer"><input type="checkbox" '+(defaultChecked?'checked':'')+' id="xd_'+i+'" style="accent-color:var(--navy)" onchange="_xmodUpdGo()"/> Delays</label>';
      mh+='</div>';
      mh+='</div>';
    });
    mh+='</div></div>';
  });

  mh+='</div>';// xmod-body
  mh+='<div class="xmod-ft"><button class="xmod-cancel" onclick="_xmodClose()">Cancel</button><button class="xmod-go" id="xmodGo" onclick="_xmodExport('+JSON.stringify(allShifts.map(function(_,i){return i;}))+')">📊 Export Selected</button></div>';
  mh+='</div></div>';

  var host=document.createElement('div');
  host.id='xmodHost';
  host.innerHTML=mh;
  document.body.appendChild(host);
  window._xmodAllShifts=allShifts;
  _xmodUpdGo(); // set Export button state based on defaults
}

function _xmodClose(){var h=document.getElementById('xmodHost');if(h)h.remove();delete window._xmodAllShifts;}
function _xmodVessel(cb,idxStr){
  idxStr.split(',').forEach(function(i){
    var el=document.getElementById('xs_'+i.trim());if(el)el.checked=cb.checked;
    var er=document.getElementById('xr_'+i.trim());if(er)er.checked=cb.checked;
    var ed=document.getElementById('xd_'+i.trim());if(ed)ed.checked=cb.checked;
  });
  _xmodUpdGo();
}
function _xmodUpdGo(){
  var go=document.getElementById('xmodGo');if(!go)return;
  var any=document.querySelector('#xmodHost input[id^="xs_"]:checked');
  go.disabled=!any;
}
function _xmodExport(allIdxs){
  var selected=allIdxs.filter(function(i){var el=document.getElementById('xs_'+i);return el&&el.checked;});
  if(!selected.length){alert('Please select at least one shift.');return;}
  var shiftOpts={};
  selected.forEach(function(i){
    shiftOpts[i]={
      results:!!(document.getElementById('xr_'+i)&&document.getElementById('xr_'+i).checked),
      delays:!!(document.getElementById('xd_'+i)&&document.getElementById('xd_'+i).checked)
    };
  });
  // Capture allShifts BEFORE _xmodClose deletes window._xmodAllShifts
  var capturedShifts=(window._xmodAllShifts||[]).slice();
  _xmodClose();
  _doExportShifts(selected,shiftOpts,capturedShifts);
}

// ── Step 2: build workbook from selected shift indices ──
function _doExportShifts(selectedIdxs,shiftOpts,capturedShifts){
  var allShifts=capturedShifts||window._xmodAllShifts||[];
  shiftOpts=shiftOpts||{};
  // Wrap each item with its index so we can look up shiftOpts
  var itemsWrapped=selectedIdxs.map(function(i){return {data:allShifts[i],idx:i};}).filter(function(x){return !!x.data;});
  var items=itemsWrapped.map(function(x){return x.data;});
  if(!items.length){alert('Nothing to export.');return;}

  var wb=XLSX.utils.book_new();
  // {type+'_'+craneIdx: totalMinutes} — across all selected shifts
  var delayTimePerCrane={};// key = "delayType|craneIdx", value = total minutes

  // ─── Shared style objects ───
  var NAVY='1F3864',NAVYD='162852',NAVYL='2A4A80',YELLOW='FFFF00',LB='BDD7EE',TEAL='0E7490',GREEN_D='1A5C35',AMBER='B45309';
  var _BDR_W={style:'thin',color:{rgb:'FFFFFF'}};   // white border for dark headers
  var _BDR_D={style:'thin',color:{rgb:'BDD7EE'}};   // light-blue border for data rows
  var _BDR_N={style:'thin',color:{rgb:'1F3864'}};   // navy border for accent rows
  var _BW={top:_BDR_W,bottom:_BDR_W,left:_BDR_W,right:_BDR_W};
  var _BD={top:_BDR_D,bottom:_BDR_D,left:_BDR_D,right:_BDR_D};
  var _BN={top:_BDR_N,bottom:_BDR_N,left:_BDR_N,right:_BDR_N};

  function ST_h1(){return{font:{name:'Arial',sz:14,bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:NAVY}},alignment:{horizontal:'left',vertical:'center',indent:1},border:_BW};}
  function ST_h2(dark){return{font:{name:'Arial',sz:11,bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:dark?NAVYD:NAVYL}},alignment:{horizontal:'left',vertical:'center',indent:1},border:_BW};}
  function ST_h3_day(){return{font:{name:'Arial',sz:11,bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'0E7490'}},alignment:{horizontal:'left',vertical:'center',indent:1},border:_BW};}
  function ST_h3_night(){return{font:{name:'Arial',sz:11,bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'374151'}},alignment:{horizontal:'left',vertical:'center',indent:1},border:_BW};}
  function ST_cat(yellow){return yellow?{font:{name:'Arial',sz:10,bold:true,color:{rgb:'000000'}},fill:{fgColor:{rgb:YELLOW}},alignment:{horizontal:'center',vertical:'center'},border:_BN}:{font:{name:'Arial',sz:10,bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'1A3A5C'}},alignment:{horizontal:'center',vertical:'center'},border:_BW};}
  function ST_col_hdr(){return{font:{name:'Arial',sz:10,bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:NAVY}},alignment:{horizontal:'center',vertical:'center'},border:_BW};}
  function ST_col_hdr_l(){return{font:{name:'Arial',sz:10,bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:NAVY}},alignment:{horizontal:'left',vertical:'center',indent:1},border:_BW};}
  function ST_crane_hdr(){return{font:{name:'Arial',sz:10,bold:true,color:{rgb:'000000'}},fill:{fgColor:{rgb:'FFE600'}},alignment:{horizontal:'left',vertical:'center',indent:1},border:_BN};}
  function ST_e(){return{fill:{fgColor:{rgb:LB}},font:{name:'Arial',sz:10},alignment:{horizontal:'center',vertical:'center'},border:_BD};}
  function ST_o(){return{fill:{fgColor:{rgb:'FFFFFF'}},font:{name:'Arial',sz:10},alignment:{horizontal:'center',vertical:'center'},border:_BD};}
  function ST_eL(){return{fill:{fgColor:{rgb:LB}},font:{name:'Arial',sz:10},alignment:{horizontal:'left',vertical:'center',indent:1},border:_BD};}
  function ST_oL(){return{fill:{fgColor:{rgb:'FFFFFF'}},font:{name:'Arial',sz:10},alignment:{horizontal:'left',vertical:'center',indent:1},border:_BD};}
  function ST_total_y(){return{font:{name:'Arial',sz:10,bold:true,color:{rgb:'000000'}},fill:{fgColor:{rgb:YELLOW}},alignment:{horizontal:'center',vertical:'center'},border:_BN};}
  function ST_total_n(){return{font:{name:'Arial',sz:10,bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'1A3A5C'}},alignment:{horizontal:'center',vertical:'center'},border:_BW};}
  function ST_meta(){return{font:{name:'Arial',sz:9,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:NAVYD}},alignment:{horizontal:'left',vertical:'center',indent:1},border:_BW};}
  function ST_spacer(){return{fill:{fgColor:{rgb:'E8ECF4'}},border:_BD};}

  function sc(ws,r,c,v,s){var a=XLSX.utils.encode_cell({r:r,c:c});ws[a]={v:v,t:typeof v==='number'?'n':'s',s:s};}
  function scn2(ws,r,c,v,s){var a=XLSX.utils.encode_cell({r:r,c:c});ws[a]={v:v||0,t:'n',s:s||ST_o()};}
  function mg(ws,r1,c1,r2,c2){if(!ws['!merges'])ws['!merges']=[];ws['!merges'].push({s:{r:r1,c:c1},e:{r:r2,c:c2}});}

  function _cn(n){return(ST.craneNames&&ST.craneNames[n])||('CR'+n);}
  function _durMins(f,t){if(!f||!t)return 0;var fh=parseInt(f),fm=parseInt((f.split(':')[1]||0)),th=parseInt(t),tm=parseInt((t.split(':')[1]||0));var d=(th*60+tm)-(fh*60+fm);if(d<0)d+=1440;return d;}
  function _durFmt(mins){return Math.floor(mins/60)+'h '+String(mins%60).padStart(2,'0')+'m';}
  function _fs2(s){return s.replace('-',' – ');}

  function _shLabel(sh){
    var t=sh.type||'',d=sh.date||'';
    if(t==='DAY'){var dp=d.split('-');var dt=new Date(parseInt(dp[0]),parseInt(dp[1])-1,parseInt(dp[2]));return 'DAY  0600-1800  '+dt.toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'2-digit'});}
    if(t==='NIGHT'){var dp2=d.split('-');var dt2=new Date(parseInt(dp2[0]),parseInt(dp2[1])-1,parseInt(dp2[2]));var dt3=new Date(dt2);dt3.setDate(dt3.getDate()+1);return 'NIGHT 1800-0600  '+String(dt2.getDate()).padStart(2,'0')+'/'+String(dt3.getDate()).padStart(2,'0')+'-'+dt2.toLocaleDateString('en-ZA',{month:'short',year:'2-digit'});}
    return 'ALL SHIFTS';
  }

  // ── Per-shift sheet ──
  itemsWrapped.forEach(function(wrapped){
    var item=wrapped.data,origIdx=wrapped.idx;
    var opts=shiftOpts[origIdx]||{results:true,delays:true};
    var includeResults=opts.results!==false;
    var includeDelays=opts.delays!==false;
    var sess=item.sess,sh=item.sh,nc=item.nc;
    var shType=sh.type||'';
    var isNight=shType==='NIGHT';
    var shLabel=_shLabel(sh);

    // Sheet name: VesselName-DAY19May or similar
    var vShort=(sess.vesselName||'V').replace(/[:\\\/?*\[\] ]/g,'').substring(0,14);
    var shShort=shType==='DAY'?'DAY':shType==='NIGHT'?'NIGHT':'ALL';
    var dateShort='';
    if(sh.date){var dp3=sh.date.split('-');if(dp3.length>=3){var dtS=new Date(parseInt(dp3[0]),parseInt(dp3[1])-1,parseInt(dp3[2]));dateShort=String(dtS.getDate()).padStart(2,'0')+dtS.toLocaleDateString('en-ZA',{month:'short'});}}
    var rawName=vShort+'-'+shShort+(dateShort?'-'+dateShort:'');
    var sheetName=rawName.substring(0,31);
    var base2=sheetName,nn=2;
    while(wb.SheetNames.indexOf(sheetName)>=0){sheetName=(rawName.substring(0,28)+'_'+nn);nn++;}

    var maxCols=Math.max(nc+2,6);
    var ws={'!cols':[],'!rows':[]};
    var row=0;

    // ── Sheet main heading ──
    mg(ws,row,0,row,maxCols);
    sc(ws,row,0,sess.vesselName||'Unknown',ST_h1());
    ws['!rows'].push({hpt:26});row++;

    // ── Shift sub-heading ──
    mg(ws,row,0,row,maxCols);
    sc(ws,row,0,(isNight?'🌙 ':'☀ ')+shLabel+(sh._live?' — LIVE':''),isNight?ST_h3_night():ST_h3_day());
    ws['!rows'].push({hpt:20});row++;

    // ── Vessel meta ──
    var meta='Cranes: '+nc+'  |  Target: '+(sess.target||0)+'  |  Docked: '+(sess.dockedOn?new Date(sess.dockedOn).toLocaleString('en-ZA',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:false}):'—')+'  |  First Lift: '+(sess.firstLift||'—')+'  |  Last Lift: '+(sess.lastLift||'—');
    mg(ws,row,0,row,maxCols);
    sc(ws,row,0,meta,ST_meta());
    ws['!rows'].push({hpt:16});row++;

    // spacer
    mg(ws,row,0,row,maxCols);sc(ws,row,0,'',ST_spacer());ws['!rows'].push({hpt:6});row++;

    // ── RESULTS heading ──
    if(includeResults){
    mg(ws,row,0,row,maxCols);
    sc(ws,row,0,'RESULTS',ST_h2(false));
    ws['!rows'].push({hpt:20});row++;

    var shSlots=shType==='DAY'?['0600-0700','0700-0800','0800-0900','0900-1000','1000-1100','1100-1200','1200-1300','1300-1400','1400-1500','1500-1600','1600-1700','1700-1800']:shType==='NIGHT'?['1800-1900','1900-2000','2000-2100','2100-2200','2200-2300','2300-0000','0000-0100','0100-0200','0200-0300','0300-0400','0400-0500','0500-0600']:['0600-0700','0700-0800','0800-0900','0900-1000','1000-1100','1100-1200','1200-1300','1300-1400','1400-1500','1500-1600','1600-1700','1700-1800','1800-1900','1900-2000','2000-2100','2100-2200','2200-2300','2300-0000','0000-0100','0100-0200','0200-0300','0300-0400','0400-0500','0500-0600'];

    ['discharge','load'].forEach(function(t){
      var T=t==='discharge'?'DISCHARGE':'LOAD';

      // Category heading
      mg(ws,row,0,row,maxCols);
      sc(ws,row,0,T,{font:{name:'Arial',sz:10,bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:t==='discharge'?'1A5C35':'0E7490'}},alignment:{horizontal:'left',vertical:'center',indent:1}});
      ws['!rows'].push({hpt:18});row++;

      // Column headers
      sc(ws,row,0,'Time',ST_col_hdr_l());
      for(var ci=1;ci<=nc;ci++){sc(ws,row,ci,_cn(ci),ST_col_hdr());}
      sc(ws,row,nc+1,'Total',ST_col_hdr());
      ws['!rows'].push({hpt:16});row++;

      // Planned row (category highlight)
      sc(ws,row,0,'Planned',ST_cat(true));
      var pT=0;
      for(var ci=1;ci<=nc;ci++){var pv=(sess.craneBalances&&sess.craneBalances[ci]&&sess.craneBalances[ci][t+'Split'])||0;pT+=pv;scn2(ws,row,ci,pv,ST_cat(true));}
      scn2(ws,row,nc+1,pT,ST_cat(true));
      ws['!rows'].push({hpt:15});row++;

      // Opening balance row
      sc(ws,row,0,'Opening Balance',ST_cat(false));
      var obT=0;
      for(var ci=1;ci<=nc;ci++){var ov=(sess.craneBalances&&sess.craneBalances[ci])?((sess.craneBalances[ci][t+'OB']!=null&&sess.craneBalances[ci][t+'OB']!=='')?parseFloat(sess.craneBalances[ci][t+'OB'])||0:(sess.craneBalances[ci][t+'Split']||0)):0;obT+=ov;scn2(ws,row,ci,ov,ST_cat(false));}
      scn2(ws,row,nc+1,obT,ST_cat(false));
      ws['!rows'].push({hpt:15});row++;

      // Hourly slot rows
      shSlots.forEach(function(s,ri){
        var rT=0;
        var rs=ri%2===0?ST_o():ST_e();var rsL=ri%2===0?ST_oL():ST_eL();
        sc(ws,row,0,_fs2(s),rsL);
        for(var ci=1;ci<=nc;ci++){var sk=s+'_'+ci+'_'+t;var v=(sh.hourly&&sh.hourly[sk])||0;rT+=v;scn2(ws,row,ci,v,rs);}
        scn2(ws,row,nc+1,rT,{fill:{fgColor:{rgb:ri%2===0?'FFFFFF':LB}},font:{name:'Arial',sz:10,bold:true},alignment:{horizontal:'center',vertical:'center'}});
        ws['!rows'].push({hpt:14});row++;
      });

      // Total Done
      sc(ws,row,0,'TOTAL DONE',ST_total_y());
      var dT=0;
      for(var ci=1;ci<=nc;ci++){var ct=0;shSlots.forEach(function(s2){ct+=(sh.hourly&&sh.hourly[s2+'_'+ci+'_'+t])||0;});dT+=ct;scn2(ws,row,ci,ct,ST_total_y());}
      scn2(ws,row,nc+1,dT,ST_total_y());
      ws['!rows'].push({hpt:17});row++;

      // Spacer
      mg(ws,row,0,row,maxCols);sc(ws,row,0,'',ST_spacer());ws['!rows'].push({hpt:5});row++;
    });
    }// end includeResults

    // ── DELAYS heading ──
    if(includeDelays){
    mg(ws,row,0,row,maxCols);
    sc(ws,row,0,'DELAYS',ST_h2(true));
    ws['!rows'].push({hpt:20});row++;

    // Delay column headers
    var dCols=['From','To','Duration','Delay Type','Description'];
    dCols.forEach(function(lbl,ci){sc(ws,row,ci,lbl,ci<=1?ST_col_hdr():ci===2?ST_col_hdr():(ci===3?ST_col_hdr_l():ST_col_hdr_l()));});
    ws['!rows'].push({hpt:16});row++;

    var hasDelays=false;
    for(var ci=1;ci<=nc;ci++){
      var effDelays=sh._live?ST.delays:(sh.delays||{});
      var craneDelays=[];
      Object.keys(effDelays).forEach(function(k){
        var parts=k.split('_');if(parts.length<3)return;
        if(parseInt(parts[parts.length-2])===ci){var dd=effDelays[k];if(dd&&(dd.from||dd.to||dd.type))craneDelays.push(dd);}
      });
      if(!craneDelays.length)continue;
      hasDelays=true;

      // Crane category heading — highlighted yellow
      mg(ws,row,0,row,maxCols);
      sc(ws,row,0,_cn(ci),ST_crane_hdr());
      ws['!rows'].push({hpt:17});row++;

      craneDelays.forEach(function(dd,ri){
        var mins=_durMins(dd.from,dd.to);
        var dFmt=_durFmt(mins);
        var rs=ri%2===0?ST_o():ST_e();
        sc(ws,row,0,dd.from||'',Object.assign({},rs,{alignment:{horizontal:'center',vertical:'center'}}));
        sc(ws,row,1,dd.to||'',Object.assign({},rs,{alignment:{horizontal:'center',vertical:'center'}}));
        sc(ws,row,2,dFmt,Object.assign({},ST_o(),{font:{name:'Arial',sz:10,bold:true},alignment:{horizontal:'center',vertical:'center'},fill:{fgColor:{rgb:ri%2===0?'FFFFFF':LB}}}));
        sc(ws,row,3,dd.type||'',Object.assign({},rs,{alignment:{horizontal:'left',vertical:'center',indent:1}}));
        sc(ws,row,4,dd.desc||'',Object.assign({},rs,{alignment:{horizontal:'left',vertical:'center',indent:1}}));
        ws['!rows'].push({hpt:14});row++;
        // Accumulate delay time per type per crane for analysis sheet
        if(dd.type&&mins>0){
          var dtKey=(dd.type.trim().toUpperCase())+'|'+ci;
          delayTimePerCrane[dtKey]=(delayTimePerCrane[dtKey]||0)+mins;
        }
      });
    }
    if(!hasDelays){
      sc(ws,row,0,'No delays recorded.',{font:{name:'Arial',sz:10,color:{rgb:'999999'}},alignment:{horizontal:'left',vertical:'center',indent:1}});
      ws['!rows'].push({hpt:14});row++;
    }
    }// end includeDelays

    // Column widths
    ws['!cols']=[{wch:15}];
    for(var ci=1;ci<=nc;ci++)ws['!cols'].push({wch:10});
    ws['!cols'].push({wch:10},{wch:10},{wch:10},{wch:10},{wch:22},{wch:32});
    ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:row+1,c:maxCols}});
    XLSX.utils.book_append_sheet(wb,ws,sheetName);
  });

  // ── DELAY TIME ANALYSIS sheet ──
  // Build: per delay type, per crane, total minutes
  // Collect all cranes and types from selected shifts
  var allTypes=[];var allCraneIds=[];
  Object.keys(delayTimePerCrane).forEach(function(k){
    var parts=k.split('|');
    var dt=parts[0],ci=parseInt(parts[1]);
    if(allTypes.indexOf(dt)<0)allTypes.push(dt);
    if(allCraneIds.indexOf(ci)<0)allCraneIds.push(ci);
  });
  allTypes.sort();allCraneIds.sort(function(a,b){return a-b;});

  // Also build combined total per type (across all cranes) for sort + bar
  var typeTotals={};
  allTypes.forEach(function(dt){
    var tot=0;
    allCraneIds.forEach(function(ci){tot+=(delayTimePerCrane[dt+'|'+ci]||0);});
    typeTotals[dt]=tot;
  });
  var sortedTypes=allTypes.slice().sort(function(a,b){return typeTotals[b]-typeTotals[a];});
  var maxMins=sortedTypes.length?typeTotals[sortedTypes[0]]:0;

  if(sortedTypes.length){
    var nCr=allCraneIds.length;
    // Cols: Delay Type | CR1 mins | CR1 bar | CR2 mins | CR2 bar | ... | Total mins | Total bar
    var wda={'!cols':[{wch:26}],'!rows':[]};
    allCraneIds.forEach(function(){wda['!cols'].push({wch:10},{wch:28});});
    wda['!cols'].push({wch:12},{wch:36});
    var dr=0;
    var daMaxC=1+nCr*2+2;

    // Main heading
    mg(wda,dr,0,dr,daMaxC);
    sc(wda,dr,0,'DELAY TIME ANALYSIS',ST_h1());
    wda['!rows'].push({hpt:26});dr++;

    // Sub heading
    mg(wda,dr,0,dr,daMaxC);
    sc(wda,dr,0,'Total time spent per delay type per crane — across selected shifts',ST_meta());
    wda['!rows'].push({hpt:16});dr++;

    // Spacer
    mg(wda,dr,0,dr,daMaxC);sc(wda,dr,0,'',ST_spacer());wda['!rows'].push({hpt:6});dr++;

    // Column headers row 1: Delay Type | CraneName (spans 2) | ... | Total (spans 2)
    sc(wda,dr,0,'Delay Type',ST_col_hdr_l());
    var hc=1;
    allCraneIds.forEach(function(ci){
      mg(wda,dr,hc,dr,hc+1);
      sc(wda,dr,hc,_cn(ci),ST_col_hdr());
      hc+=2;
    });
    mg(wda,dr,hc,dr,hc+1);
    sc(wda,dr,hc,'TOTAL',ST_col_hdr());
    wda['!rows'].push({hpt:17});dr++;

    // Column headers row 2: blank | Time | Bar | Time | Bar | ... | Time | Bar
    sc(wda,dr,0,'',ST_col_hdr_l());
    var hc2=1;
    allCraneIds.forEach(function(){
      sc(wda,dr,hc2,'Time',ST_col_hdr());
      sc(wda,dr,hc2+1,'Time Bar',ST_col_hdr());
      hc2+=2;
    });
    sc(wda,dr,hc2,'Time',{font:{name:'Arial',sz:10,bold:true,color:{rgb:'000000'}},fill:{fgColor:{rgb:YELLOW}},alignment:{horizontal:'center',vertical:'center'}});
    sc(wda,dr,hc2+1,'Total Bar',{font:{name:'Arial',sz:10,bold:true,color:{rgb:'000000'}},fill:{fgColor:{rgb:YELLOW}},alignment:{horizontal:'center',vertical:'center'}});
    wda['!rows'].push({hpt:15});dr++;

    var barMax=24;
    sortedTypes.forEach(function(dt,ri){
      var rs=ri%2===0?ST_o():ST_e();
      var rsL=ri%2===0?ST_oL():ST_eL();
      sc(wda,dr,0,dt,rsL);
      var cc=1;var rowTotal=0;
      allCraneIds.forEach(function(ci){
        var mins=delayTimePerCrane[dt+'|'+ci]||0;
        rowTotal+=mins;
        var timeStr=mins>0?_durFmt(mins):'—';
        sc(wda,dr,cc,timeStr,Object.assign({},rs,{alignment:{horizontal:'center',vertical:'center'}}));
        // Bar shows actual time proportional to max — label inside bar is the time string
        var barLen=maxMins>0?Math.round(mins/maxMins*barMax):0;
        var barClr=ci===1?'1F3864':ci===2?'0E7490':ci===3?'1A5C35':'7C3AED';
        var barText=barLen>0?('█'.repeat(barLen)+'  '+timeStr):'';
        sc(wda,dr,cc+1,barText,{font:{name:'Arial',sz:7,bold:true,color:{rgb:barClr}},fill:{fgColor:{rgb:ri%2===0?'FFFFFF':LB}},alignment:{horizontal:'left',vertical:'center'}});
        cc+=2;
      });
      // Total for this type
      var totStr=rowTotal>0?_durFmt(rowTotal):'—';
      var totBarLen=maxMins>0?Math.round(rowTotal/maxMins*barMax):0;
      var totBarText=totBarLen>0?('█'.repeat(totBarLen)+'  '+totStr):'';
      sc(wda,dr,cc,totStr,ST_total_y());
      sc(wda,dr,cc+1,totBarText,{font:{name:'Arial',sz:7,bold:true,color:{rgb:'92400E'}},fill:{fgColor:{rgb:YELLOW}},alignment:{horizontal:'left',vertical:'center'}});
      wda['!rows'].push({hpt:17});dr++;
    });

    // Grand total row
    sc(wda,dr,0,'TOTAL',ST_total_n());
    var gc=1;var grandTotal=0;
    allCraneIds.forEach(function(ci){
      var craneTotal=0;sortedTypes.forEach(function(dt){craneTotal+=(delayTimePerCrane[dt+'|'+ci]||0);});
      grandTotal+=craneTotal;
      sc(wda,dr,gc,craneTotal>0?_durFmt(craneTotal):'—',ST_total_y());
      sc(wda,dr,gc+1,'',ST_total_n());
      gc+=2;
    });
    sc(wda,dr,gc,grandTotal>0?_durFmt(grandTotal):'—',ST_total_y());
    sc(wda,dr,gc+1,'',ST_total_y());
    wda['!rows'].push({hpt:18});dr++;

    wda['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:dr,c:daMaxC}});
    XLSX.utils.book_append_sheet(wb,wda,'Delay Time Analysis');
  }

  // ── CMT Sheet — per-slot actuals vs targets + KPIs per shift ──
  var wcmt={'!cols':[{wch:14},{wch:10},{wch:10},{wch:12},{wch:12}],'!rows':[]};
  var cr=0;
  mg(wcmt,cr,0,cr,4);sc(wcmt,cr,0,'CMT — CRANE MOVES TRACKER',ST_h1());wcmt['!rows'].push({hpt:26});cr++;
  mg(wcmt,cr,0,cr,4);sc(wcmt,cr,0,'Per-shift: slot actuals vs targets, deviation & production KPIs',ST_meta());wcmt['!rows'].push({hpt:16});cr++;
  var hasCmt=false;
  itemsWrapped.forEach(function(wrapped){
    var item=wrapped.data;
    var sh=item.sh;
    if(!sh||!sh.cmt)return;
    hasCmt=true;
    var cmt=sh.cmt;
    mg(wcmt,cr,0,cr,4);sc(wcmt,cr,0,'',ST_spacer());wcmt['!rows'].push({hpt:6});cr++;
    mg(wcmt,cr,0,cr,4);

    wcmt['!rows'].push({hpt:16});cr++;
    var slots=sh.type==='DAY'?ALL.slice(0,12):ALL.slice(12);

    slots.forEach(function(slot,si){

      var rs=si%2===0?ST_o():ST_e();

      scn2(wcmt,cr,1,act,rs);
      scn2(wcmt,cr,2,tgt,rs);

    mg(wcmt,cr,0,cr,4);sc(wcmt,cr,0,'',ST_spacer());wcmt['!rows'].push({hpt:4});cr++;

      ['Net TPH',cmt.netTPH,'moves/hr'],

    kpis.forEach(function(kpi,ki){

      sc(wcmt,cr,0,kpi[0],Object.assign({},ki%2===0?ST_oL():ST_eL(),{font:{name:'Arial',sz:10,bold:true}}));

      wcmt['!rows'].push({hpt:16});cr++;
    });
  });
  if(hasCmt){
    wcmt['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:cr,c:4}});
    XLSX.utils.book_append_sheet(wb,wcmt,'CMT Data');
  }

  // ── Reorder: Delay Time Analysis first, then shift sheets ──
  var finalOrder=[];
  if(wb.SheetNames.indexOf('Delay Time Analysis')>=0)finalOrder.push('Delay Time Analysis');
  if(wb.SheetNames.indexOf('CMT Data')>=0)finalOrder.push('CMT Data');
  wb.SheetNames.forEach(function(n){if(finalOrder.indexOf(n)<0)finalOrder.push(n);});
  wb.SheetNames=finalOrder;

  // ── Write and download ──
  try{
    var buf=XLSX.write(wb,{bookType:'xlsx',type:'array',cellStyles:true});
    var blob=new Blob([buf],{type:'application/octet-stream'});
    var a=document.createElement('a');
    var fname='TerminalExport_'+new Date().toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'2-digit'}).replace(/ /g,'-')+'.xlsx';
    a.href=URL.createObjectURL(blob);a.download=fname;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(a.href);},2000);
  }catch(e){alert('Export failed: '+e.message);}
}

function setActive(id){
  ST.activeId=id;
  // Unlock for editing when setting active from history
  const raw=ST.sessions.find(function(x){return x.id===id;});
  if(raw)raw.locked=false;
  logActivity('Session Activated',(raw?raw.vesselName:'')+'  — set as active session');
  sv();
  // Extend protection so Firebase echo can't revert activeId or locked state
  _myLastSave=Date.now();
  setTimeout(function(){_myLastSave=Date.now();},500);
  setTimeout(function(){_myLastSave=Date.now();},1000);
  setTimeout(function(){_myLastSave=Date.now();},2000);
  setTimeout(function(){_myLastSave=Date.now();},3000);
  renderHistory();switchTab('input');
}
function delSess(id){
  var nid=Number(id)||id;
  ST.sessions=ST.sessions.filter(function(s){
    return String(s.id)!==String(id)&&s.id!==nid;
  });
  if(String(ST.activeId)===String(id)||ST.activeId===nid){
    ST.activeId=null;
    ST.hourly={};ST.delays={};ST.delayRowIds={};
  }
  if(String(ST.activeId2)===String(id)||ST.activeId2===nid){
    ST.activeId2=null;
    ST.hourly={};ST.delays={};ST.delayRowIds={};
  }
  logActivity('Session Deleted','Session ID: '+id);
  _pendingDeleteSave=Date.now()+5000;
  sv();
  renderHistory();
}
function delSessConfirm(id){
  var btn=document.querySelector('[data-delid="'+id+'"]');
  if(btn&&btn.dataset.confirming==='1'){
    delSess(id);
  } else {
    if(btn){btn.dataset.confirming='1';btn.textContent='Confirm?';btn.style.background='#c0392b';}
    setTimeout(function(){
      if(btn){btn.dataset.confirming='0';btn.textContent='🗑️ Delete';btn.style.background='';}
    },3000);
  }
}

// ═══════════ AI ANALYSIS ═══════════
function buildAnalysisData(){
  const sess=getSess();
  if(!ST.sessions.length)return null;
  // Build summary of all sessions
  const data={sessions:[],delayPatterns:{},hourlyPerformance:{}};
  ST.sessions.forEach(s=>{
    let td=0,tl=0;
    const slotData=[];
    getAllSlots(s).forEach(function(slotObj){
      var sd=slotObj.disc,sl2=slotObj.load;
      if(sd||sl2)slotData.push({slot:slotObj.slot,d:sd,l:sl2});
      td+=sd;tl+=sl2;
    });
    data.sessions.push({vessel:s.vesselName,cranes:s.numCranes,target:s.target,totalD:td,totalL:tl,total:td+tl,pct:s.target?Math.round((td+tl)/s.target*100):0,slotData});
    // Delay patterns
    for(let c=1;c<=s.numCranes;c++){
      const rows=ST.delayRows[`${s.id}_c${c}`]||1;
      for(let r=0;r<rows;r++){
        const d=ST.delays[`${s.id}_${c}_${r}`];
        if(d&&d.type){
          data.delayPatterns[d.type]=(data.delayPatterns[d.type]||0)+1;
          if(d.from){const h=parseInt(d.from.split(':')[0]);data.hourlyPerformance[h]=(data.hourlyPerformance[h]||0)+1;}
        }
      }
    }
  });
  return data;
}

// Max entries stored to avoid localStorage bloat
var _ACT_MAX = 500;

function logActivity(action, detail, extra){
  if(!ST.activityLog)ST.activityLog=[];
  var user=RT.user?RT.user.name+' ('+RT.user.role+')':'System';
  var entry={
    ts:new Date().toISOString(),
    user:user,
    action:action,
    detail:detail||'',
    extra:extra||''
  };
  ST.activityLog.unshift(entry);
  if(ST.activityLog.length>_ACT_MAX)ST.activityLog=ST.activityLog.slice(0,_ACT_MAX);
  // Note: sv() is NOT called here — caller already calls sv() after the action
  // This prevents double-saves; the log entry goes with the next sv() from the caller
}
